const getThumb = (url) => {
  if (!url) return null;
  // YouTube/youtu.be 도메인만 매칭 (위버스 /live/ URL 오인식 방지)
  if (!/(?:youtube\.com|youtu\.be)/.test(url)) return null;
  const m = url.match(/(?:v=|youtu\.be\/|\/live\/|\/shorts\/)([^&?/]+)/);
  return m ? `https://img.youtube.com/vi/${m[1]}/mqdefault.jpg` : null;
};

const Thumb = ({ url, thumbnail_url }) => {
  if (!url) return null;
  // X/위버스는 thumbnail_url 우선 (DB 캐싱), 유튜브는 자동 추출
  const isX = /(?:^|\/\/)(?:www\.)?(?:x|twitter)\.com\//.test(url);
  const isWeverse = /weverse\.io/.test(url);
  const src = (isX || isWeverse) ? (thumbnail_url || null) : getThumb(url);
  return src
    ? <img src={src} style={{ width:96, height:54, borderRadius:6, objectFit:"cover", flexShrink:0, background:"#111" }} onError={e=>{e.target.style.display="none";}} />
    : null;
};

const parseMembersFromTitle = (title) => {
  if (!title) return null;
  const found = new Set();
  if (/💙/.test(title)) found.add("예준");
  if (/💜/.test(title)) found.add("노아");
  if (/🩷/.test(title)) found.add("밤비");
  if (/❤️|❤/.test(title)) found.add("은호");
  if (/🖤/.test(title)) found.add("하민");
  if (/\bYejun\b/i.test(title)) found.add("예준");
  if (/\bNoah\b/i.test(title)) found.add("노아");
  if (/\bBamby\b/i.test(title)) found.add("밤비");
  if (/\bEunho\b/i.test(title)) found.add("은호");
  if (/\bHamin\b/i.test(title)) found.add("하민");
  if (found.size === 0) return null;
  if (found.size === 5) return ["전원"];
  const order = ["예준", "노아", "밤비", "은호", "하민"];
  return order.filter(m => found.has(m));
};

const DateInput = ({ value, onChange, sm, color }) => {
  const sty = sm || {};
  const fontSz = sty.fontSize || 13;
  const v = (value || "").split("-");
  const y = v[0] || "", m = v[1] || "", d = v[2] || "";
  const yRef = React.useRef(null), mRef = React.useRef(null), dRef = React.useRef(null);
  const fire = (ny, nm, nd) => {
    if (!ny && !nm && !nd) onChange("");
    else onChange(`${ny}-${nm}-${nd}`);
  };
  // 다양한 형식 파싱: "2026. 5. 8.", "20260508", "2026-5-8", "2026/05/08", "2026년 5월 8일" 등
  const parseDate = (s) => {
    if (!s) return null;
    const cleaned = s.trim().replace(/년|월/g, '-').replace(/일/g, '').replace(/\s+/g, '');
    // 8자리 숫자: 20260508
    let m = cleaned.match(/^(\d{4})(\d{2})(\d{2})$/);
    if (m) return [m[1], m[2], m[3]];
    // 4-2-2 또는 4-1-1: 2026-05-08, 2026.5.8, 2026/5/8
    m = cleaned.match(/^(\d{4})[\-\.\/](\d{1,2})[\-\.\/](\d{1,2})\.?$/);
    if (m) return [m[1], m[2].padStart(2, '0'), m[3].padStart(2, '0')];
    return null;
  };
  const handlePaste = (e) => {
    const text = (e.clipboardData || window.clipboardData).getData('text');
    const parsed = parseDate(text);
    if (parsed) {
      e.preventDefault();
      fire(parsed[0], parsed[1], parsed[2]);
    }
  };
  const baseStyle = {
    background:"#08080a", border:"1px solid #1e1e28", borderRadius:6, color:"#e0ddd5",
    fontFamily:"inherit", fontSize:fontSz, padding:"6px 8px", textAlign:"center",
    fontVariantNumeric:"tabular-nums", outline:"none", boxSizing:"border-box"
  };
  const sep = { color:"#444", fontSize:fontSz, lineHeight:1, alignSelf:"center", padding:"0 2px" };
  const onlyDigits = (s) => s.replace(/[^0-9]/g, "");
  return (
    <div style={{ display:"flex", alignItems:"center", gap:0 }}>
      <input ref={yRef} type="text" inputMode="numeric" maxLength={4} value={y}
        onPaste={handlePaste}
        onChange={e => { const ny = onlyDigits(e.target.value).slice(0,4); fire(ny, m, d); if (ny.length === 4) mRef.current && mRef.current.focus(); }}
        placeholder="YYYY" style={{ ...baseStyle, width:60, ...(color && y ? { borderColor: color+"44", color } : {}) }} />
      <span style={sep}>-</span>
      <input ref={mRef} type="text" inputMode="numeric" maxLength={2} value={m}
        onPaste={handlePaste}
        onChange={e => { const nm = onlyDigits(e.target.value).slice(0,2); fire(y, nm, d); if (nm.length === 2) dRef.current && dRef.current.focus(); }}
        placeholder="MM" style={{ ...baseStyle, width:40, ...(color && m ? { borderColor: color+"44", color } : {}) }} />
      <span style={sep}>-</span>
      <input ref={dRef} type="text" inputMode="numeric" maxLength={2} value={d}
        onPaste={handlePaste}
        onChange={e => { const nd = onlyDigits(e.target.value).slice(0,2); fire(y, m, nd); }}
        placeholder="DD" style={{ ...baseStyle, width:40, ...(color && d ? { borderColor: color+"44", color } : {}) }} />
    </div>
  );
};

        if (existing.length > 0) {

          setTimecodeConfirmed(!!existing[0].is_confirmed);

          // 처음 진입: 댓글모음에서 자동 가져오기

          const highlights = (hlRes && hlRes.ok && Array.isArray(hlRes.highlights)) ? hlRes.highlights : [];
          // 시간순 정렬 (초 단위 변환해서 비교)
          const tcToSeconds = (tc) => {
            if (!tc) return Infinity;
            const parts = String(tc).trim().split(':').map(p => parseInt(p) || 0);
            if (parts.length === 2) return parts[0] * 60 + parts[1];
            if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
            return Infinity;
          };
          const sorted = [...highlights].sort((a, b) => tcToSeconds(a.timecode) - tcToSeconds(b.timecode));

          {sel.link && <span onClick={()=>{navigator.clipboard.writeText(sel.link);}} style={{ color:"#cc0000", fontSize:10, fontWeight:700, cursor:"pointer" }}>YT</span>}
          <button onClick={clearSession} style={{ background:"transparent", border:"1px solid #1e1e28", borderRadius:4, padding:"2px 8px", color:"#555", fontSize:10, cursor:"pointer", fontFamily:"inherit" }}>X 해제</button>
        </div>
      )}

      {/* Scrollable Content */}
      <div ref={scrollRef} onScroll={e => setShowTopBtn(e.target.scrollTop > 200)} style={{ flex:1, overflowY:"auto", padding:"0 24px 28px", position:"relative" }}>
        <div style={{ maxWidth:800, margin:"0 auto" }}>

        {loading && <div style={{ textAlign:"center", color:"#444", padding:"68px 0" }}>데이터 로딩 중...</div>}

        {/* ===================================================================== */}
        {/* DASHBOARD */}
        {/* ===================================================================== */}
        {!loading && isDashboard && (<div style={{ paddingTop:28 }}>
          {(() => {
            const DonutB = ({ pctMain, pctSub, color, label, sub, onClick, breakdown }) => {
              const [hovered, setHovered] = useState(false);
              return (
              <div onClick={onClick} onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}
                style={{ textAlign:"center", cursor:"pointer", position:"relative", width:100 }}>
                <svg width="90" height="90" viewBox="0 0 90 90">
                  <circle cx="45" cy="45" r="38" fill="none" stroke="#1a1a1f" strokeWidth="8"/>
                  {pctMain > 0 && <circle cx="45" cy="45" r="38" fill="none" stroke={color} strokeWidth="8"
                    strokeDasharray={238.8} strokeDashoffset={238.8 - (238.8 * Math.min(pctMain,100) / 100)} strokeLinecap="round" transform="rotate(-90 45 45)"/>}
                  <text x="45" y="47" textAnchor="middle" dominantBaseline="middle" fontSize="18" fontWeight="500" fill={pctMain > 0 ? "#e0ddd5" : "#333"}>{Math.round(pctMain)}%</text>
                </svg>
                <div style={{ position:"absolute", bottom:6, right:-8 }}>
                  <svg width="36" height="36" viewBox="0 0 36 36">
                    <circle cx="18" cy="18" r="16" fill="#0a0a10"/>
                    <circle cx="18" cy="18" r="14" fill="none" stroke="#1a1a1f" strokeWidth="4"/>
                    {pctSub > 0 && <circle cx="18" cy="18" r="14" fill="none" stroke="#5DCAA5" strokeWidth="4"
                      strokeDasharray={88} strokeDashoffset={88 - (88 * Math.min(pctSub,100) / 100)} strokeLinecap="round" transform="rotate(-90 18 18)"/>}
                  </svg>
                  <span style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", fontSize:9, fontWeight:500, color: pctSub > 0 ? "#5DCAA5" : "#333" }}>{Math.round(pctSub)}%</span>
                </div>
                <div style={{ fontSize:12, fontWeight:700, marginTop:4, color:"#c8c6c0" }}>{label}</div>
                <div style={{ fontSize:10, color:"#555" }}>{sub}</div>
                {hovered && breakdown && breakdown.length > 0 && (
                  <div style={{ position:"absolute", bottom:"calc(100% + 8px)", left:"50%", transform:"translateX(-50%)", background:"#0a0a10", border:`1px solid ${color}66`, borderRadius:8, padding:"8px 12px", whiteSpace:"nowrap", zIndex:100, boxShadow:"0 4px 16px #00000099", textAlign:"left", pointerEvents:"none" }}>
                    <div style={{ fontSize:11, fontWeight:700, color, marginBottom:6, letterSpacing:0.3 }}>{label}</div>
                    {breakdown.map((g, gi) => (
                      <div key={gi} style={{ marginBottom: gi === breakdown.length-1 ? 0 : 6 }}>
                        {g.title && <div style={{ fontSize:8, color:"rgba(255,255,255,.35)", fontWeight:600, letterSpacing:0.5, marginBottom:3 }}>{g.title}</div>}
                        {g.items.map((it, ii) => (
                          <div key={ii} style={{ display:"flex", justifyContent:"space-between", gap:14, fontSize:10, color:"#c8c6c0", lineHeight:1.6 }}>
                            <span>{it.label}</span>
                            <span style={{ color: it.filled === it.total && it.total > 0 ? color : "#888", fontVariantNumeric:"tabular-nums" }}>{it.filled}/{it.total} ({it.total > 0 ? Math.round(it.filled/it.total*100) : 0}%)</span>
                          </div>
                        ))}
                      </div>
                    ))}
                  </div>
                )}
              </div>
              );
            };
            return [["LIVE","자컨","공식 유튜브","숏폼","MUSIC"],["외부 라디오","외부 예능"],["시상소감","무대","광고"]].map((row, ri) => {
              const allTypes = row.flatMap(sec => Object.entries(TYPE_INFO).filter(([,v]) => v.section === sec));
              return (
                <div key={ri} style={{ marginBottom:24 }}>
                  {ri > 0 && <div style={{ height:1, background:"#1a1a1f", marginBottom:16 }} />}
                  <div style={{ fontSize:9, color:"rgba(255,255,255,.15)", fontWeight:700, letterSpacing:1, marginBottom:12 }}>{row.join(" / ")}</div>
                  <div style={{ display:"flex", gap:20, flexWrap:"wrap" }}>
                    {allTypes.map(([key, info]) => {
                      let pctMain = 0, pctSub = 0, total = 0, sub = "";
                      const breakdown = [];
                      if (key === "song") {
                        total = songs.length;
                        const linkC = songs.filter(s => s.link || s.noLink).length;
                        pctMain = total > 0 ? linkC / total * 100 : 0;
                        pctSub = 0;
                        sub = `${total}곡`;
                        if (total > 0) breakdown.push({ items:[{label:"링크 등록/없음", filled:linkC, total}] });
                      } else if (key === "cover") {
                        total = coverSongs.length;
                        const linkC = coverSongs.filter(s => s.link).length;
                        const countryC = coverSongs.filter(s => s.country && s.country !== "미정").length;
                        pctMain = total > 0 ? linkC / total * 100 : 0;
                        pctSub = total > 0 ? countryC / total * 100 : 0;
                        sub = `${total}곡`;
                        if (total > 0) breakdown.push({ items:[
                          {label:"링크 등록", filled:linkC, total},
                          {label:"나라 결정", filled:countryC, total},
                        ] });
                      } else if (key === "ad") {
                        total = ads.length;
                        pctMain = total > 0 ? 100 : 0; pctSub = 0;
                        sub = `${total}건`;
                        if (total > 0) breakdown.push({ items:[{label:"등록", filled:total, total}] });
                      } else {
                        const items = sessions.filter(s => s.type === key);
                        total = items.length;
                        if (total > 0) {
                          let mainFilled = 0, mainTotal = 0, subFilled = 0, subTotal = 0;
                          const mainItems = [], subItems = [];
                          if (info.tabs.includes("script")) {
                            const f = items.filter(s => s.hasScript || s.naFlags.has("script")).length;
                            mainTotal += total; mainFilled += f;
                            mainItems.push({ label:"스크립트", filled:f, total });
                          }
                          if (info.tabs.includes("highlight") || info.tabs.includes("acceptance")) {
                            const f = items.filter(s => s.hlCount > 0 || s.naFlags.has("highlight")).length;
                            mainTotal += total; mainFilled += f;
                            mainItems.push({ label: info.tabs.includes("acceptance") ? "수상소감" : "댓글모음", filled:f, total });
                          }
                          if (info.tabs.includes("timecode")) {
                            const f = items.filter(s => s.timecodeConfirmed || s.naFlags.has("timecode")).length;
                            mainTotal += total; mainFilled += f;
                            mainItems.push({ label:"타임코드", filled:f, total });
                          }
                          if (info.tabs.includes("shorts")) {
                            const f = items.filter(s => s.previewCnt > 0 || s.naFlags.has("shorts")).length;
                            mainTotal += total; mainFilled += f;
                            mainItems.push({ label:"예고 쇼츠", filled:f, total });
                          }
                          if (info.tabs.includes("clips")) {
                            const f = items.filter(s => s.clipCount > 0 || s.naFlags.has("clips")).length;
                            subTotal += total; subFilled += f;
                            subItems.push({ label:"클립", filled:f, total });
                          }
                          if (info.tabs.includes("setlist")) {
                            const f = items.filter(s => s.naFlags.has("setlist_done") || s.naFlags.has("setlist")).length;
                            subTotal += total; subFilled += f;
                            subItems.push({ label:"셋리스트", filled:f, total });
                          }
                          // 엔딩곡 — 라이브 한정
                          if (key === "live") {
                            const f = items.filter(s => s.endingCnt > 0 || s.naFlags.has("ending")).length;
                            subTotal += total; subFilled += f;
                            subItems.push({ label:"엔딩곡", filled:f, total });
                          }
                          // 태그는 진행도에서 제외.
                          // - 콘텐츠 탭 0개 (팝업): 등록 50% + 링크 50%
                          // - 메인 콘텐츠 0개, 서브만 있음 (concert): 등록만으로 50%
                          // - 메인 콘텐츠 있음 (라이브/라디오 등): 등록 50% + 콘텐츠 50%
                          const contentCount = (info.tabs.includes("script")?1:0) + (info.tabs.includes("highlight")||info.tabs.includes("acceptance")?1:0) + (info.tabs.includes("shorts")?1:0) + (info.tabs.includes("clips")?1:0) + (info.tabs.includes("setlist")?1:0);
                          if (contentCount === 0) {
                            const f = items.filter(s => s.link).length;
                            mainTotal = total * 2;
                            mainFilled = total + f;
                            mainItems.unshift({ label:"등록", filled:total, total });
                            mainItems.push({ label:"링크 등록", filled:f, total });
                          } else if (mainItems.length === 0) {
                            mainTotal = total * 2;
                            mainFilled = total;
                            mainItems.unshift({ label:"등록", filled:total, total });
                          } else {
                            // 메인 콘텐츠 있음: 등록을 콘텐츠 합과 같은 가중치로 추가
                            // → 콘텐츠 0% 채우면 50%, 콘텐츠 100% 채우면 100%
                            const registrationWeight = mainTotal;
                            mainTotal = mainTotal + registrationWeight;
                            mainFilled = mainFilled + registrationWeight;
                            mainItems.unshift({ label:"등록", filled:total, total });
                          }
                          pctMain = mainTotal > 0 ? mainFilled / mainTotal * 100 : 0;
                          pctSub = subTotal > 0 ? subFilled / subTotal * 100 : 0;
                          if (mainItems.length > 0) breakdown.push({ title:"메인 진행도", items:mainItems });
                          if (subItems.length > 0) breakdown.push({ title:"서브 진행도", items:subItems });
                        }
                        sub = `${total}건`;
                      }
                      return <DonutB key={key} pctMain={pctMain} pctSub={pctSub} color={info.color} label={info.label} sub={sub} onClick={() => switchSidebar(key)} breakdown={breakdown} />;
                    })}
                  </div>
                </div>
              );
            });
          })()}
        </div>)}

        {/* ===================================================================== */}
        {/* TAB: LIST (라이브/라디오/라쓰고) */}
        {/* ===================================================================== */}
        {!loading && activeTab === "list" && isSessionType && (<div>
          {/* Filter Bar + Quick Nav (sticky) */}
          <div style={{ position:"sticky", top:0, zIndex:40, background:"#08080a", paddingTop:12, paddingBottom:8 }}>
          {/* Filter Bar */}
          <div style={{ background:"#0a0a10", border:`1px solid ${curType.color}15`, borderRadius:12, padding:"14px 18px", marginBottom:8 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <button onClick={() => setFilter("all")} style={{
                  color: filter === "all" ? curType.color : "#888", border:`1px solid ${filter === "all" ? curType.color+"66" : "#1a1a2f"}`, borderRadius:8, padding:"4px 18px", cursor:"pointer",
                  fontFamily:"inherit", fontSize:12, fontWeight:700,
                  background: filter === "all" ? `${curType.color}15` : "#111118",
                }}>전체 {typeSessions.length}</button>
                <span style={{ fontSize:11, color:"#555" }}>{filtered.length}개 표시</span>
                <button onClick={() => setHideDone(!hideDone)} style={{ fontSize:10, fontWeight:600, padding:"3px 10px", borderRadius:6, cursor:"pointer", fontFamily:"inherit", border:`1px solid ${hideDone ? curType.color+"44" : "#1e1e28"}`, color: hideDone ? curType.color : "#555", background: hideDone ? `${curType.color}12` : "transparent" }}>완료 숨기기 {hideDone ? "ON" : "OFF"}</button>
                {sidebarType === "live" && (
                  <button onClick={() => setBulkExtractOpen(true)} style={{ fontSize:10, fontWeight:600, padding:"3px 10px", borderRadius:6, cursor:"pointer", fontFamily:"inherit", border:"1px solid #44aaff66", color:"#44aaff", background:"#44aaff15" }}>🔁 엔딩곡 일괄 추출</button>
                )}
              </div>
              <div style={{ display:"flex", borderRadius:8, overflow:"hidden", border:`1px solid ${curType.color}44` }}>
                {[["desc","최신순"],["asc","오래된순"]].map(([v,l]) => (
                  <button key={v} onClick={() => setSortOrder(v)} style={{
                    background: sortOrder === v ? `${curType.color}22` : "transparent", border:"none",
                    borderRight: v === "desc" ? `1px solid ${curType.color}44` : "none",
                    color: sortOrder === v ? curType.color : "rgba(255,255,255,.35)",
                    fontFamily:"inherit", fontSize:10, fontWeight:600, padding:"4px 10px", cursor:"pointer",
                  }}>{l}</button>
                ))}
              </div>
            </div>
            {(() => {
              const cc = curType.color;
              const naKey = (tab) => tab === "highlight" || tab === "acceptance" ? "highlight" : tab;
              const hasData = (s, tab) => {
                if (tab === "script") return s.hasScript;
                if (tab === "highlight" || tab === "acceptance") return s.hlCount > 0;
                if (tab === "tags") return s.hasTags;
                if (tab === "clips") return s.clipCount > 0;
                return false;
              };
              const filterItems = [];
              const contentTabs = curType.tabs.filter(t => ["script","highlight","acceptance","tags","clips","setlist"].includes(t));
              contentTabs.forEach(tab => {
                const nk = naKey(tab);
                const label = tab === "script" ? "스크립트" : tab === "highlight" ? "댓글모음" : tab === "acceptance" ? "수상소감" : tab === "tags" ? "태그" : tab === "clips" ? "클립" : "셋리스트";
                const hc = typeSessions.filter(s => hasData(s, tab)).length;
                const nac = typeSessions.filter(s => s.naFlags.has(nk)).length;
                const nc = typeSessions.length - hc - nac;
                const hk = tab === "highlight" || tab === "acceptance" ? "has-hl" : `has-${tab === "clips" ? "clip" : tab}`;
                const nak = tab === "highlight" || tab === "acceptance" ? "na-hl" : `na-${tab === "clips" ? "clip" : tab}`;
                const nok = tab === "highlight" || tab === "acceptance" ? "no-hl" : `no-${tab === "clips" ? "clip" : tab}`;
                filterItems.push({ label, hk, nak, nok, hc, nac, nc });
              });
              // 엔딩곡 — 라이브 한정
              if (sidebarType === "live") {
                const hc = typeSessions.filter(s => s.endingCnt > 0).length;
                const nac = typeSessions.filter(s => s.naFlags.has("ending")).length;
                const nc = typeSessions.length - hc - nac;
                filterItems.push({ label:"엔딩곡", hk:"has-ending", nak:"na-ending", nok:"no-ending", hc, nac, nc });
              }
              const cols = Math.min(filterItems.length, 6);
              return (
                <div style={{ display:"grid", gridTemplateColumns:`repeat(${cols}, 1fr)`, gap:8 }}>
                  {filterItems.map(f => (
                    <div key={f.label} style={{ display:"flex", flexDirection:"column", gap:4 }}>
                      <div style={{ fontSize:9, color:"rgba(255,255,255,.35)", fontWeight:600 }}>{f.label}</div>
                      <div style={{ display:"flex", gap:3 }}>
                        {[["등록",f.hk,f.hc,cc],["없음",f.nak,f.nac,cc],["미등록",f.nok,f.nc,"#555555"]].map(([lbl,key,cnt,col]) => (
                          <button key={key} onClick={() => setFilter(filter === key ? "all" : key)} style={{
                            flex:1, border:`1px solid ${filter === key ? col+"66" : cnt > 0 ? col+"22" : "rgba(255,255,255,.05)"}`,
                            borderRadius:5, padding:"3px 0", cursor:"pointer", fontFamily:"inherit",
                            background: filter === key ? `${col}18` : cnt > 0 ? `${col}08` : "transparent",
                            display:"flex", flexDirection:"column", alignItems:"center", gap:0,
                          }}>
                            <span style={{ fontSize:7, color: filter === key ? col : cnt > 0 ? col : "#444", letterSpacing:0.5 }}>{lbl}</span>
                            <span style={{ fontSize:12, fontWeight:700, color: filter === key ? col : cnt > 0 ? col : "rgba(255,255,255,.12)", fontVariantNumeric:"tabular-nums" }}>{cnt}</span>
                          </button>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              );
            })()}
          </div>

          {/* Selected Session Quick Nav */}
          {sel && (
            <div style={{ background:"#0a0a10", border:`1px solid ${curType.color}22`, borderRadius:10, padding:"12px 16px", marginBottom:16, display:"flex", alignItems:"center", gap:12 }}>
              <span style={{ fontSize:12, color:curType.color, fontWeight:700 }}>#{sel.no}</span>
              <span style={{ fontSize:12, color:"#c8c6c0", fontWeight:600, flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{sel.title}</span>
              {sel.link && <span onClick={()=>{navigator.clipboard.writeText(sel.link);}} style={{ fontSize:10, padding:"3px 10px", borderRadius:6, background:"#1a0a0a", border:"1px solid #cc000033", color:"#cc0000", fontWeight:700, flexShrink:0, cursor:"pointer" }}>YT</span>}
              <div style={{ display:"flex", gap:4, flexShrink:0 }}>
                {curType.tabs.filter(t => t !== "list" && t !== "register").map(t => (
                  <button key={t} onClick={() => switchTab(t)} style={{ fontSize:10, padding:"4px 10px", borderRadius:6, cursor:"pointer", fontFamily:"inherit", fontWeight:600, background:"#111118", border:"1px solid #1e1e28", color:"#888" }}>{TAB_LABELS[t]}</button>
                ))}
                <button onClick={clearSession} style={{ fontSize:10, padding:"4px 8px", borderRadius:6, cursor:"pointer", fontFamily:"inherit", background:"transparent", border:"1px solid #1e1e28", color:"#555" }}>X</button>
              </div>
            </div>
          )}
          </div>{/* end sticky */}

          {/* Session List */}
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {filtered.map(s => (
              <div key={s.no} onClick={() => selectSession(s)}
                style={{ background:"#0f0f12", border:"1px solid #1a1a1f", borderRadius:12, padding:"12px 14px", cursor:"pointer", display:"flex", alignItems:"center", gap:12 }}
                onMouseEnter={e => { e.currentTarget.style.borderColor="#2a2a3f"; e.currentTarget.style.background="#111116"; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor="#1a1a1f"; e.currentTarget.style.background="#0f0f12"; }}>
                <div style={{ minWidth:38, height:38, borderRadius:8, background:`${curType.color}12`, border:`1px solid ${curType.color}33`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:800, color:curType.color, fontVariantNumeric:"tabular-nums" }}>
                  {s.no}
                </div>
                {s.link ? <Thumb url={s.link} thumbnail_url={s.thumbnail_url} /> : <NoLinkWarn />}
                {curType.tabs.includes("shorts") && (
                  <div style={{ display:"flex", gap:3, flexShrink:0 }}>
                    {(() => {
                      // 예고 섬네일 (있으면 표시, 없으면 placeholder)
                      const url = s.firstPreviewUrl;
                      const m = url && url.match(/(?:v=|youtu\.be\/|\/live\/|\/shorts\/)([^&?/]+)/);
                      const tsrc = m ? `https://img.youtube.com/vi/${m[1]}/mqdefault.jpg` : null;
                      return tsrc
                        ? <img src={tsrc} title={`예고: ${url}`} style={{ width:48, height:48, borderRadius:6, objectFit:"cover", background:"#111", border:"1px solid #fbbf2444" }} onError={e=>{e.target.style.display="none";}} />
                        : <div style={{ width:48, height:48, borderRadius:6, background:"#0a0a0a", border:"1px dashed #1e1e1e", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, color:"#333", flexShrink:0 }}>예고</div>;
                    })()}
                    {s.firstClipUrl && s.firstClipThumb
                      ? <img src={s.firstClipThumb} title={`비하인드: ${s.firstClipUrl}`} style={{ width:48, height:48, borderRadius:6, objectFit:"cover", background:"#111", border:"1px solid #44aaff44" }} onError={e=>{e.target.style.display="none";}} />
                      : <div style={{ width:48, height:48, borderRadius:6, background:"#0a0a0a", border:"1px dashed #1e1e1e", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, color:"#333", flexShrink:0 }}>클립</div>
                    }
                  </div>
                )}
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:13, fontWeight:600, lineHeight:1.4, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{s.title}</div>
                  <div style={{ display:"flex", alignItems:"center", gap:6, marginTop:4, flexWrap:"wrap" }}>
                    <span style={{ fontSize:11, color:"#444", fontVariantNumeric:"tabular-nums" }}>{s.date}</span>
                    {(s.account || s.broadcaster) && (
                      <span style={{ fontSize:10, color:"#aaa", padding:"2px 6px", borderRadius:4, background:`${curType.color}18`, border:`1px solid ${curType.color}33` }}>
                        {s.account || s.broadcaster}
                      </span>
                    )}
                    {s.category && (
                      <span style={{ fontSize:10, color:"#aaa", padding:"2px 6px", borderRadius:4, background:"#1a1a1a", border:"1px solid #333" }}>
                        #{s.category}
                      </span>
                    )}
                    <MemberDisplay s={s} />
                  </div>
                </div>

                      {saving ? "추출 중..." : "🎯 댓글모음에서 자동 추출"}

                  {/* 재추출 — 엔딩곡 이미 있을 때만 표시 */}

                      setSaving(true);
                      try {
                        const r = await post({ action:"extractEndings", session_id: sel.id, force: true });

                  <button onClick={async()=>{
                    if (endingItems.length > 0) { alert("이미 엔딩곡이 등록되어 있어요. 셋리스트에서 [엔딩] 행을 [곡]으로 바꾸거나 삭제 후 다시 시도해주세요."); return; }
                    const newFlags = new Set(sel.naFlags||[]);
                    if (newFlags.has("ending")) newFlags.delete("ending"); else newFlags.add("ending");

                    await loadData('sessions');
                  }} style={{ fontSize:11, fontWeight:600, padding:"5px 12px", borderRadius:6, cursor:"pointer", fontFamily:"inherit", border:`1px solid ${noEnding?"#88888866":"#1e1e28"}`, color:noEnding?"#888":"#555", background:noEnding?"#88888815":"transparent" }}>

                  </button>
                </div>

            {setlistLoaded && setlistData.length > 0 && (<div style={{ marginBottom:14 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
                <span style={{ fontSize:12, color:"#888", fontWeight:600 }}>셋리스트 ({setlistData.length}곡)</span>
                <div style={{ flex:1 }} />
                <button onClick={()=>setConfirmDeleteSetlist(true)} style={{ background:"transparent", border:"1px solid #3a1a1a", borderRadius:6, padding:"4px 10px", color:"#f87171", fontSize:11, cursor:"pointer", fontFamily:"inherit" }}>전체 삭제</button>

              {confirmDeleteSetlist && (<div style={{ background:"#1a0a0a", border:"1px solid #3a1a1a", borderRadius:8, padding:14, marginBottom:10 }}>

                  }} style={S.btnDanger}>{saving ? "삭제 중..." : "삭제하기"}</button>
                  <button onClick={()=>setConfirmDeleteSetlist(false)} style={{ background:"#111114", border:"1px solid #1e1e28", borderRadius:8, padding:"10px 16px", color:"#666", fontSize:13, cursor:"pointer", fontFamily:"inherit" }}>취소</button>

                </span>
                {s.timecode && <span style={{ color:"#44aaff", fontSize:11, fontFamily:"monospace", minWidth:40 }}>{s.timecode}</span>}
                <span style={{ flex:1, color:"#c8c6c0", fontWeight:600 }}>{s.song_title}</span>
                <span style={{ color:"#555", fontSize:11 }}>{s.artist||""}</span>

                <button onClick={async()=>{if(!confirm("삭제?"))return;await post({action:"deleteSetlistItem",id:s.id});setSetlistData(setlistData.filter(x=>x.id!==s.id));}} style={{ background:"transparent", border:"none", color:"#f87171", fontSize:10, cursor:"pointer" }}>X</button>
              </div>))}
              </div>
            </div>)}
            {setlistLoaded && setlistData.length === 0 && <div style={{ color:"#444", fontSize:12, marginBottom:14 }}>아직 등록된 노래가 없어요</div>}
            {setlistLoaded && (<div>
              {/* 붙여넣기 파싱 */}
              <div style={{ fontSize:14, fontWeight:700, marginBottom:8 }}>셋리스트 붙여넣기</div>
              <div style={{ background:"#0a0a0c", border:"1px solid #1a1a1f", borderRadius:8, padding:"10px 14px", marginBottom:10, fontSize:12, color:"#444", lineHeight:1.8 }}>

                <span style={{ color:"#44aaff", fontFamily:"monospace" }}>1:23:45</span> <span style={{ color:"#888" }}>곡명</span> 타임코드 자동 분리 |
                <span style={{ color:"#44aaff", fontFamily:"monospace" }}>1:23:45</span> <span style={{ color:"#888" }}>곡명 - 아티스트</span> 하이픈으로 아티스트 분리<br />

              </div>

              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:8 }}>
                <span style={{ fontSize:12, color:"#444" }}>{setlistText ? setlistText.split("\n").filter(l=>l.trim()).length + "줄 입력됨" : "아직 없음"}</span>
                <button onClick={()=>{
                  const lines = setlistText.split("\n"); const parsed = [];
                  for (const raw of lines) {
                    let line = raw.trim(); if (!line) continue;
                    let perfType = "song";
                    if (line.match(/^\[춤\]\s*/)) { perfType = "dance"; line = line.replace(/^\[춤\]\s*/, ""); }
                    const tc = line.match(/^(\d{1,2}:\d{2}(?::\d{2})?)~?\s*(.*)/);
                    // 타임코드 없으면 스킵 / 타임코드 있어도 텍스트(곡명) 없으면 스킵
                    if (!tc || !tc[2]) continue;
                    let timecode = tc[1], rest = tc[2];
                    const dash = rest.match(/^(.+?)\s*-\s*(.+)$/);
                    let songTitle = rest, artist = "";
                    if (dash) { songTitle = dash[1].trim(); artist = dash[2].trim(); }
                    parsed.push({ order_index:parsed.length+1, song_title:songTitle, artist:artist||null, timecode:timecode||null, is_original:false, perf_type:perfType });
                  }
                  setSetlistParsed(parsed);
                }} style={S.btnPrimary(!!setlistText)}>파싱 및 미리보기</button>

                      <div style={{ color:"#44aaff", fontFamily:"monospace", fontSize:11 }}>{row.timecode||""}</div>
                      <div style={{ color:"#c8c6c0", fontWeight:600 }}>{row.song_title}</div>
                      <div style={{ color:"#555", fontSize:11 }}>{row.artist||""}</div>
                    </div>

                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={()=>{setSetlistParsed([]);setSetlistText("");}} style={{ background:"transparent", border:"1px solid #1e1e28", borderRadius:8, padding:"10px 16px", color:"#666", fontSize:13, cursor:"pointer", fontFamily:"inherit" }}>이전</button>

                      alert("저장 완료! " + setlistParsed.length + "곡"); setSetlistText(""); setSetlistParsed([]);
                      const res=await api("getSetlist",{session_id:sel.id}); if(res.ok) setSetlistData(res.setlist||[]);
                    } catch(e) { alert("실패: "+e.message); }
                    setSaving(false);
                  }} style={S.btnPrimary(true)}>{saving ? "저장 중..." : "저장"}</button>
                </div>
              </div>)}
            </div>)}
          </div>)}
        </div>)}

        {/* ===================================================================== */}

        {/* ===================================================================== */}
        {/* TAB: SONG LIST (발매곡 목록) */}
        {/* ===================================================================== */}
        {!loading && activeTab === "list" && isSong && (<div>
          {/* Filter Bar + Quick Nav (sticky) */}
          <div style={{ position:"sticky", top:0, zIndex:40, background:"#08080a", paddingTop:12, paddingBottom:8 }}>
          {/* Filter Bar */}
          <div style={{ background:"#0a0a10", border:`1px solid ${curType.color}15`, borderRadius:12, padding:"14px 18px", marginBottom:8 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <button onClick={() => setFilter("all")} style={{
                  color: filter === "all" ? curType.color : "#888", border:`1px solid ${filter === "all" ? curType.color+"66" : "#1a1a2f"}`, borderRadius:8, padding:"4px 18px", cursor:"pointer",
                  fontFamily:"inherit", fontSize:12, fontWeight:700,
                  background: filter === "all" ? `${curType.color}15` : "#111118",
                }}>전체 {songs.length}</button>
                <span style={{ fontSize:11, color:"#555" }}>{filteredSongs.length}곡 표시</span>

                  <button key={v} onClick={() => setSortOrder(v)} style={{
                    background: sortOrder === v ? `${curType.color}22` : "transparent", border:"none",
                    borderRight: v === "desc" ? `1px solid ${curType.color}44` : "none",
                    color: sortOrder === v ? curType.color : "rgba(255,255,255,.35)",
                    fontFamily:"inherit", fontSize:10, fontWeight:600, padding:"4px 10px", cursor:"pointer",
                  }}>{l}</button>
                ))}
              </div>
            </div>
            {(() => {
              const cc = curType.color;
              const tagsHas = songs.filter(s => s.tags_a || s.tags_b || s.tags_c).length;
              const filterItems = [
                { label:"태그", hk:"has-tag", nok:"no-tag", hc:tagsHas, nc:songs.length - tagsHas },
              ];
              return (
                <div style={{ display:"grid", gridTemplateColumns:"1fr", gap:8 }}>
                  {filterItems.map(f => (
                    <div key={f.label} style={{ display:"flex", flexDirection:"column", gap:4 }}>
                      <div style={{ fontSize:9, color:"rgba(255,255,255,.35)", fontWeight:600 }}>{f.label}</div>
                      <div style={{ display:"flex", gap:3 }}>
                        {[["등록",f.hk,f.hc,cc],["미등록",f.nok,f.nc,"#555555"]].map(([lbl,key,cnt,col]) => (
                          <button key={key} onClick={() => setFilter(filter === key ? "all" : key)} style={{
                            flex:1, border:`1px solid ${filter === key ? col+"66" : cnt > 0 ? col+"22" : "rgba(255,255,255,.05)"}`,
                            borderRadius:5, padding:"3px 0", cursor:"pointer", fontFamily:"inherit",
                            background: filter === key ? `${col}18` : cnt > 0 ? `${col}08` : "transparent",
                            display:"flex", flexDirection:"column", alignItems:"center", gap:0,
                          }}>
                            <span style={{ fontSize:7, color: filter === key ? col : cnt > 0 ? col : "#444", letterSpacing:0.5 }}>{lbl}</span>
                            <span style={{ fontSize:12, fontWeight:700, color: filter === key ? col : cnt > 0 ? col : "rgba(255,255,255,.12)", fontVariantNumeric:"tabular-nums" }}>{cnt}</span>
                          </button>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              );
            })()}
          </div>

          {/* Selected Song Quick Nav */}
          {selectedSong && (
            <div style={{ background:"#0a0a10", border:`1px solid ${curType.color}22`, borderRadius:10, padding:"12px 16px", marginBottom:16, display:"flex", alignItems:"center", gap:12 }}>
              <span style={{ fontSize:12, color:curType.color, fontWeight:700, flexShrink:0 }}>{selectedSong.title}</span>
              <span style={{ fontSize:10, color:"#444", flexShrink:0 }}>{selectedSong.album}</span>
              {selectedSong.link && <span onClick={()=>{navigator.clipboard.writeText(selectedSong.link);}} style={{ fontSize:10, padding:"3px 10px", borderRadius:6, background:"#1a0a0a", border:"1px solid #cc000033", color:"#cc0000", fontWeight:700, flexShrink:0, cursor:"pointer" }}>YT</span>}
              <div style={{ display:"flex", gap:4, flexShrink:0, marginLeft:"auto" }}>
                {curType.tabs.filter(t => t !== "list" && t !== "register").map(t => (
                  <button key={t} onClick={() => switchTab(t)} style={{ fontSize:10, padding:"4px 10px", borderRadius:6, cursor:"pointer", fontFamily:"inherit", fontWeight:600, background:"#111118", border:"1px solid #1e1e28", color:"#888" }}>{TAB_LABELS[t]}</button>
                ))}
                <button onClick={()=>{setSelectedSong(null);}} style={{ fontSize:10, padding:"4px 8px", borderRadius:6, cursor:"pointer", fontFamily:"inherit", background:"transparent", border:"1px solid #1e1e28", color:"#555" }}>X</button>
              </div>
            </div>
          )}
          </div>{/* end sticky */}

          {/* Album-grouped Song List */}
          {(() => {
            const albumGroups = [];
            const seenMap = new Map();
            filteredSongs.forEach(s => {
              const key = s.album || "기타";
              if (!seenMap.has(key)) {
                const g = { album:key, date:s.date, songs:[] };
                seenMap.set(key, g);
                albumGroups.push(g);
              }
              seenMap.get(key).songs.push(s);
            });
            albumGroups.sort((a,b) => sortOrder === "desc" ? (b.date||"").localeCompare(a.date||"") : (a.date||"").localeCompare(b.date||""));

            <h2 style={{ fontSize:18, fontWeight:700, marginBottom:4 }}>커버곡 태그</h2>
          </div>
          {!selectedSong && (
            <div style={{ display:"flex", gap:6, marginBottom:20 }}>
              <input type="text" placeholder="곡명 검색" value={songSearchTitle} onChange={e=>{setSongSearchTitle(e.target.value);setSongResults([]);}}
                onKeyDown={e=>{if(e.key==="Enter"){const r=coverSongs.filter(s=>s.title.toLowerCase().includes(songSearchTitle.toLowerCase()));if(r.length===1)setSelectedSong(r[0]);else setSongResults(r);}}}
                style={{ flex:1, ...S.inputSm, fontSize:14 }} />
              <button onClick={()=>{const r=coverSongs.filter(s=>s.title.toLowerCase().includes(songSearchTitle.toLowerCase()));if(r.length===1)setSelectedSong(r[0]);else setSongResults(r);}} style={S.btnPrimary(!!songSearchTitle)}>검색</button>
            </div>
          )}
          {selectedSong && (<div style={S.card}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:14 }}>
              <div><div style={{ fontSize:14, fontWeight:700 }}>{selectedSong.title}</div></div>
              <button onClick={()=>{setSelectedSong(null);setSongSearchTitle("");}} style={{ background:"transparent", border:"1px solid #1e1e28", borderRadius:4, padding:"2px 8px", color:"#555", fontSize:10, cursor:"pointer", fontFamily:"inherit" }}>X 해제</button>
            </div>
            <div style={{ marginBottom:10 }}>
              <label style={S.label("#4466ff")}>태그 <span style={{ color:"#444", fontWeight:400 }}>(쉼표 구분)</span></label>
              <input value={songTagData.tags_a} onChange={e=>setSongTagData({...songTagData,tags_a:e.target.value})} placeholder="발라드,감성,킬링파트" style={{ width:"100%", ...S.inputSm }} />
            </div>
            <button onClick={async()=>{
              setSaving(true);
              try{await post({action:"updateCoverSong",id:selectedSong.id,data:{tags_a:songTagData.tags_a||null,tags_b:null,tags_c:null}});alert("태그 저장 완료!");await loadData('covers');}
              catch(e){alert("실패: "+e.message);}
              setSaving(false);
            }} style={S.btnPrimary(true)}>{saving ? "저장 중..." : "태그 저장"}</button>
          </div>)}
        </div>)}

        </div>
      </div>
      {/* Bottom Loading Bar */}
      {!loadDone && (
        <div style={{ position:"absolute", bottom:0, left:0, right:0, borderTop:"1px solid #1a1a1f", padding:"8px 16px", display:"flex", alignItems:"center", gap:12, background:"#0a0a0e", zIndex:55, opacity: !loading && loadProg === 100 ? 0 : 1, transition:"opacity 0.4s ease" }}>
          <div style={{ flex:1, height:3, background:"#1a1a1f", borderRadius:2, overflow:"hidden" }}>
            <div style={{ width:`${loadProg}%`, height:"100%", background: isDashboard ? "#4466ff" : curType.color, borderRadius:2, transition:"width 0.3s ease-out" }} />
          </div>
          <span style={{ fontSize:11, color: isDashboard ? "#4466ff" : curType.color, fontWeight:600, minWidth:28, textAlign:"right" }}>{loadProg}%</span>
          <span style={{ fontSize:10, color:"#444", whiteSpace:"nowrap" }}>{loadStep}</span>
        </div>
      )}
      {/* Bulk Action Bar (Cover only) */}
      {isCover && activeTab === "list" && coverSelectedIds.size > 0 && (
        <div style={{ position:"absolute", bottom: !loadDone ? 52 : 20, left:28, right:90, background:"#0a0a10", border:`1px solid ${curType.color}44`, borderRadius:12, padding:"10px 16px", display:"flex", alignItems:"center", gap:10, zIndex:65, boxShadow:"0 -4px 20px #00000099", flexWrap:"wrap" }}>
          <span style={{ fontSize:12, color:curType.color, fontWeight:700, flexShrink:0 }}>{coverSelectedIds.size}개 선택</span>
          <span style={{ width:1, height:18, background:"#1e1e28", flexShrink:0 }} />
          <select value={bulkData.country} onChange={e=>setBulkData({...bulkData, country:e.target.value})}
            style={{ background:"#08080a", border:`1px solid ${bulkData.country?curType.color+"66":"#1e1e28"}`, color:bulkData.country?curType.color:"#888", borderRadius:6, padding:"5px 8px", fontSize:11, fontFamily:"inherit", cursor:"pointer", outline:"none" }}>
            <option value="">나라 (변경 안 함)</option>
            {["한국","일본","대만","중국","팝송","미정"].map(v => <option key={v} value={v}>{v}</option>)}
          </select>
          <select value={bulkData.playlist} onChange={e=>setBulkData({...bulkData, playlist:e.target.value})}
            style={{ background:"#08080a", border:`1px solid ${bulkData.playlist?curType.color+"66":"#1e1e28"}`, color:bulkData.playlist?curType.color:"#888", borderRadius:6, padding:"5px 8px", fontSize:11, fontFamily:"inherit", cursor:"pointer", outline:"none" }}>
            <option value="">카테고리 (변경 안 함)</option>
            {["영상커버","콘서트커버","숏폼커버","버블커버","라이브커버","COVER","From. PLAVE","PLAVE BIRTHDAY GIFT"].map(v => <option key={v} value={v}>{v}</option>)}
          </select>
          <select value={bulkData.section} onChange={e=>setBulkData({...bulkData, section:e.target.value})}
            style={{ background:"#08080a", border:`1px solid ${bulkData.section?curType.color+"66":"#1e1e28"}`, color:bulkData.section?curType.color:"#888", borderRadius:6, padding:"5px 8px", fontSize:11, fontFamily:"inherit", cursor:"pointer", outline:"none" }}>
            <option value="">섹션 (변경 안 함)</option>
            {["풀커버","한소절만"].map(v => <option key={v} value={v}>{v}</option>)}
          </select>
          <div style={{ flex:1 }} />
          <button onClick={async()=>{
            const data = {};
            if (bulkData.country) data.country = bulkData.country;
            if (bulkData.playlist) data.playlist = bulkData.playlist;
            if (bulkData.section) data.section = bulkData.section;
            if (Object.keys(data).length === 0) return alert("변경할 항목을 1개 이상 선택해주세요");
            const ids = [...coverSelectedIds];
            if (!confirm(`${ids.length}개 곡에 다음을 일괄 적용할까요?\n${Object.entries(data).map(([k,v])=>`${k}: ${v}`).join("\n")}`)) return;
            setSaving(true);
            try {
              const res = await post({ action:"bulkUpdateCoverSongs", ids, data });
              if (res.ok) {
                alert(`완료! ${res.count}개 수정됨`);
                setCoverSelectedIds(new Set());
                setBulkData({ country:"", playlist:"", section:"" });
                await loadData('covers');
              } else alert("실패: " + (res.message || JSON.stringify(res)) + (res.detail ? "\n\n" + res.detail : ""));
            } catch(e) { alert("실패: " + e.message); }
            setSaving(false);
          }} style={{ background:`${curType.color}22`, border:`1px solid ${curType.color}66`, borderRadius:6, padding:"6px 14px", color:curType.color, fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"inherit", flexShrink:0 }}>
            {saving ? "적용 중..." : "적용"}
          </button>
          <button onClick={()=>{setCoverSelectedIds(new Set()); setBulkData({ country:"", playlist:"", section:"" });}}
            style={{ background:"transparent", border:"1px solid #1e1e28", borderRadius:6, padding:"6px 12px", color:"#888", fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:"inherit", flexShrink:0 }}>
            취소
          </button>
        </div>
      )}
      {/* Refresh current tab */}
      {!isDashboard && (
        <button onClick={() => {
          const scope = isAd ? 'ads' : isCover ? 'covers' : isSong ? 'songs' : 'sessions';
          loadData(scope);
        }} title="현재 탭 새로고침"
          style={{ position:"absolute", bottom: !loadDone ? 52 : 20, right:28, width:40, height:40, borderRadius:20, background:`${curType.color}18`, border:`1px solid ${curType.color}44`, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", zIndex:60, transition:"opacity 0.2s", opacity: loading ? 0.4 : 1 }}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M13.5 7A5.5 5.5 0 1 0 13 11" stroke={curType.color} strokeWidth="1.5" strokeLinecap="round" fill="none"/>
            <path d="M13.5 3v4h-4" stroke={curType.color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
          </svg>
        </button>
      )}
      {/* Scroll to Top */}
      {showTopBtn && (
        <button onClick={() => scrollRef.current && scrollRef.current.scrollTo({top:0, behavior:"smooth"})}
          style={{ position:"absolute", bottom: !loadDone ? 102 : 70, right:28, width:40, height:40, borderRadius:20, background:`${isDashboard ? "#4466ff" : curType.color}18`, border:`1px solid ${isDashboard ? "#4466ff" : curType.color}44`, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", zIndex:60, transition:"opacity 0.2s" }}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 12V4M4 7l4-4 4 4" stroke={isDashboard ? "#4466ff" : curType.color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
      )}

      {/* 엔딩곡 일괄 추출 모달 */}
      {bulkExtractOpen && (
        <div onClick={() => { if (!bulkExtractRunning) setBulkExtractOpen(false); }} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.7)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200 }}>
          <div onClick={e => e.stopPropagation()} style={{ background:"#0d0d0f", border:"1px solid #1a1a1f", borderRadius:10, padding:24, width:680, maxWidth:"90vw", maxHeight:"85vh", overflowY:"auto" }}>
            <div style={{ fontSize:16, fontWeight:700, marginBottom:8, color:"#44aaff" }}>🔁 엔딩곡 일괄 추출</div>
            <div style={{ fontSize:12, color:"#888", marginBottom:16, lineHeight:1.6 }}>
              모든 라이브 세션을 순회하며 댓글모음 기준으로 엔딩곡을 추출합니다.<br/>
              추출 실패 시 기존 엔딩곡은 유지됩니다 (안전).
            </div>
            <div style={{ background:"#1a0a0a", border:"1px solid #3a1a1a", borderRadius:6, padding:12, color:"#f87171", fontSize:11, marginBottom:14, lineHeight:1.6 }}>
              ⚠️ <strong>강제 모드 ON</strong>일 때 이미 등록된 엔딩곡이 새 추출 결과로 덮어써질 수 있습니다.
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14, fontSize:12 }}>
              <input type="checkbox" id="bulkForce" checked={bulkExtractForce} disabled={bulkExtractRunning} onChange={e => setBulkExtractForce(e.target.checked)} style={{ cursor:"pointer" }} />
              <label htmlFor="bulkForce" style={{ color:"#aaa", cursor:"pointer" }}>강제 재추출 (기존 엔딩곡 덮어씀) — 끄면 기존 있는 세션은 스킵</label>
            </div>

            {bulkExtractStats.total > 0 && (
              <>
                <div style={{ background:"#0d0d0f", border:"1px solid #1a1a1f", height:24, borderRadius:6, overflow:"hidden", marginBottom:10, position:"relative" }}>
                  <div style={{ height:"100%", background:"#44aaff33", width: `${Math.round(bulkExtractStats.current/bulkExtractStats.total*100)}%`, transition:"width 0.2s" }} />
                  <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:600, color:"#44aaff" }}>
                    {bulkExtractStats.current} / {bulkExtractStats.total} ({Math.round(bulkExtractStats.current/bulkExtractStats.total*100)}%)
                  </div>
                </div>
                <div style={{ display:"flex", gap:10, marginBottom:14, fontSize:11, flexWrap:"wrap" }}>
                  <div style={{ padding:"4px 10px", background:"#0d0d0f", border:"1px solid #1a1a1f", borderRadius:6 }}>🆕 신규: <strong style={{ color:"#4ade80" }}>{bulkExtractStats.inserted}</strong></div>
                  <div style={{ padding:"4px 10px", background:"#0d0d0f", border:"1px solid #1a1a1f", borderRadius:6 }}>🔄 교체: <strong style={{ color:"#fbbf24" }}>{bulkExtractStats.replaced}</strong></div>
                  <div style={{ padding:"4px 10px", background:"#0d0d0f", border:"1px solid #1a1a1f", borderRadius:6 }}>⏭️ 스킵: <strong style={{ color:"#888" }}>{bulkExtractStats.skipped}</strong></div>
                  <div style={{ padding:"4px 10px", background:"#0d0d0f", border:"1px solid #1a1a1f", borderRadius:6 }}>🔍 못찾음: <strong style={{ color:"#666" }}>{bulkExtractStats.notFound}</strong></div>
                  <div style={{ padding:"4px 10px", background:"#0d0d0f", border:"1px solid #1a1a1f", borderRadius:6 }}>❌ 실패: <strong style={{ color:"#f87171" }}>{bulkExtractStats.failed}</strong></div>
                </div>
              </>
            )}

            {bulkExtractLog.length > 0 && (
              <div style={{ background:"#0d0d0f", border:"1px solid #1a1a1f", padding:10, maxHeight:280, overflowY:"auto", fontFamily:"ui-monospace, monospace", fontSize:10, lineHeight:1.7, borderRadius:6, marginBottom:14 }}>
                {bulkExtractLog.map((entry, i) => (
                  <div key={i} style={{ color: entry.cls === "new" ? "#4ade80" : entry.cls === "replace" ? "#fbbf24" : entry.cls === "skip" ? "#888" : entry.cls === "nofind" ? "#666" : entry.cls === "err" ? "#f87171" : entry.cls === "info" ? "#fbbf24" : "#aaa", fontWeight: entry.cls === "info" ? 600 : 400 }}>{entry.msg}</div>
                ))}
              </div>
            )}

            <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
              <button onClick={() => setBulkExtractOpen(false)} disabled={bulkExtractRunning} style={{ fontSize:12, padding:"8px 16px", borderRadius:6, cursor: bulkExtractRunning ? "not-allowed" : "pointer", border:"1px solid #1a1a1f", background:"transparent", color:"#888", fontFamily:"inherit", opacity: bulkExtractRunning ? 0.5 : 1 }}>닫기</button>
              <button onClick={async () => {
                if (bulkExtractRunning) return;
                if (!confirm(`정말 모든 라이브 세션 엔딩곡을 ${bulkExtractForce ? '강제 재추출' : '추출'}할까요?${bulkExtractForce ? '\n\n기존 엔딩곡이 덮어써질 수 있습니다.' : ''}`)) return;
                setBulkExtractRunning(true);
                setBulkExtractLog([{ msg:"📡 라이브 세션 목록 조회 중...", cls:"info" }]);
                setBulkExtractStats({ inserted:0, replaced:0, skipped:0, notFound:0, failed:0, total:0, current:0 });
                const liveSessions = sessions.filter(s => s.type === "live").sort((a,b) => a.no - b.no);
                setBulkExtractLog(prev => [...prev, { msg:`✓ 라이브 세션 ${liveSessions.length}개 확인`, cls:"ok" }]);
                let stats = { inserted:0, replaced:0, skipped:0, notFound:0, failed:0, total:liveSessions.length, current:0 };
                setBulkExtractStats({ ...stats });
                for (let i = 0; i < liveSessions.length; i++) {
                  const s = liveSessions[i];
                  try {
                    const r = await post({ action:"extractEndings", session_id: s.id, force: bulkExtractForce });
                    if (r.ok && r.result) {
                      const res = r.result;
                      if (res.inserted && res.replaced) {
                        setBulkExtractLog(prev => [...prev, { msg:`#${s.no}: 🔄 교체 → ${res.inserted.song_title} (${res.inserted.timecode || '-'})`, cls:"replace" }]);
                        stats.replaced++;
                      } else if (res.inserted) {
                        setBulkExtractLog(prev => [...prev, { msg:`#${s.no}: 🆕 신규 → ${res.inserted.song_title} (${res.inserted.timecode || '-'})`, cls:"new" }]);
                        stats.inserted++;
                      } else if (res.skipped) {
                        setBulkExtractLog(prev => [...prev, { msg:`#${s.no}: ⏭️ 스킵 (이미 엔딩곡 있음)`, cls:"skip" }]);
                        stats.skipped++;
                      } else if (res.found === false) {
                        setBulkExtractLog(prev => [...prev, { msg:`#${s.no}: 🔍 댓글모음에 엔딩 표기 없음`, cls:"nofind" }]);
                        stats.notFound++;
                      } else {
                        setBulkExtractLog(prev => [...prev, { msg:`#${s.no}: ❌ 알 수 없는 결과`, cls:"err" }]);
                        stats.failed++;
                      }
                    } else {
                      setBulkExtractLog(prev => [...prev, { msg:`#${s.no}: ❌ ${r.message || "실패"}`, cls:"err" }]);
                      stats.failed++;
                    }
                  } catch (e) {
                    setBulkExtractLog(prev => [...prev, { msg:`#${s.no}: ❌ 네트워크 오류 — ${e.message}`, cls:"err" }]);
                    stats.failed++;
                  }
                  stats.current = i + 1;
                  setBulkExtractStats({ ...stats });
                  await new Promise(r => setTimeout(r, 80));
                }
                setBulkExtractLog(prev => [...prev, { msg:"", cls:"" }, { msg:`🎉 완료! 신규 ${stats.inserted} / 교체 ${stats.replaced} / 스킵 ${stats.skipped} / 못찾음 ${stats.notFound} / 실패 ${stats.failed}`, cls:"info" }]);
                setBulkExtractRunning(false);
                await loadData('sessions');
              }} disabled={bulkExtractRunning} style={{ fontSize:12, fontWeight:600, padding:"8px 16px", borderRadius:6, cursor: bulkExtractRunning ? "not-allowed" : "pointer", border:"1px solid #44aaff66", background:"#44aaff15", color:"#44aaff", fontFamily:"inherit", opacity: bulkExtractRunning ? 0.5 : 1 }}>
                {bulkExtractRunning ? "진행 중..." : (bulkExtractStats.current === bulkExtractStats.total && bulkExtractStats.total > 0 ? "다시 시작" : "시작")}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  </div>);
}

ReactDOM.render(<PlaveAdmin />, document.getElementById("root"));
</script>
</body>
</html>
