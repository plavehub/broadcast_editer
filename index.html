<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAVE Admin v4</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#08080a;color:#e0ddd5;font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;overflow:hidden;}
input,textarea,select,button{font-family:inherit;}
::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:#222;border-radius:4px;}
@keyframes loadfade { 0%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const WORKER = "https://plave-worker.kgb2020sr-be5.workers.dev";
const MEMBER_COLORS = { "예준":"#4da6ff","노아":"#a855f7","밤비":"#ff6b9d","은호":"#ff5252","하민":"#52cc7a","전원":"#888" };
const MEMBERS = ["예준","노아","밤비","은호","하민"];

/* ============ Shared Components ============ */
const MemberTag = ({ name }) => {
  const c = MEMBER_COLORS[name] || "#555";
  return <span style={{ fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:20, border:`1px solid ${c}33`, color:c, background:`${c}11` }}>{name}</span>;
};

const MemberSep = () => <span style={{ width:1, height:12, background:"#333", margin:"0 2px", flexShrink:0 }} />;

const MemberDisplay = ({ s }) => {
  const members = (s.members||"전원").split(",").map(m=>m.trim()).filter(Boolean);
  const absent = (s.absent_members||"").split(",").map(m=>m.trim()).filter(Boolean);
  const phone = (s.phone_members||"").split(",").map(m=>m.trim()).filter(Boolean);
  const surprise = (s.surprise_members||"").split(",").map(m=>m.trim()).filter(Boolean);
  const isAll = members.includes("전원") || members.length === 5;
  const hasAbsent = absent.length > 0;
  return (<>
    {isAll ? (
      <span style={{ fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:20, border:`1px solid ${hasAbsent ? "#55555533" : "#e0ddd533"}`, color: hasAbsent ? "#555" : "#e0ddd5", background: hasAbsent ? "#55555511" : "#e0ddd511" }}>전원</span>
    ) : members.map((m,i) => <MemberTag key={i} name={m} />)}
    {hasAbsent && <MemberSep />}
    {absent.map((m,i) => { const c = MEMBER_COLORS[m]||"#555"; return <span key={"a"+i} style={{ fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:20, border:`1px solid ${c}22`, color:c, opacity:0.35, textDecoration:"line-through" }}>{m}</span>; })}
    {(phone.length > 0 || surprise.length > 0) && <MemberSep />}
    {phone.map((m,i) => { const c = MEMBER_COLORS[m]||"#555"; return <span key={"p"+i} style={{ fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:20, border:`1px dashed ${c}44`, color:c, background:`${c}08`, opacity:0.7 }}><span style={{ fontSize:8, opacity:0.5, marginRight:2 }}>TEL</span>{m}</span>; })}
    {surprise.map((m,i) => { const c = MEMBER_COLORS[m]||"#555"; return <span key={"s"+i} style={{ fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:20, border:`1px dotted ${c}44`, color:c, background:`${c}08`, opacity:0.7 }}><span style={{ fontSize:8, opacity:0.5, marginRight:2 }}>IN!</span>{m}</span>; })}
  </>);
};

const getThumb = (url) => {
  if (!url) return null;
  const m = url.match(/(?:v=|youtu\.be\/|\/live\/)([^&?/]+)/);
  return m ? `https://img.youtube.com/vi/${m[1]}/mqdefault.jpg` : null;
};

const Thumb = ({ url }) => {
  const src = getThumb(url);
  return src
    ? <img src={src} style={{ width:96, height:54, borderRadius:6, objectFit:"cover", flexShrink:0, background:"#111" }} onError={e=>{e.target.style.display="none";e.target.nextSibling.style.display="flex";}} />
    : null;
};

const NoLinkWarn = () => (
  <div style={{ width:96, height:54, borderRadius:6, background:"#2a1a0a", border:"1px solid #ff880033", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2L18 17H2L10 2Z" stroke="#ff8800" strokeWidth="1.5" fill="none"/><line x1="10" y1="8" x2="10" y2="12" stroke="#ff8800" strokeWidth="1.5" strokeLinecap="round"/><circle cx="10" cy="14.5" r="0.8" fill="#ff8800"/></svg>
  </div>
);

const Badge = ({ text, color, active, onClick }) => (
  <span onClick={onClick} style={{ fontSize:10, fontWeight:700, padding:"3px 10px", borderRadius:20, cursor: onClick ? "pointer" : "default",
    background: active ? `${color}18` : "#0f0f12", color: active ? color : "#444", border:`1px solid ${active ? color+"44" : "#1a1a1f"}` }}>{text}</span>
);

const ProgressBadge = ({ label, count, total, color }) => {
  const pct = total > 0 ? Math.round(count/total*100) : 0;
  return (
    <div style={{ fontSize:10, display:"flex", alignItems:"center", gap:4 }}>
      <span style={{ color:"#555" }}>{label}</span>
      <span style={{ fontWeight:700, color: pct === 100 ? color : pct > 0 ? "#888" : "#333" }}>{count}/{total}</span>
      <div style={{ width:40, height:4, borderRadius:2, background:"#1a1a1f", overflow:"hidden" }}>
        <div style={{ width:`${pct}%`, height:"100%", borderRadius:2, background: pct === 100 ? color : "#555" }} />
      </div>
    </div>
  );
};

/* ============ Shared Styles ============ */
const S = {
  card: { background:"#0f0f12", border:"1px solid #1a1a1f", borderRadius:14, padding:"18px 22px" },
  input: { width:"100%", background:"#08080a", border:"1px solid #1e1e28", borderRadius:8, padding:"10px 14px", color:"#e0ddd5", fontSize:14, outline:"none", fontFamily:"inherit" },
  inputSm: { background:"#08080a", border:"1px solid #1e1e28", borderRadius:6, padding:"8px 12px", color:"#e0ddd5", fontSize:13, outline:"none", fontFamily:"inherit" },
  btnPrimary: (active) => ({ background: active ? "linear-gradient(135deg,#4466ff,#7744ff)" : "#1a1a22", color: active ? "#fff" : "#444", border:"none", borderRadius:8, padding:"10px 20px", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }),
  btnDanger: { background:"#cc2222", border:"none", borderRadius:8, padding:"10px 20px", color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"inherit" },
  label: (color) => ({ fontSize:11, color: color || "#666", display:"block", marginBottom:4, fontWeight:600 }),
};

/* ============ Main App ============ */
function PlaveAdmin() {
  /* --- Navigation State --- */
  const [sidebarType, setSidebarType] = useState("dashboard");
  const [activeTab, setActiveTab] = useState("list");
  const [filter, setFilter] = useState("all");
  const [sortOrder, setSortOrder] = useState("desc");

  /* --- Data State --- */
  const [sessions, setSessions] = useState([]);
  const [songs, setSongs] = useState([]);
  const [coverSongs, setCoverSongs] = useState([]);
  const [ads, setAds] = useState([]);
  const [loading, setLoading] = useState(true);
  const [loadProg, setLoadProg] = useState(0);
  const [loadDone, setLoadDone] = useState(false);
  useEffect(() => {
    if (loading) { setLoadDone(false); setLoadProg(0); setTimeout(()=>setLoadProg(30),50); setTimeout(()=>setLoadProg(60),400); setTimeout(()=>setLoadProg(85),800); }
    else { setLoadProg(100); setTimeout(()=>setLoadDone(true),400); }
  }, [loading]);

  /* --- Session Selection (shared across tabs) --- */
  const [sel, setSel] = useState(null);
  const [searchNo, setSearchNo] = useState("");
  const [searchTitle, setSearchTitle] = useState("");
  const [searchMembers, setSearchMembers] = useState(new Set());
  const [searchResults, setSearchResults] = useState([]);
  const [showResults, setShowResults] = useState(false);

  /* --- Register --- */
  const [formData, setFormData] = useState({ date:"", title:"", members:[], link:"", phone_members:[], surprise_members:[], dj:"", guest:"", bgm_title:"", bgm_artist:"", challenge_title:"", challenge_artist:"", absent_members:[], absent_reason:"컨디션 난조" });
  const [saving, setSaving] = useState(false);

  /* --- Edit/Delete Session --- */
  const [editMode, setEditMode] = useState(false);
  const [editData, setEditData] = useState({});
  const [confirmDelete, setConfirmDelete] = useState(null);

  /* --- Script Tab --- */
  const [scriptText, setScriptText] = useState("");
  const [scriptParsed, setScriptParsed] = useState([]);
  const [scriptPreview, setScriptPreview] = useState([]);
  const [showScriptPreview, setShowScriptPreview] = useState(false);
  const [expandScript, setExpandScript] = useState(false);
  const [editingScriptIdx, setEditingScriptIdx] = useState(null);
  const [editingScriptText, setEditingScriptText] = useState("");
  const [editingHlIdx, setEditingHlIdx] = useState(null);
  const [editingHlTc, setEditingHlTc] = useState("");
  const [editingHlContent, setEditingHlContent] = useState("");
  const [confirmDeleteScript, setConfirmDeleteScript] = useState(false);

  /* --- Highlight Tab --- */
  const [hlText, setHlText] = useState("");
  const [hlParsed, setHlParsed] = useState([]);
  const [hlPreview, setHlPreview] = useState([]);
  const [hlAuthor, setHlAuthor] = useState("");
  const [expandHl, setExpandHl] = useState(false);
  const [confirmDeleteHl, setConfirmDeleteHl] = useState(false);

  /* --- Tags Tab --- */
  const [tagData, setTagData] = useState({ tags_a:"", tags_b:"", tags_c:"" });

  /* --- Visit Members Tab --- */
  const [visitPhone, setVisitPhone] = useState(new Set());
  const [visitSurprise, setVisitSurprise] = useState(new Set());

  /* --- Clips Tab --- */
  const [clipsData, setClipsData] = useState([]);
  const [clipsLoaded, setClipsLoaded] = useState(false);
  const [newClipTitle, setNewClipTitle] = useState("");
  const [newClipUrl, setNewClipUrl] = useState("");

  /* --- Setlist Tab --- */
  const [setlistData, setSetlistData] = useState([]);
  const [setlistLoaded, setSetlistLoaded] = useState(false);
  const [newSong, setNewSong] = useState({ title:"", artist:"", timecode:"", isOriginal:false, perfType:"song" });
  const [setlistText, setSetlistText] = useState("");
  const [setlistParsed, setSetlistParsed] = useState([]);

  /* --- Lyrics Tab --- */
  const [selectedSong, setSelectedSong] = useState(null);
  const [songSearchTitle, setSongSearchTitle] = useState("");
  const [songResults, setSongResults] = useState([]);
  const [lyricsType, setLyricsType] = useState("lyrics");
  const [lyricsText, setLyricsText] = useState("");
  const [lyricsParsed, setLyricsParsed] = useState([]);
  const [lyricsPreview, setLyricsPreview] = useState([]);
  const [expandLyrics, setExpandLyrics] = useState(false);
  const [confirmDeleteLyrics, setConfirmDeleteLyrics] = useState(false);

  /* --- Song Register --- */
  const [songForm, setSongForm] = useState({ song_name:"", release_date:"", album_name:"", album_type:"", track_no:"", song_type:"", link:"", pre_release_date:"" });

  /* --- Song Tags --- */
  const [songTagData, setSongTagData] = useState({ tags_a:"", tags_b:"", tags_c:"" });

  /* --- Song Edit --- */
  const [songEditMode, setSongEditMode] = useState(false);
  const [songEditData, setSongEditData] = useState({});

  /* --- Ad Form --- */
  const [adForm, setAdForm] = useState({ brand:"", product:"", title:"", date:"", members:[], link:"" });

  /* --- Cover Song Form --- */
  const [coverForm, setCoverForm] = useState({ title:"", originalArtist:"", date:"", country:"한국", members:[], link:"" });

  /* --- Sync --- */
  const [syncing, setSyncing] = useState(false);
  const scrollRef = useRef(null);
  const [showTopBtn, setShowTopBtn] = useState(false);

  /* ============ TYPE CONFIG ============ */
  const TYPE_INFO = {
    live:             { label:"라이브",    section:"LIVE",           color:"#378ADD", tabs:["list","register","editinfo","script","highlight","tags","clips","setlist"] },
    radio:            { label:"라디오",    section:"LIVE",           color:"#5DCAA5", tabs:["list","register","editinfo","script","highlight","tags","clips","setlist"] },
    lassgo:           { label:"라쓰고",    section:"자컨",           color:"#D4537E", tabs:["list","register","editinfo","script","highlight","tags","setlist"] },
    yt_greeting:      { label:"인사 영상", section:"공식 유튜브",     color:"#E24B4A", tabs:["list","register","editinfo","script","highlight","tags","setlist"] },
    yt_behind:        { label:"비하인드",  section:"공식 유튜브",     color:"#F09595", tabs:["list","register","editinfo","script","highlight","tags","setlist"] },
    shorts_official:  { label:"공식계정",  section:"숏폼",           color:"#F0997B", tabs:["list","register","editinfo","tags"], hasShortform:true },
    shorts_external:  { label:"외부계정",  section:"숏폼",           color:"#D85A30", tabs:["list","register","editinfo","tags"], hasShortform:true },
    ext_radio_cc:     { label:"친친",     section:"외부 라디오",     color:"#97C459", tabs:["list","register","editinfo","script","highlight","tags","clips","setlist"], hasDj:true },
    ext_radio_adolla: { label:"아돌라",   section:"외부 라디오",     color:"#639922", tabs:["list","register","editinfo","script","highlight","tags","clips","setlist"], hasDj:true },
    ext_kr_yt:        { label:"한국 유튜브", section:"외부 예능",    color:"#EF9F27", tabs:["list","register","editinfo","script","highlight","tags","clips","setlist"], hasGuest:true },
    ext_kr_tv:        { label:"한국 방송",  section:"외부 예능",     color:"#BA7517", tabs:["list","register","editinfo","script","highlight","tags","clips","setlist"], hasGuest:true },
    ext_foreign:      { label:"외국 방송",  section:"외부 예능",     color:"#FAC775", tabs:["list","register","editinfo","script","highlight","tags","clips","setlist"], hasGuest:true },
    award:            { label:"시상무대",   section:"시상무대",      color:"#993C1D", tabs:["list","register","editinfo","acceptance","tags","clips","setlist"] },
    concert:          { label:"콘서트",    section:"무대",           color:"#7F77DD", tabs:["list","register","editinfo","tags","clips","setlist"] },
    ext_stage:        { label:"외부무대",  section:"무대",           color:"#AFA9EC", tabs:["list","register","editinfo","tags","clips","setlist"] },
    song:             { label:"발매곡",    section:"MUSIC",          color:"#534AB7", tabs:["list","register","songinfo","lyrics","tags"] },
    cover:            { label:"공식 커버곡", section:"MUSIC",        color:"#ED93B1", tabs:["list","register","songinfo","lyrics","tags"] },
    ad:               { label:"영상광고",  section:"광고",           color:"#1D9E75", tabs:["list","register"] },
  };
  const TAB_LABELS = {
    list:"목록", register:"등록", editinfo:"정보수정", script:"스크립트", highlight:"하이라이트",
    tags:"태그", clips:"클립", setlist:"셋리스트", lyrics:"가사", songinfo:"곡 정보",
    acceptance:"수상소감",
  };
  const SECTIONS = ["LIVE","자컨","공식 유튜브","숏폼","외부 라디오","외부 예능","시상무대","무대","MUSIC","광고"];
  const curType = TYPE_INFO[sidebarType] || { label:"대시보드", section:"", tabs:[] };
  const isDashboard = sidebarType === "dashboard";
  const isSong = sidebarType === "song";
  const isCover = sidebarType === "cover";
  const isAd = sidebarType === "ad";
  const isMusicType = isSong || isCover;
  const isSessionType = !isMusicType && !isAd && !isDashboard;

  /* ============ DATA LOADING ============ */
  const api = useCallback(async (action, params) => {
    const q = new URLSearchParams({ action, _: Date.now(), ...params });
    return fetch(`${WORKER}/?${q}`).then(r => r.json());
  }, []);
  const post = useCallback(async (body) => {
    return fetch(`${WORKER}/`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) }).then(r => r.json());
  }, []);

  const loadData = useCallback(async () => {
    setLoading(true);
    try {
      const [sessRes, scriptRes, hlRes, songsRes, clipRes, lyricsIdRes, coverRes, adsRes] = await Promise.all([
        api("getSessions"), api("getScriptIds"), api("getHighlightIds"), api("getSongs"), api("getClipIds"), api("getLyricsIds"), api("getCoverSongs"), api("getAds"),
      ]);
      if (sessRes.ok) {
        const mapped = sessRes.sessions.map(s => ({
          id:s.id, no:s.session_no, date:s.live_date, title:s.title,
          members:s.members||"전원", link:s.youtube_url||"", type:s.type||"live",
          phone_members:s.phone_members||"", surprise_members:s.surprise_members||"",
          dj:s.dj||"", guest:s.guest||"",
          absent_members:s.absent_members||"", absent_reason:s.absent_reason||"",
          bgm_title:s.bgm_title||"", bgm_artist:s.bgm_artist||"",
          challenge_title:s.challenge_title||"", challenge_artist:s.challenge_artist||"",
          absent_members:s.absent_members||"", absent_reason:s.absent_reason||"컨디션 난조",
          absent_members:s.absent_members||"", absent_reason:s.absent_reason||"컨디션 난조",
          tags_a:s.tags_a||"", tags_b:s.tags_b||"", tags_c:s.tags_c||"",
          hasScript:false, hlCount:0, clipCount:0,
          hasTags:!!(s.tags_a||s.tags_b||s.tags_c),
          absent_members:s.absent_members||"", absent_reason:s.absent_reason||"컨디션 난조",
          naFlags: new Set((s.na_flags||"").split(",").filter(Boolean)),
        }));
        const scriptSet = new Set(scriptRes.ok ? scriptRes.session_ids : []);
        const hlMap = hlRes.ok ? hlRes.counts : {};
        const clipMap = clipRes.ok ? clipRes.counts : {};
        mapped.forEach(s => { s.hasScript = scriptSet.has(s.id); s.hlCount = hlMap[s.id]||0; s.clipCount = clipMap[s.id]||0; });
        setSessions(mapped);
      }
      if (songsRes.ok) {
        setSongs((songsRes.songs||[]).map(s => ({
          id:s.id, title:s.song_name||s.title||"", date:s.release_date||"",
          album:s.album_name||"", albumType:s.album_type||"", trackNo:s.track_no||"",
          songType:s.song_type||"", link:s.youtube_url||"", thumbnail:s.thumbnail_url||"",
          tags_a:s.tags_a||"", tags_b:s.tags_b||"", tags_c:s.tags_c||"",
          preReleaseDate:s.pre_release_date||"",
        })));
        if (lyricsIdRes.ok) {
          const lyricsSet = new Set(lyricsIdRes.song_ids || []);
          setSongs(prev => prev.map(s => ({ ...s, hasLyrics: lyricsSet.has(s.id) })));
        }
      }
      if (coverRes.ok) {
        setCoverSongs((coverRes.songs||[]).map(s => ({
          id:s.id, title:s.title||"", originalArtist:s.original_artist||"", country:s.country||"한국",
          members:s.members||"", date:s.release_date||"", link:s.youtube_url||"", thumbnail:s.thumbnail_url||"",
          tags_a:s.tags_a||"", tags_b:s.tags_b||"", tags_c:s.tags_c||"",
        })));
      }
      if (adsRes.ok) {
        setAds((adsRes.ads||[]).map(a => ({
          id:a.id, brand:a.brand||"", product:a.product||"", title:a.title||"",
          members:a.members||"", date:a.release_date||"", link:a.youtube_url||"", thumbnail:a.thumbnail_url||"",
        })));
      }
    } catch(e) { console.error("loadData error:", e); }
    setLoading(false);
  }, [api]);

  useEffect(() => { loadData(); }, [loadData]);
  useEffect(() => { if (sel) { const updated = sessions.find(s => s.id === sel.id); if (updated) setSel(updated); } }, [sessions]);

  /* ============ HELPERS ============ */
  const typeSessions = sessions.filter(s => s.type === sidebarType);
  const filtered = typeSessions.filter(s => {
    if (filter === "has-script") return s.hasScript;
    if (filter === "na-script") return s.naFlags.has("script");
    if (filter === "no-script") return !s.hasScript && !s.naFlags.has("script");
    if (filter === "has-hl") return s.hlCount > 0;
    if (filter === "na-hl") return s.naFlags.has("highlight") || s.naFlags.has("acceptance");
    if (filter === "no-hl") return s.hlCount === 0 && !s.naFlags.has("highlight") && !s.naFlags.has("acceptance");
    if (filter === "has-tag") return s.hasTags;
    if (filter === "na-tag") return s.naFlags.has("tags");
    if (filter === "no-tag") return !s.hasTags && !s.naFlags.has("tags");
    if (filter === "has-clip") return s.clipCount > 0;
    if (filter === "na-clip") return s.naFlags.has("clips");
    if (filter === "no-clip") return s.clipCount === 0 && !s.naFlags.has("clips");
    if (filter === "has-setlist") return s.naFlags.has("setlist_done");
    if (filter === "na-setlist") return s.naFlags.has("setlist");
    if (filter === "no-setlist") return !s.naFlags.has("setlist_done") && !s.naFlags.has("setlist");
    return true;
  }).sort((a,b) => sortOrder === "desc" ? b.no - a.no : a.no - b.no);

  const selectSession = (s) => {
    setSel(s); setSearchNo(String(s.no)); setSearchResults([]); setShowResults(false);
    setTagData({ tags_a:s.tags_a, tags_b:s.tags_b, tags_c:s.tags_c });
    setEditData({ title:s.title, date:s.date, members:s.members, link:s.link, phone_members:s.phone_members, surprise_members:s.surprise_members, tags_a:s.tags_a, tags_b:s.tags_b, tags_c:s.tags_c, bgm_title:s.bgm_title, bgm_artist:s.bgm_artist, challenge_title:s.challenge_title, challenge_artist:s.challenge_artist, absent_members:s.absent_members, absent_reason:s.absent_reason||"컨디션 난조" });
    setVisitPhone(new Set(s.phone_members ? s.phone_members.split(",").map(m=>m.trim()).filter(Boolean) : []));

                      let pct = 0, total = 0, sub = "";
                      if (key === "song") {
                        total = songs.length;
                        const lyricsC = songs.filter(s => s.hasLyrics).length;
                        const tagC = songs.filter(s => s.tags_a || s.tags_b || s.tags_c).length;
                        pct = total > 0 ? (lyricsC + tagC) / (total * 2) * 100 : 0;
                        sub = `${total}곡`;
                      } else if (key === "cover") {
                        total = coverSongs.length;
                        const tagC = coverSongs.filter(s => s.tags_a || s.tags_b || s.tags_c).length;
                        pct = total > 0 ? tagC / total * 100 : 0;
                        sub = `${total}곡`;
                      } else if (key === "ad") {
                        total = ads.length;
                        pct = total > 0 ? 100 : 0;
                        sub = `${total}건`;
                      } else {
                        const items = sessions.filter(s => s.type === key);
                        total = items.length;
                        const contentTypes = info.tabs.filter(t => ["script","highlight","acceptance","tags","clips","setlist"].includes(t)).length;
                        if (total > 0 && contentTypes > 0) {
                          let filled = 0;
                          if (info.tabs.includes("script")) filled += items.filter(s => s.hasScript || s.naFlags.has("script")).length;
                          if (info.tabs.includes("highlight") || info.tabs.includes("acceptance")) filled += items.filter(s => s.hlCount > 0 || s.naFlags.has("highlight")).length;

                          pct = filled / (total * contentTypes) * 100;
                        }

                    })}
                  </div>

                          let next = ms.filter(x => x !== "전원");
                          if (next.includes(m)) next = next.filter(x => x !== m); else next.push(m);
                          setEditData({...editData, members: next.length === 5 ? "전원" : next.join(",")});
                        }} style={{ fontSize:11, padding:"5px 12px", borderRadius:6, cursor:"pointer", fontFamily:"inherit", fontWeight:600, border:`1px solid ${on ? c+"66" : "#1e1e28"}`, color: on ? c : "#555", background: on ? `${c}15` : "transparent" }}>{m}</button>;

                      <div style={{ color:"#333", fontSize:10 }}>...</div>

              <div key={idx} onClick={()=>{setSelectedSong(s);setSongEditData({title:s.title,originalArtist:s.originalArtist,country:s.country,members:s.members,date:s.date,link:s.link});setSongTagData({tags_a:s.tags_a,tags_b:s.tags_b,tags_c:s.tags_c});}}
                style={{ background: selectedSong?.id===s.id ? "#111120" : "#0f0f12", border:`1px solid ${selectedSong?.id===s.id ? "#9944ff44" : "#1a1a1f"}`, borderRadius:8, padding:"10px 14px", cursor:"pointer", display:"flex", alignItems:"center", gap:12 }}
                onMouseEnter={e=>e.currentTarget.style.borderColor="#2a2a3f"} onMouseLeave={e=>e.currentTarget.style.borderColor=selectedSong?.id===s.id?"#9944ff44":"#1a1a1f"}>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:13, fontWeight:600 }}>{s.title}</div>
                  <div style={{ fontSize:11, color:"#555", marginTop:2 }}>{s.originalArtist} ({s.country}) / {s.date}</div>
                </div>
                {s.link && <a href={s.link} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} style={{ fontSize:9, padding:"2px 6px", borderRadius:4, background:"#1a0a0a", border:"1px solid #cc000022", color:"#cc0000", textDecoration:"none", fontWeight:700, flexShrink:0 }}>YT</a>}
              </div>
            ))}
          </div>
        </div>)}

        {/* ===================================================================== */}
        {/* TAB: COVER REGISTER (커버곡 등록) */}
        {/* ===================================================================== */}
        {!loading && activeTab === "register" && isCover && (<div style={{ paddingTop:28 }}>
          <div style={{ marginBottom:24 }}>
            <h2 style={{ fontSize:18, fontWeight:700, marginBottom:4 }}>공식 커버곡 등록</h2>
          </div>
          <div style={{ ...S.card, display:"flex", flexDirection:"column", gap:16 }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              <div><label style={S.label()}>곡명</label><input value={coverForm.title} onChange={e=>setCoverForm({...coverForm,title:e.target.value})} placeholder="Wait" style={S.input} /></div>
              <div><label style={S.label()}>원곡 아티스트</label><input value={coverForm.originalArtist} onChange={e=>setCoverForm({...coverForm,originalArtist:e.target.value})} placeholder="원곡자" style={S.input} /></div>
              <div><label style={S.label()}>날짜</label><input type="date" value={coverForm.date} onChange={e=>setCoverForm({...coverForm,date:e.target.value})} style={S.input} /></div>
              <div>
                <label style={S.label()}>나라</label>
                <div style={{ display:"flex", gap:6 }}>
                  {["한국","일본","팝송"].map(v => (
                    <button key={v} onClick={()=>setCoverForm({...coverForm,country:v})}
                      style={{ fontSize:12, padding:"6px 14px", borderRadius:8, cursor:"pointer", fontFamily:"inherit", fontWeight:600, border:`1px solid ${coverForm.country===v?"#9944ff66":"#1e1e28"}`, color:coverForm.country===v?"#9944ff":"#555", background:coverForm.country===v?"#9944ff15":"transparent" }}>{v}</button>
                  ))}
                </div>
              </div>
            </div>
            <div>
              <label style={S.label()}>출연 멤버</label>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                <button onClick={() => setCoverForm({...coverForm, members: coverForm.members.length === 5 ? [] : [...MEMBERS]})}
                  style={{ ...S.inputSm, padding:"6px 12px", fontSize:12, cursor:"pointer", background: coverForm.members.length === 5 ? "#1a2a2a" : "#111114", color: coverForm.members.length === 5 ? "#52cc7a" : "#555", border:`1px solid ${coverForm.members.length === 5 ? "#52cc7a44" : "#1e1e28"}` }}>전원</button>
                {MEMBERS.map(m => {
                  const on = coverForm.members.includes(m); const c = MEMBER_COLORS[m];
                  return <button key={m} onClick={() => setCoverForm({...coverForm, members: on ? coverForm.members.filter(x=>x!==m) : [...coverForm.members, m]})}
                    style={{ ...S.inputSm, padding:"6px 12px", fontSize:12, cursor:"pointer", background: on ? `${c}18` : "#111114", color: on ? c : "#555", border:`1px solid ${on ? c+"44" : "#1e1e28"}` }}>{m}</button>;
                })}
              </div>
            </div>
            <div><label style={S.label()}>유튜브 링크</label><input value={coverForm.link} onChange={e=>setCoverForm({...coverForm,link:e.target.value})} placeholder="https://youtu.be/..." style={S.input} /></div>
            <button onClick={async()=>{
              if(!coverForm.title)return alert("곡명을 입력해주세요");
              setSaving(true);
              try {
                const thumb = coverForm.link.match(/(?:v=|youtu\.be\/|\/live\/)([^&?/]+)/);
                const data = { title:coverForm.title, original_artist:coverForm.originalArtist||null, country:coverForm.country, members:coverForm.members.join(",")||"전원", release_date:coverForm.date||null, youtube_url:coverForm.link||null, thumbnail_url:thumb?`https://img.youtube.com/vi/${thumb[1]}/maxresdefault.jpg`:null };
                const res = await post({action:"saveCoverSong", data});
                if(res.ok){ alert("등록 완료!"); setCoverForm({title:"",originalArtist:"",date:"",country:"한국",members:[],link:""}); await loadData(); }
                else alert("실패: "+JSON.stringify(res));
              }catch(e){alert("실패: "+e.message);}
              setSaving(false);
            }} style={S.btnPrimary(!!coverForm.title)}>{saving ? "등록 중..." : "등록하기"}</button>
          </div>
        </div>)}

        {/* ===================================================================== */}
        {/* TAB: COVER SONGINFO (커버곡 정보 수정) */}
        {/* ===================================================================== */}
        {!loading && activeTab === "songinfo" && isCover && (<div style={{ paddingTop:28 }}>
          <div style={{ marginBottom:20 }}>
            <h2 style={{ fontSize:18, fontWeight:700, marginBottom:4 }}>커버곡 정보</h2>
            <p style={{ fontSize:13, color:"#555" }}>커버곡 정보를 수정하거나 삭제해요</p>
          </div>
          {!selectedSong && (
            <div style={{ display:"flex", gap:6, marginBottom:20 }}>
              <input type="text" placeholder="곡명 검색" value={songSearchTitle} onChange={e=>{setSongSearchTitle(e.target.value);setSongResults([]);}}
                onKeyDown={e=>{if(e.key==="Enter"){const r=coverSongs.filter(s=>s.title.toLowerCase().includes(songSearchTitle.toLowerCase()));if(r.length===1)setSelectedSong(r[0]);else setSongResults(r);}}}
                style={{ flex:1, ...S.inputSm, fontSize:14 }} />
              <button onClick={()=>{const r=coverSongs.filter(s=>s.title.toLowerCase().includes(songSearchTitle.toLowerCase()));if(r.length===1)setSelectedSong(r[0]);else setSongResults(r);}} style={S.btnPrimary(!!songSearchTitle)}>검색</button>
            </div>
          )}
          {songResults.length > 1 && activeTab === "songinfo" && isCover && (
            <div style={{ marginBottom:16, border:"1px solid #1a1a1f", borderRadius:8, overflow:"hidden", maxHeight:200, overflowY:"auto" }}>
              {songResults.map((s,i) => (
                <div key={i} onClick={()=>{setSelectedSong(s);setSongResults([]);}}
                  style={{ padding:"8px 12px", fontSize:12, background: i%2 ? "#0f0f12":"#0d0d0f", borderBottom:"1px solid #111114", cursor:"pointer" }}
                  onMouseEnter={e=>e.currentTarget.style.background="#1a1a2e"} onMouseLeave={e=>e.currentTarget.style.background=i%2?"#0f0f12":"#0d0d0f"}>
                  <span style={{ color:"#9944ff", fontWeight:600 }}>{s.title}</span> <span style={{ color:"#444", fontSize:11, marginLeft:8 }}>{s.originalArtist} ({s.country})</span>
                </div>
              ))}
            </div>
          )}
          {selectedSong && (<div style={S.card}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 }}>
              <div>
                <div style={{ fontSize:14, fontWeight:700 }}>{selectedSong.title}</div>
                <div style={{ fontSize:10, color:"#444", marginTop:4 }}>{selectedSong.originalArtist} ({selectedSong.country}) / {selectedSong.date}</div>
              </div>
              <button onClick={()=>{setSelectedSong(null);setSongSearchTitle("");}} style={{ background:"transparent", border:"1px solid #1e1e28", borderRadius:4, padding:"2px 8px", color:"#555", fontSize:10, cursor:"pointer", fontFamily:"inherit" }}>X 해제</button>
            </div>
            <div style={{ borderTop:"1px solid #1a1a1f", paddingTop:14 }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
                <div><label style={S.label("#555")}>곡명</label><input value={songEditData.title||""} onChange={e=>setSongEditData({...songEditData, title:e.target.value})} style={{ width:"100%", ...S.inputSm }} /></div>
                <div><label style={S.label("#555")}>원곡 아티스트</label><input value={songEditData.originalArtist||""} onChange={e=>setSongEditData({...songEditData, originalArtist:e.target.value})} style={{ width:"100%", ...S.inputSm }} /></div>
                <div><label style={S.label("#555")}>날짜</label><input type="date" value={songEditData.date||""} onChange={e=>setSongEditData({...songEditData, date:e.target.value})} style={{ width:"100%", ...S.inputSm }} /></div>
                <div>
                  <label style={S.label("#555")}>나라</label>
                  <div style={{ display:"flex", gap:4 }}>
                    {["한국","일본","팝송"].map(v => (
                      <button key={v} onClick={()=>setSongEditData({...songEditData, country:v})}
                        style={{ fontSize:11, padding:"4px 12px", borderRadius:6, cursor:"pointer", fontFamily:"inherit", fontWeight:600, border:`1px solid ${songEditData.country===v?"#9944ff66":"#1e1e28"}`, color:songEditData.country===v?"#9944ff":"#555", background:songEditData.country===v?"#9944ff15":"transparent" }}>{v}</button>
                    ))}
                  </div>
                </div>
              </div>
              <div style={{ marginBottom:10 }}>
                <label style={S.label("#555")}>출연 멤버</label>
                <div style={{ display:"flex", gap:4 }}>
                  {MEMBERS.map(m => {
                    const ms = (songEditData.members||"").split(",").map(x=>x.trim()).filter(Boolean);
                    const on = ms.includes(m); const c = MEMBER_COLORS[m];
                    return <button key={m} onClick={()=>{ let next = on ? ms.filter(x=>x!==m) : [...ms,m]; setSongEditData({...songEditData, members:next.join(",")}); }}
                      style={{ fontSize:10, padding:"4px 10px", borderRadius:6, cursor:"pointer", fontFamily:"inherit", fontWeight:600, border:`1px solid ${on?c+"66":"#1e1e28"}`, color:on?c:"#555", background:on?`${c}15`:"transparent" }}>{m}</button>;
                  })}
                </div>
              </div>
              <div style={{ marginBottom:14 }}>
                <label style={S.label("#555")}>링크</label>
                <input value={songEditData.link||""} onChange={e=>setSongEditData({...songEditData, link:e.target.value})} style={{ width:"100%", ...S.inputSm }} />
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={async()=>{
                  setSaving(true);
                  try {
                    const thumb = (songEditData.link||"").match(/(?:v=|youtu\.be\/|\/live\/)([^&?/]+)/);
                    const d = { title:songEditData.title, original_artist:songEditData.originalArtist||null, country:songEditData.country, members:songEditData.members||null, release_date:songEditData.date||null, youtube_url:songEditData.link||null, thumbnail_url:thumb?`https://img.youtube.com/vi/${thumb[1]}/maxresdefault.jpg`:null };
                    await post({ action:"updateCoverSong", id:selectedSong.id, data:d });
                    alert("수정 완료!"); await loadData();
                  } catch(e) { alert("실패: "+e.message); }
                  setSaving(false);
                }} style={S.btnPrimary(true)}>{saving ? "저장 중..." : "저장"}</button>
                <button onClick={async()=>{
                  if (!confirm("정말 삭제할까요? 연결된 가사도 삭제돼요.")) return;
                  setSaving(true);
                  try { await post({ action:"deleteCoverSong", id:selectedSong.id }); alert("삭제 완료!"); setSelectedSong(null); await loadData(); }
                  catch(e) { alert("실패: "+e.message); }
                  setSaving(false);
                }} style={S.btnDanger}>삭제</button>
              </div>
            </div>
          </div>)}
        </div>)}

        {/* ===================================================================== */}
        {/* TAB: COVER LYRICS (커버곡 가사) */}
        {/* ===================================================================== */}
        {!loading && activeTab === "lyrics" && isCover && (<div style={{ paddingTop:28 }}>
          <div style={{ marginBottom:20 }}>
            <h2 style={{ fontSize:18, fontWeight:700, marginBottom:4 }}>커버곡 가사</h2>
            <p style={{ fontSize:13, color:"#555" }}>커버곡 가사를 등록해요 (발매곡 가사와 동일 형식)</p>
          </div>
          {!selectedSong && (
            <div style={{ display:"flex", gap:6, marginBottom:20 }}>
              <input type="text" placeholder="곡명 검색" value={songSearchTitle} onChange={e=>{setSongSearchTitle(e.target.value);setSongResults([]);}}
                onKeyDown={e=>{if(e.key==="Enter"){const r=coverSongs.filter(s=>s.title.toLowerCase().includes(songSearchTitle.toLowerCase()));if(r.length===1)setSelectedSong(r[0]);else setSongResults(r);}}}
                style={{ flex:1, ...S.inputSm, fontSize:14 }} />
              <button onClick={()=>{const r=coverSongs.filter(s=>s.title.toLowerCase().includes(songSearchTitle.toLowerCase()));if(r.length===1)setSelectedSong(r[0]);else setSongResults(r);}} style={S.btnPrimary(!!songSearchTitle)}>검색</button>
            </div>
          )}
          {songResults.length > 1 && activeTab === "lyrics" && isCover && (
            <div style={{ marginBottom:16, border:"1px solid #1a1a1f", borderRadius:8, overflow:"hidden", maxHeight:200, overflowY:"auto" }}>
              {songResults.map((s,i) => (
                <div key={i} onClick={()=>{setSelectedSong(s);setSongResults([]);}}
                  style={{ padding:"8px 12px", fontSize:12, background: i%2 ? "#0f0f12":"#0d0d0f", borderBottom:"1px solid #111114", cursor:"pointer" }}
                  onMouseEnter={e=>e.currentTarget.style.background="#1a1a2e"} onMouseLeave={e=>e.currentTarget.style.background=i%2?"#0f0f12":"#0d0d0f"}>
                  <span style={{ color:"#9944ff", fontWeight:600 }}>{s.title}</span>
                </div>
              ))}
            </div>
          )}
          {selectedSong && (<div style={S.card}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:14 }}>
              <div>
                <div style={{ fontSize:14, fontWeight:700 }}>{selectedSong.title}</div>
                <div style={{ fontSize:10, color:"#444", marginTop:4 }}>{selectedSong.originalArtist} ({selectedSong.country})</div>
              </div>
              <button onClick={()=>{setSelectedSong(null);setSongSearchTitle("");}} style={{ background:"transparent", border:"1px solid #1e1e28", borderRadius:4, padding:"2px 8px", color:"#555", fontSize:10, cursor:"pointer", fontFamily:"inherit" }}>X 해제</button>
            </div>
            <div style={{ color:"#555", fontSize:12 }}>커버곡 가사 기능은 발매곡 가사와 동일 형식으로 곧 연동될 예정이에요.</div>
          </div>)}
        </div>)}

        {/* ===================================================================== */}
        {/* TAB: COVER TAGS (커버곡 태그) */}
        {/* ===================================================================== */}
        {!loading && activeTab === "tags" && isCover && (<div style={{ paddingTop:28 }}>
          <div style={{ marginBottom:20 }}>
            <h2 style={{ fontSize:18, fontWeight:700, marginBottom:4 }}>커버곡 태그</h2>
          </div>
          {!selectedSong && (
            <div style={{ display:"flex", gap:6, marginBottom:20 }}>
              <input type="text" placeholder="곡명 검색" value={songSearchTitle} onChange={e=>{setSongSearchTitle(e.target.value);setSongResults([]);}}
                onKeyDown={e=>{if(e.key==="Enter"){const r=coverSongs.filter(s=>s.title.toLowerCase().includes(songSearchTitle.toLowerCase()));if(r.length===1)setSelectedSong(r[0]);else setSongResults(r);}}}
                style={{ flex:1, ...S.inputSm, fontSize:14 }} />
              <button onClick={()=>{const r=coverSongs.filter(s=>s.title.toLowerCase().includes(songSearchTitle.toLowerCase()));if(r.length===1)setSelectedSong(r[0]);else setSongResults(r);}} style={S.btnPrimary(!!songSearchTitle)}>검색</button>
            </div>
          )}
          {selectedSong && (<div style={S.card}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:14 }}>
              <div><div style={{ fontSize:14, fontWeight:700 }}>{selectedSong.title}</div></div>
              <button onClick={()=>{setSelectedSong(null);setSongSearchTitle("");}} style={{ background:"transparent", border:"1px solid #1e1e28", borderRadius:4, padding:"2px 8px", color:"#555", fontSize:10, cursor:"pointer", fontFamily:"inherit" }}>X 해제</button>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:10 }}>
              <div><label style={S.label("#4466ff")}>A 콘텐츠</label><input value={songTagData.tags_a} onChange={e=>setSongTagData({...songTagData,tags_a:e.target.value})} style={{ width:"100%", ...S.inputSm }} /></div>
              <div><label style={S.label("#ff8800")}>B 대사</label><input value={songTagData.tags_b} onChange={e=>setSongTagData({...songTagData,tags_b:e.target.value})} style={{ width:"100%", ...S.inputSm }} /></div>
              <div><label style={S.label("#cc66ff")}>C 움찔</label><input value={songTagData.tags_c} onChange={e=>setSongTagData({...songTagData,tags_c:e.target.value})} style={{ width:"100%", ...S.inputSm }} /></div>
            </div>
            <button onClick={async()=>{
              setSaving(true);
              try{await post({action:"updateCoverSong",id:selectedSong.id,data:{tags_a:songTagData.tags_a||null,tags_b:songTagData.tags_b||null,tags_c:songTagData.tags_c||null}});alert("태그 저장 완료!");await loadData();}
              catch(e){alert("실패: "+e.message);}
              setSaving(false);
            }} style={S.btnPrimary(true)}>{saving ? "저장 중..." : "태그 저장"}</button>
          </div>)}
        </div>)}

        </div>
      </div>
      {/* Scroll to Top */}
      {showTopBtn && (
        <button onClick={() => scrollRef.current && scrollRef.current.scrollTo({top:0, behavior:"smooth"})}
          style={{ position:"absolute", bottom:20, right:28, width:40, height:40, borderRadius:20, background:`${isDashboard ? "#4466ff" : curType.color}18`, border:`1px solid ${isDashboard ? "#4466ff" : curType.color}44`, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", zIndex:60, transition:"opacity 0.2s" }}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 12V4M4 7l4-4 4 4" stroke={isDashboard ? "#4466ff" : curType.color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
      )}
    </div>
  </div>);
}

ReactDOM.render(<PlaveAdmin />, document.getElementById("root"));
</script>
</body>
</html>
