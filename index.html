<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='e1' gradientUnits='userSpaceOnUse' x1='16' y1='2' x2='29' y2='12'%3E%3Cstop offset='0%25' stop-color='%234da6ff'/%3E%3Cstop offset='100%25' stop-color='%23a855f7'/%3E%3C/linearGradient%3E%3ClinearGradient id='e2' gradientUnits='userSpaceOnUse' x1='29' y1='12' x2='24' y2='27'%3E%3Cstop offset='0%25' stop-color='%23a855f7'/%3E%3Cstop offset='100%25' stop-color='%23ff6b9d'/%3E%3C/linearGradient%3E%3ClinearGradient id='e3' gradientUnits='userSpaceOnUse' x1='24' y1='27' x2='8' y2='27'%3E%3Cstop offset='0%25' stop-color='%23ff6b9d'/%3E%3Cstop offset='100%25' stop-color='%23ff5252'/%3E%3C/linearGradient%3E%3ClinearGradient id='e4' gradientUnits='userSpaceOnUse' x1='8' y1='27' x2='3' y2='12'%3E%3Cstop offset='0%25' stop-color='%23ff5252'/%3E%3Cstop offset='100%25' stop-color='%2352cc7a'/%3E%3C/linearGradient%3E%3ClinearGradient id='e5' gradientUnits='userSpaceOnUse' x1='3' y1='12' x2='16' y2='2'%3E%3Cstop offset='0%25' stop-color='%2352cc7a'/%3E%3Cstop offset='100%25' stop-color='%234da6ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cline x1='16' y1='2' x2='29' y2='12' stroke='url(%23e1)' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='29' y1='12' x2='24' y2='27' stroke='url(%23e2)' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='24' y1='27' x2='8' y2='27' stroke='url(%23e3)' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='8' y1='27' x2='3' y2='12' stroke='url(%23e4)' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='3' y1='12' x2='16' y2='2' stroke='url(%23e5)' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAVE ARCHIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600;800;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --yejun:#4da6ff;--noah:#a855f7;--bambi:#ff6b9d;--eunho:#ff5252;--hamin:#52cc7a;
  --accent:#facc15;--accent-light:#e8d5b7;
  --all:#f0f0f0;--bg:#060606;--bg2:#0d0d0d;--bg3:#121214;--card:#0f0f11;
  --border:rgba(255,255,255,0.07);--text:#e8e8f0;--muted:#888888;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:radial-gradient(ellipse at 30% 20%,#0a0a0e 0%,#030304 60%);background-attachment:fixed;color:var(--text);min-height:100vh;padding-top:0;min-width:312px;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;}

header{position:sticky;top:0;z-index:101;background:rgba(6,6,12,1);text-align:center;padding:18px 20px 14px;border-bottom:none;}
header::after{content:'';position:absolute;bottom:-8px;left:0;right:0;height:8px;background:linear-gradient(180deg,rgba(6,6,12,.2),transparent);pointer-events:none;}

.logo-title{font-family:'Jost',sans-serif;font-weight:900;font-size:clamp(22px,4.5vw,42px);letter-spacing:.12em;
  width:fit-content;margin:0 auto;
  background:linear-gradient(90deg,#4da6ff 0%,#4da6ff 10%,#a855f7 18%,#a855f7 28%,#ff6b9d 38%,#ff6b9d 52%,#ff5252 62%,#ff5252 76%,#52cc7a 86%,#52cc7a 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-sub{font-size:11px;letter-spacing:.15em;color:var(--muted);margin-top:5px;font-family:'Jost',sans-serif;}.logo-sub .stat-num{color:rgba(255,255,255,.55);font-weight:600;}.logo-sub .stat-div{color:rgba(255,255,255,.2);margin:0 6px;}.logo-sub .stat-div2{color:rgba(255,255,255,.15);margin:0 10px;}.logo-sub .stat-sub{color:rgba(255,255,255,.3);font-size:10px;}

.tab-bar{position:sticky;top:0;z-index:100;background:rgba(6,6,12,1);border-bottom:1px solid rgba(250,204,21,.15);}
.tab-bar::after{content:'';position:absolute;bottom:-8px;left:0;right:0;height:8px;background:linear-gradient(180deg,rgba(6,6,12,.2),transparent);pointer-events:none;}
.tab-row{max-width:1060px;margin:0 auto;display:flex;padding:0 16px;align-items:flex-end;justify-content:space-between;}
.tab-btn{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;padding:6px 12px;cursor:pointer;
  border-radius:8px 8px 0 0;border:1px solid rgba(255,255,255,.04);border-bottom:none;
  background:rgba(255,255,255,.01);backdrop-filter:blur(8px);
  color:rgba(255,255,255,.2);display:flex;align-items:center;gap:3px;
  transition:all .2s;white-space:nowrap;margin-bottom:-1px;}
.tab-btn:hover{color:rgba(255,255,255,.4);background:rgba(255,255,255,.03);}
.tab-btn.active{color:#facc15;background:rgba(250,204,21,.06);border-color:rgba(250,204,21,.15);
  box-shadow:inset 0 1px 0 rgba(250,204,21,.1);padding-bottom:7px;}
/* 비활성 탭 — 각 탭의 대표 카테고리 색으로 흐릿하게 */
.tab-btn.tab-live:not(.active){color:rgba(77,166,255,.4);}
.tab-btn.tab-live:not(.active):hover{color:rgba(77,166,255,.85);background:rgba(77,166,255,.04);}
.tab-btn.tab-lassgo:not(.active){color:rgba(255,183,77,.4);}
.tab-btn.tab-lassgo:not(.active):hover{color:rgba(255,183,77,.85);background:rgba(255,183,77,.04);}
.tab-btn.tab-yt:not(.active){color:rgba(168,85,247,.4);}
.tab-btn.tab-yt:not(.active):hover{color:rgba(168,85,247,.85);background:rgba(168,85,247,.04);}
.tab-btn.tab-shorts:not(.active){color:rgba(236,72,153,.4);}
.tab-btn.tab-shorts:not(.active):hover{color:rgba(236,72,153,.85);background:rgba(236,72,153,.04);}
.tab-btn.tab-stage:not(.active){color:rgba(239,68,68,.4);}
.tab-btn.tab-stage:not(.active):hover{color:rgba(239,68,68,.85);background:rgba(239,68,68,.04);}
.tab-btn.tab-ext:not(.active){color:rgba(82,204,122,.4);}
.tab-btn.tab-ext:not(.active):hover{color:rgba(82,204,122,.85);background:rgba(82,204,122,.04);}
.tab-btn.tab-ext-radio:not(.active){color:rgba(156,163,175,.4);}
.tab-btn.tab-ext-radio:not(.active):hover{color:rgba(156,163,175,.85);background:rgba(156,163,175,.04);}
.tab-btn.tab-ext-radio.active{color:#9ca3af;background:rgba(156,163,175,.1);border-color:rgba(156,163,175,.3);}
.tab-btn.tab-ext-video:not(.active){color:rgba(82,204,122,.4);}
.tab-btn.tab-ext-video:not(.active):hover{color:rgba(82,204,122,.85);background:rgba(82,204,122,.04);}
.tab-btn.tab-ext-video.active{color:#52cc7a;background:rgba(82,204,122,.1);border-color:rgba(82,204,122,.3);}
.tab-btn.tab-event:not(.active){color:rgba(141,194,63,.45);}
.tab-btn.tab-event:not(.active):hover{color:rgba(141,194,63,.9);background:rgba(141,194,63,.05);}
.tab-btn.tab-songs:not(.active){color:rgba(14,165,233,.4);}
.tab-btn.tab-songs:not(.active):hover{color:rgba(14,165,233,.85);background:rgba(14,165,233,.04);}
.tab-btn.tab-cover:not(.active){color:rgba(125,211,252,.4);}
.tab-btn.tab-cover:not(.active):hover{color:rgba(125,211,252,.85);background:rgba(125,211,252,.04);}

.controls{position:sticky;top:0;z-index:99;background:rgba(6,6,12,1);border-bottom:none;padding:10px 0;isolation:isolate;}
.controls::after{content:'';position:absolute;bottom:-8px;left:0;right:0;height:8px;background:linear-gradient(180deg,rgba(6,6,12,.2),transparent);pointer-events:none;z-index:-1;}
#filters-collapsible{transition:max-height .18s cubic-bezier(0.4,0,0.2,1),opacity .15s ease;overflow:hidden;max-height:300px;opacity:1;position:relative;}
#filters-collapsible.collapsed{max-height:0!important;opacity:0;}
#filters-collapsible::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(to bottom,transparent,rgba(6,6,17,1));opacity:0;pointer-events:none;transition:opacity .15s ease;z-index:1;}
#filters-collapsible.collapsing::after{opacity:1;}
.controls-inner{max-width:1060px;margin:0 auto;padding:0 16px;display:flex;flex-direction:column;gap:6px;}
.search-row{position:relative;}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:8px 138px 8px 12px;color:#ffffff;font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:rgba(250,204,21,.5);background:var(--bg3);}
.search-input:-webkit-autofill,.search-input:-webkit-autofill:focus{-webkit-box-shadow:0 0 0 1000px var(--bg3) inset;-webkit-text-fill-color:#ffffff;}
.search-input::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;}
.scr-expand{padding:6px 8px;background:rgba(45,212,191,.03);border:1px solid rgba(45,212,191,.08);border-radius:6px;margin-top:6px}
.scr-expand-h{font-size:9px;color:rgba(45,212,191,.5);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.scr-line{display:flex;align-items:flex-start;gap:6px;padding:2px 4px;font-size:10px;border-radius:3px}
.scr-line.hit{background:rgba(250,204,21,.06);border:1px solid rgba(250,204,21,.1)}
.scr-tc{color:#2dd4bf;background:rgba(45,212,191,.08);border:1px solid rgba(45,212,191,.25);font-family:'Jost',sans-serif;font-weight:600;font-size:8px;letter-spacing:.02em;padding:1px 6px;min-width:40px;flex-shrink:0;text-align:center;border-radius:999px;cursor:pointer;text-decoration:none;display:inline-block;transition:all .15s}
.scr-tc:hover{transform:translateX(1px);background:rgba(45,212,191,.16);border-color:rgba(45,212,191,.5)}
.scr-tx{color:rgba(255,255,255,.5);line-height:1.5}
.hl-expand{padding:6px 8px;background:rgba(255,183,77,.03);border:1px solid rgba(255,183,77,.08);border-radius:6px;margin-top:4px}
.hl-expand-h{font-size:9px;color:rgba(255,183,77,.5);margin-bottom:4px;cursor:pointer}
.hl-line{display:flex;align-items:flex-start;gap:6px;font-size:10px;padding:2px 4px}
.hl-tc{color:#ffb74d;background:rgba(255,183,77,.08);border:1px solid rgba(255,183,77,.25);font-family:'Jost',sans-serif;font-weight:600;font-size:8px;letter-spacing:.02em;padding:1px 6px;min-width:40px;flex-shrink:0;text-align:center;border-radius:999px;cursor:pointer;text-decoration:none;display:inline-block;transition:all .15s}
.hl-tc:hover{transform:translateX(1px);background:rgba(255,183,77,.16);border-color:rgba(255,183,77,.5)}
.hl-lb{color:rgba(255,255,255,.55);flex:1;line-height:1.5}
.m-hl{background:rgba(250,204,21,.2);color:#facc15;padding:0 2px;border-radius:2px}
.m-hl-y{background:rgba(255,183,77,.15);color:#ffb74d;padding:0 2px;border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideBar{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.search-bar-wrap{position:relative;display:flex;align-items:center;gap:8px;overflow:hidden;}
.search-icon-circle{width:30px;height:30px;border-radius:50%;background:rgba(250,204,21,.06);border:1px solid rgba(250,204,21,.15);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;}
.search-bar-wrap .search-bar-inner{flex:1;display:flex;align-items:center;gap:6px;padding:0 12px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;position:relative;overflow:hidden;}
.search-bar-wrap .search-bar-inner:focus-within{border-color:rgba(250,204,21,.2);}
.search-bar-wrap .sbar-top{position:absolute;top:0;left:0;right:0;height:2px;}
.search-bar-wrap .sbar-top::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(250,204,21,.6),transparent);display:none;}
.search-bar-wrap .sbar-bottom{position:absolute;bottom:0;left:0;height:2px;background:linear-gradient(90deg,#e8d5b7,#facc15);border-radius:0 2px 2px 0;width:0;transition:width .3s;}
/* 페이지 최상단 로딩바 (fixed, 4px, B+C 합친 디자인) */
.page-loadbar{position:fixed;top:0;left:0;right:0;height:3px;background:rgba(0,0,0,.5);z-index:99999;display:none;overflow:hidden;}
.page-loadbar.show{display:block;}
.page-loadbar-fill{display:block;position:relative;height:100%;width:0%;background:linear-gradient(90deg,#ffb74d,#facc15);box-shadow:0 0 10px rgba(255,183,77,.6),0 0 4px rgba(250,204,21,.8);transition:width .3s ease-out;}
.page-loadbar-fill::after{
  content:"";
  position:absolute;top:0;left:0;width:40%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);
  animation:pageLoadShimmer 1.4s ease-in-out infinite;
}
@keyframes pageLoadShimmer{
  0%{left:-40%;}
  100%{left:100%;}
}
.page-loadbar.done{opacity:0;transition:opacity .4s .2s;}

/* ═══ 재생목록 만들기 기능 ═══ */
/* FAB 버튼 */
.playlist-fab{position:fixed;bottom:24px;right:24px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#ffb74d,#facc15);color:#0b0b0d;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 24px rgba(250,204,21,.3);transition:transform .15s,background .2s;z-index:9998;}
.playlist-fab:hover{transform:scale(1.08);}
.playlist-fab.active{background:linear-gradient(135deg,#52cc7a,#34d399);box-shadow:0 6px 24px rgba(82,204,122,.4);}
.playlist-fab svg{width:24px;height:24px;}

/* 액션바 */
#playlist-actionbar{background:rgba(20,20,28,.95);backdrop-filter:blur(8px);border:1px solid rgba(82,204,122,.3);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(82,204,122,.1);margin:12px 0;}
#playlist-actionbar .ab-left{display:flex;align-items:center;gap:10px;flex-shrink:0;}
#playlist-actionbar .ab-mode{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#52cc7a;font-weight:700;letter-spacing:.5px;}
#playlist-actionbar .ab-mode::before{content:"●";color:#52cc7a;animation:abblink 1.5s infinite;}
@keyframes abblink{0%,100%{opacity:1;}50%{opacity:.4;}}
#playlist-actionbar .ab-count{font-size:11px;color:#888;font-weight:600;}
#playlist-actionbar .ab-count b{color:#fff;}
#playlist-actionbar .ab-count.full b{color:#ef4444;}
#playlist-actionbar .ab-divider{width:1px;height:20px;background:rgba(255,255,255,.1);}
#playlist-actionbar .ab-mid{flex:1;min-width:0;}
.ab-listlink{color:#52cc7a;text-decoration:underline;cursor:pointer;}
.ab-listlink:hover{color:#34d399;}
#playlist-actionbar .ab-right{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;}
#playlist-actionbar .ab-btn{padding:5px 10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.7);border-radius:6px;font-size:10px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:4px;line-height:1;}
#playlist-actionbar .ab-btn:hover{background:rgba(255,255,255,.08);color:#fff;}
#playlist-actionbar .ab-btn.primary{background:linear-gradient(90deg,#ff0000,#cc0000);color:#fff;border-color:rgba(255,0,0,.4);font-weight:600;}
#playlist-actionbar .ab-btn.danger{color:rgba(244,114,114,.7);border-color:rgba(244,114,114,.2);}
#playlist-actionbar .ab-btn.danger:hover{background:rgba(244,114,114,.08);color:#f47272;}
#playlist-actionbar .ab-btn.ab-add-all{color:#52cc7a;border-color:rgba(82,204,122,.3);}
#playlist-actionbar .ab-btn.ab-add-all:hover{background:rgba(82,204,122,.1);color:#34d399;}

@media (max-width:768px){
  #playlist-actionbar{flex-wrap:wrap;}
  #playlist-actionbar .ab-mid{flex-basis:100%;order:99;text-align:center;margin-top:6px;}
  #playlist-actionbar .ab-mid + .ab-divider{display:none;}
}

/* 패널 */
.playlist-panel{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:10000;display:flex;align-items:center;justify-content:center;padding:24px;}
.playlist-panel .pp-box{background:#0b0b0d;border:1px solid rgba(255,255,255,.12);border-radius:14px;max-width:680px;width:100%;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.6);overflow:hidden;}
.pp-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.06);}
.pp-head h3{margin:0;font-size:13px;color:#fff;font-weight:700;}
.pp-head h3 span{color:#52cc7a;}
.pp-close{background:none;border:none;color:#888;font-size:22px;cursor:pointer;padding:0 8px;line-height:1;}
.pp-close:hover{color:#fff;}
.pp-body{flex:1;overflow-y:auto;padding:14px 20px;}
.pp-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.pp-item:last-child{border-bottom:none;}
.pp-item-num{flex-shrink:0;min-width:28px;height:28px;padding:0 6px;background:rgba(82,204,122,.15);border:1px solid rgba(82,204,122,.4);color:#52cc7a;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:'Jost',sans-serif;}
.pp-item-thumb{width:80px;height:45px;background:#222;border-radius:4px;flex-shrink:0;object-fit:cover;}
.pp-item-body{flex:1;min-width:0;}
.pp-item-date{font-size:10px;color:#888;margin-bottom:2px;}
.pp-item-title{font-size:11px;color:#fff;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pp-item-x{background:none;border:none;color:#666;font-size:18px;cursor:pointer;padding:0 6px;line-height:1;flex-shrink:0;}
.pp-item-x:hover{color:#ef4444;}

/* 정렬 버튼 활성 */
.ab-btn.sort-active{background:rgba(82,204,122,.15) !important;border-color:rgba(82,204,122,.4) !important;color:#52cc7a !important;}

/* 핸들 */
.pp-handle{flex-shrink:0;color:#666;cursor:grab;padding:4px 4px;display:flex;align-items:center;touch-action:none;user-select:none;-webkit-user-select:none;}
.pp-handle:hover{color:#fff;}
.pp-handle:active{cursor:grabbing;}
.pp-item.dragging{opacity:.85;border:2px solid #52cc7a !important;background:rgba(82,204,122,.08);border-radius:8px;box-shadow:0 4px 14px rgba(82,204,122,.4);transform:scale(1.02);}
.pp-item.drop-over{border-top:2px solid #52cc7a;}

/* 모바일: 패널 footer 버튼 폰트/패딩 축소 */
@media (max-width:768px){
  .pp-foot .ab-btn{font-size:9px !important;padding:5px 7px !important;white-space:nowrap;gap:3px;}
  .pp-foot{gap:4px;padding:10px 12px;}
}

/* 모바일 필터 버튼 — 전체/전원 → 아이콘만, 나머지 → 글자 축소 */
.all-btn-icon{display:none;}
@media (max-width:768px){
  .all-btn-icon{display:inline-block;}
  .all-btn-text{display:none;}
  .btn{font-size:10px !important;padding:4px 8px !important;}
  .btn-platform{font-size:10px !important;padding:4px 8px !important;}
  .filter-row-labeled .btn,
  .filter-label-btn{font-size:11px !important;}
  /* 멤버 버튼 텍스트 숨김 (모바일) — broadcast + 커버곡 공통 */
  .m-name{display:none;}
  /* 멤버 버튼 — 길게 누르면 풀네임 툴팁 */
  .btn-yejun, .btn-noah, .btn-bambi, .btn-eunho, .btn-hamin, .btn-cover-member{position:relative;}
  .btn-yejun[data-tooltip]::after, .btn-noah[data-tooltip]::after, .btn-bambi[data-tooltip]::after, .btn-eunho[data-tooltip]::after, .btn-hamin[data-tooltip]::after, .btn-cover-member[data-tooltip]::after{
    content:attr(data-tooltip);
    position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);

.card-extras{margin-top:8px;display:flex;flex-direction:column;gap:5px;}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;}
.card-tag{font-size:10px;padding:1px 8px;border-radius:10px;
  background:rgba(168,85,247,.1);color:var(--noah);border:1px solid rgba(168,85,247,.18);}
/* tag group styles */
.tg-tabs{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border);margin-bottom:10px;}
.tg-tab{flex:1;background:transparent;border:none;color:var(--muted);font-family:'Jost',sans-serif;
  font-size:10px;font-weight:600;letter-spacing:.12em;padding:7px 4px;cursor:pointer;transition:all .15s;text-transform:uppercase;}
.tg-tab:not(:last-child){border-right:1px solid var(--border);}
.tg-tab.active-a{background:rgba(168,85,247,.1);color:var(--noah);}
.tg-tab.active-b{background:rgba(77,166,255,.1);color:var(--yejun);}
.tg-tab.active-c{background:rgba(82,204,122,.1);color:var(--hamin);}
.m-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px 3px 11px;border-radius:12px;}
.m-tag-a{background:rgba(168,85,247,.12);color:var(--noah);border:1px solid rgba(168,85,247,.22);}
.m-tag-b{background:rgba(77,166,255,.1);color:var(--yejun);border:1px solid rgba(77,166,255,.2);}
.m-tag-c{background:rgba(82,204,122,.1);color:var(--hamin);border:1px solid rgba(82,204,122,.2);}
.card-tag-a{background:rgba(168,85,247,.1);color:var(--noah);border:1px solid rgba(168,85,247,.18);}
.card-tag-b{background:rgba(77,166,255,.08);color:var(--yejun);border:1px solid rgba(77,166,255,.16);}
.card-tag-c{background:rgba(82,204,122,.08);color:var(--hamin);border:1px solid rgba(82,204,122,.18);}
.tag-grp-label{font-size:9px;opacity:.55;margin-right:1px;}
.card-links{display:flex;gap:4px;flex-wrap:wrap;}
.card-link{font-size:10px;padding:1px 8px;border-radius:4px;
  background:rgba(77,166,255,.08);color:var(--yejun);border:1px solid rgba(77,166,255,.16);
  text-decoration:none;transition:background .15s;}
.card-link:hover{background:rgba(77,166,255,.2);}
.card-edit-hint{position:absolute;bottom:8px;right:10px;font-size:9px;color:var(--muted);
  opacity:0;transition:opacity .2s;pointer-events:none;letter-spacing:.05em;}

/* sort toggle */
.sort-toggle{display:flex;border-radius:6px;overflow:hidden;border:1px solid var(--border);flex-shrink:0;}
.sort-btn{background:transparent;border:none;color:var(--muted);font-family:'Jost',sans-serif;font-size:10px;
  font-weight:600;letter-spacing:.06em;padding:5px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.sort-btn:not(:last-child){border-right:1px solid var(--border);}
.sort-btn.active{background:rgba(250,204,21,.15);color:#facc15;}

/* season debut glow */
.card.season-debut{box-shadow:0 0 0 1.5px rgba(232,201,122,.6),0 0 16px rgba(232,201,122,.22);
  border-color:rgba(232,201,122,.5);}
.card.season-debut::before{opacity:1!important;background:linear-gradient(90deg,#e8c97a,#f5e0a0,#e8c97a)!important;}

/* thumbnail card layout */
.card-with-thumb{display:flex;gap:11px;align-items:flex-start;overflow:hidden;}
.card-thumb-link{flex-shrink:0;width:160px;min-width:160px;max-width:160px;height:90px;border-radius:6px;overflow:hidden;background:var(--bg3);display:block;position:relative;}
.card-thumb-link img{width:100%;height:100%;object-fit:cover;display:block;}
.card-thumb-link:hover img{opacity:.85;}
.card-thumb-empty{flex-shrink:0;width:160px;min-width:160px;height:90px;border-radius:6px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:20px;opacity:.3;}
.card-body-wrap{display:flex;flex-direction:column;justify-content:space-between;width:142px;min-width:142px;max-width:142px;flex-shrink:0;overflow:hidden;}
.card-body-left{display:contents;}
.card-main-link{display:inline-flex;align-items:center;gap:5px;margin-top:6px;
  font-size:11px;color:var(--yejun);text-decoration:none;opacity:.85;transition:opacity .15s;}
.card-main-link:hover{opacity:1;}
.main-link-row{display:flex;align-items:center;gap:8px;background:var(--bg3);
  border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-bottom:10px;}
.main-link-display{flex:1;min-width:0;display:flex;align-items:center;gap:8px;}
.main-link-display a{font-size:12px;color:var(--yejun);text-decoration:none;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;flex:1;}
.main-link-display a:hover{text-decoration:underline;}
.main-link-edit-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);
  font-size:11px;padding:4px 9px;cursor:pointer;flex-shrink:0;transition:all .15s;white-space:nowrap;}
.main-link-edit-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2);}
.main-link-save-btn{background:rgba(77,166,255,.1);border:1px solid rgba(77,166,255,.25);border-radius:6px;
  color:var(--yejun);font-family:'Noto Sans KR',sans-serif;font-size:11px;padding:5px 11px;
  cursor:pointer;flex-shrink:0;transition:background .15s;white-space:nowrap;}
.main-link-save-btn:hover{background:rgba(77,166,255,.22);}
.main-link-del-btn{background:none;border:none;color:var(--muted);font-size:13px;
  cursor:pointer;flex-shrink:0;transition:color .15s;padding:0;}
.main-link-del-btn:hover{color:var(--eunho);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(7px);
  z-index:9999;display:none;align-items:center;justify-content:center;padding:16px;flex-direction:column;gap:14px;}
.modal-overlay.open{display:flex;}
.modal-box{background:#0b0b0d;border:1px solid rgba(255,255,255,.12);border-radius:16px;
  width:100%;max-width:540px;max-height:88vh;overflow-y:auto;position:relative;
  box-shadow:0 24px 80px rgba(0,0,0,.6);}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:0;position:sticky;top:0;
  background:#0b0b0d;z-index:1;border-radius:16px 16px 0 0;}
.modal-header-info{flex:1;min-width:0;}
.modal-meta{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.modal-date{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.12em;color:var(--muted);}
.modal-close{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);
  font-size:14px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:color .15s,border-color .15s;}
.modal-close:hover{color:var(--text);border-color:rgba(255,255,255,.2);}
.modal-main-title{font-size:13px;color:var(--text);line-height:1.45;}
.modal-body{padding:18px 22px 24px;display:flex;flex-direction:column;gap:0;}
/* 라쓰고쇼츠 캐러셀 (라쓰고 모달 전용) */
#m-shorts-bar{display:flex;justify-content:center;width:100%;max-width:540px;padding:0;}
.m-shorts-h{display:none;}
.m-shorts-h-l{display:flex;align-items:center;gap:5px;font-family:'Jost',sans-serif;font-size:10px;font-weight:700;color:#ffb74d;letter-spacing:.08em;}
.m-shorts-cnt{font-size:9px;color:var(--muted);font-family:'Jost',sans-serif;font-weight:600;}
.m-shorts-track{display:flex;gap:8px;padding:2px 0;align-items:flex-end;}
.m-shorts-track::-webkit-scrollbar{height:3px;}
.m-shorts-track::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
.m-shorts-item{position:relative;cursor:pointer;border-radius:5px;overflow:hidden;transition:transform .15s;text-decoration:none;flex-shrink:0;display:block;}
.m-shorts-item:hover{transform:translateY(-2px);}
.m-shorts-thumb{width:55px;aspect-ratio:9/16;background:linear-gradient(135deg,#3a2a4a,#1a1a2a);position:relative;overflow:hidden;border-radius:5px;box-shadow:0 4px 12px rgba(0,0,0,.5);}
.m-shorts-thumb.sq{width:55px;aspect-ratio:1/1;}
.m-shorts-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}

/* 쇼츠 로딩바 (0~100% 진행 + 글로우) */
.m-shorts-loadbar{position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.04);overflow:hidden;border-radius:14px 14px 0 0;z-index:10;pointer-events:none;}
.m-shorts-loadbar > span{display:block;height:100%;width:0%;background:linear-gradient(90deg,#ffb74d,#facc15);box-shadow:0 0 8px rgba(255,183,77,.5);transition:width .3s ease-out;}
.m-shorts-loadbar.done{opacity:0;transition:opacity .4s .2s;}
.m-shorts-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;color:#fff;font-size:6px;opacity:0;transition:opacity .15s;}
.m-shorts-item:hover .m-shorts-play{opacity:1;}
.m-shorts-chip{position:absolute;top:2px;right:2px;font-family:'Jost',sans-serif;font-size:5.5px;font-weight:700;letter-spacing:.04em;padding:1px 3px;border-radius:2px;line-height:1.3;white-space:nowrap;pointer-events:none;background:rgba(250,204,21,.92);color:#1a1500;}
.mtab-bar{display:flex;gap:0;border:1px solid rgba(255,255,255,.07);border-radius:7px;overflow:hidden;margin-bottom:14px;}
.m-sub-chip{padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);font-size:10px;color:rgba(255,255,255,.7);font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
.mtab{display:flex;align-items:center;justify-content:center;gap:4px;padding:0 10px;font-size:10px;color:rgba(255,255,255,.3);background:transparent;border:none;border-right:1px solid rgba(255,255,255,.05);cursor:pointer;height:32px;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;transition:all .15s;}
.mtab:last-child{border-right:none;}
.mtab.on{background:rgba(250,204,21,.06);color:#facc15;}
.mtab-ib{width:16px;height:14px;border-radius:3px;font-size:8px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.mtab-ib-t{border:1px solid rgba(45,212,191,.25);color:rgba(45,212,191,.4);}
.mtab-ib-t.on{border-color:rgba(45,212,191,.7);color:#2dd4bf;background:rgba(45,212,191,.1);}
.mtab-ib-s{border:1px solid rgba(255,183,77,.2);color:rgba(255,183,77,.3);font-size:7px;}
.mtab-ib-s.on{border-color:rgba(255,183,77,.7);color:#ffb74d;background:rgba(255,183,77,.1);}
.mtab-search{width:54px;height:15px;background:rgba(0,0,0,.3);border-radius:3px;padding:0 4px;font-size:8px;outline:none;font-family:'Noto Sans KR',sans-serif;border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.4);}
.mtab-search.c-t{border-color:rgba(45,212,191,.15);color:rgba(45,212,191,.4);}
.mtab-search.c-t:focus{border-color:rgba(45,212,191,.5);}
.mtab-search.c-s{border-color:rgba(255,183,77,.1);color:rgba(255,183,77,.3);}
.mtab-search.c-s:focus{border-color:rgba(255,183,77,.4);}
.mtab-count{font-size:7px;color:rgba(255,255,255,.25);}
.mpanel{display:none;max-height:300px;overflow-y:auto;}
.mpanel.on{display:block;}
.mpanel-empty{font-size:11px;color:rgba(255,255,255,.2);padding:16px 0;text-align:center;}
.mp-line{display:flex;align-items:flex-start;gap:6px;padding:3px 6px;font-size:11px;border-radius:4px;}
.mp-line:hover{background:rgba(255,255,255,.02);}
.mp-line.hit{background:rgba(250,204,21,.06);border:1px solid rgba(250,204,21,.1);}
.mp-tc{font-family:'Jost',sans-serif;font-weight:600;font-size:8px;letter-spacing:.02em;padding:1px 6px;min-width:40px;flex-shrink:0;text-align:center;border-radius:999px;border:1px solid;cursor:pointer;text-decoration:none;display:inline-block;transition:all .15s;}
.mp-tc-t{color:#2dd4bf;background:rgba(45,212,191,.08);border-color:rgba(45,212,191,.25);}
.mp-tc-s{color:#ffb74d;background:rgba(255,183,77,.08);border-color:rgba(255,183,77,.25);}
.mp-tc:hover{transform:translateX(1px);}
.mp-tc-t:hover{background:rgba(45,212,191,.16);border-color:rgba(45,212,191,.5);}
.mp-tc-s:hover{background:rgba(255,183,77,.16);border-color:rgba(255,183,77,.5);}
.mp-tx{color:rgba(255,255,255,.5);line-height:1.6;}
.mp-info{font-size:10px;color:rgba(255,255,255,.25);margin-bottom:8px;}
.section-head{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;
  text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.tags-display{display:flex;flex-wrap:wrap;gap:5px;min-height:10px;margin-bottom:10px;}
.m-tag-del{background:none;border:none;color:inherit;opacity:.55;cursor:pointer;font-size:13px;
  padding:0;line-height:1;transition:opacity .15s;}
.m-tag-del:hover{opacity:1;}
.empty-note{font-size:11px;color:var(--muted);margin-bottom:10px;}
.m-row{display:flex;gap:8px;}
.m-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;
  padding:8px 12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:12px;outline:none;
  transition:border-color .2s;}
.m-input:focus{border-color:rgba(250,204,21,.45);}
.m-input::placeholder{color:var(--muted);}
.m-btn{background:rgba(250,204,21,.1);border:1px solid rgba(250,204,21,.28);border-radius:7px;
  color:var(--noah);font-family:'Noto Sans KR',sans-serif;font-size:12px;padding:8px 15px;
  cursor:pointer;white-space:nowrap;transition:background .15s;}
.m-btn:hover{background:rgba(250,204,21,.22);}
.tc-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.tc-item{display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:8px;
  padding:8px 10px;border:1px solid var(--border);cursor:grab;user-select:none;transition:opacity .15s,border-color .15s;}
.tc-item.dragging{opacity:.4;border-color:var(--noah);}
.tc-item.drag-over{border-color:rgba(250,204,21,.5);background:rgba(250,204,21,.05);}
.tc-item-num{font-family:'Jost',sans-serif;font-size:10px;color:var(--muted);min-width:16px;text-align:right;flex-shrink:0;}
.tc-item-drag{font-size:12px;color:var(--muted);flex-shrink:0;cursor:grab;opacity:.5;}
.tc-item-label{font-size:11px;color:var(--text);flex:0 0 auto;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tc-item a{flex:1;font-size:11px;color:var(--yejun);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tc-item a:hover{text-decoration:underline;}
.tc-item-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0;flex-shrink:0;transition:color .15s;}
.tc-item-del:hover{color:var(--eunho);}
.tc-tabs{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--border);margin-bottom:10px;}
.tc-tab{flex:1;background:transparent;border:none;color:var(--muted);font-family:'Noto Sans KR',sans-serif;
  font-size:11px;padding:7px;cursor:pointer;transition:all .15s;}
.tc-tab.active{background:rgba(255,255,255,.06);color:var(--text);}
.tc-tab:not(:last-child){border-right:1px solid var(--border);}
.tc-pane{display:flex;flex-direction:column;gap:7px;}
.tc-preview-box{font-size:11px;color:var(--noah);word-break:break-all;padding:7px 11px;
  background:rgba(250,204,21,.06);border-radius:7px;border:1px solid rgba(250,204,21,.16);}

.empty{text-align:center;padding:56px 20px;color:var(--muted);font-size:13px;}
.empty-icon{font-size:34px;margin-bottom:10px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px;}

@media(max-width:600px){

  .filter-divider{display:none;}
  .tab-btn{padding:5px 10px;font-size:9px;}
  .modal-box{max-height:92vh;}
  .m-row{flex-direction:column;}
}
/* ── 발매곡 ── */

.btn-song-year.active,.btn-song-type.active{background:rgba(45,212,191,.12);border-color:rgba(45,212,191,.35);color:#2dd4bf;}
.songs-album-section{margin-bottom:22px;}
.songs-album-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.songs-album-label{font-size:12px;font-weight:700;letter-spacing:.06em;padding:3px 10px;border-radius:5px;border-left:3px solid;}
.songs-album-date{font-size:10px;color:var(--muted);}
.songs-grid{display:flex;flex-wrap:wrap;gap:10px;}
.song-card{background:#0f0f1e;border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .15s;flex-shrink:0;width:150px;}
.song-card:hover{border-color:rgba(255,255,255,.2);}
.song-thumb-wrap{width:100%;aspect-ratio:1;position:relative;overflow:hidden;background:#0e0e0e;}
.song-thumb-blur{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(16px);opacity:.6;transform:scale(1.15);}
.song-thumb-img{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.song-thumb-img img{width:100%;height:100%;object-fit:cover;}
.song-thumb-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;}
.song-top-badges{position:absolute;top:5px;left:5px;display:flex;gap:3px;flex-wrap:wrap;}
.song-link-icon{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.6);color:#aaa;padding:2px 5px;border-radius:4px;font-size:10px;}
.song-body{padding:8px 9px;}
.song-title-text{color:#eee;font-size:11px;font-weight:700;margin-bottom:3px;line-height:1.3;word-break:keep-all;overflow-wrap:break-word;}
.song-meta-mini{color:#555;font-size:9px;line-height:1.5;}
.song-badge{padding:2px 5px;border-radius:4px;font-size:9px;font-weight:700;}
.sb-title{background:rgba(250,204,21,.9);color:#f0f0f0;}
.sb-track{background:rgba(77,166,255,.8);color:#dff0ff;}
.sb-ost{background:rgba(45,212,191,.75);color:#003d35;}
.sb-inst{background:rgba(255,183,77,.75);color:#3d2000;}
/* 모달 */
.song-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:none;align-items:center;justify-content:center;}
.song-modal-box{background:#0f0f1e;border:1px solid rgba(255,255,255,.12);border-radius:12px;overflow:hidden;display:flex;width:min(500px,95vw);max-height:90vh;}
.song-modal-left{width:180px;height:180px;flex-shrink:0;position:relative;overflow:hidden;background:#0e0e0e;cursor:pointer;}
.song-modal-left:hover .song-modal-hover{opacity:1;}
.song-modal-hover{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:11px;color:#fff;font-weight:600;}
.song-modal-right{flex:1;padding:14px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
.song-modal-badges{display:flex;gap:4px;flex-wrap:wrap;}
.song-modal-title{color:#eee;font-size:13px;font-weight:700;}
.song-modal-sub{color:#a78bfa;font-size:9px;}
.song-modal-divider{border:none;border-top:1px solid rgba(255,255,255,.06);}
.song-modal-mk{color:#444;font-size:9px;width:36px;flex-shrink:0;}
.song-modal-mv{color:#999;font-size:10px;}
.song-tag-label{color:#555;font-size:9px;display:flex;align-items:center;gap:4px;}
.song-tag-list{display:flex;flex-wrap:wrap;gap:3px;min-height:14px;}
.song-tag{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#888;padding:2px 7px;border-radius:20px;font-size:9px;cursor:pointer;}
.song-tag:hover{border-color:rgba(255,82,82,.4);color:#ff5252;}
.song-tag-empty{color:#333;font-size:9px;}
@media(max-width:600px){

  .song-modal-box{flex-direction:column;}
  .song-modal-left{width:100%;height:160px;}
}
/* ── 그라데이션 테두리 (로고 컬러) ── */
/* ── 방송 타입 버튼 ── */

<script>
/* ── helpers ── */
/* ── YouTube ID 추출 helper ── */
function ytThumb(url){
  if(!url) return "";
  const m=(url||"").match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|live\/|embed\/|v\/))([a-zA-Z0-9_-]{11})/);
  return m?`https://i.ytimg.com/vi/${m[1]}/mqdefault.jpg`:"";
}
const MC={예준:"yejun",노아:"noah",밤비:"bambi",은호:"eunho",하민:"hamin",전원:"all"};
const ME={예준:"💙",노아:"💜",밤비:"🩷",은호:"❤️",하민:"🖤",전원:"✨"};
const SPINNER_HTML='<span class="penta-spinner"><svg viewBox="0 0 32 32" width="20" height="20"><line x1="16" y1="2" x2="29" y2="12" stroke="#4da6ff" stroke-width="2.5" stroke-linecap="round"/><line x1="29" y1="12" x2="24" y2="27" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round"/><line x1="24" y1="27" x2="8" y2="27" stroke="#ff6b9d" stroke-width="2.5" stroke-linecap="round"/><line x1="8" y1="27" x2="3" y2="12" stroke="#ff5252" stroke-width="2.5" stroke-linecap="round"/><line x1="3" y1="12" x2="16" y2="2" stroke="#52cc7a" stroke-width="2.5" stroke-linecap="round"/></svg></span>';
const MODAL_LOADING_HTML='<div class="modal-loading"><div class="spin-wrap"><svg viewBox="0 0 32 32" width="48" height="48"><line x1="16" y1="2" x2="29" y2="12" stroke="#4da6ff" stroke-width="2" stroke-linecap="round"/><line x1="29" y1="12" x2="24" y2="27" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/><line x1="24" y1="27" x2="8" y2="27" stroke="#ff6b9d" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="27" x2="3" y2="12" stroke="#ff5252" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="12" x2="16" y2="2" stroke="#52cc7a" stroke-width="2" stroke-linecap="round"/></svg><span class="spin-pct" id="modal-spin-pct">0%</span></div></div>';
let _modalPctTimer=null;
function startModalPct(targetId){
  const el=document.getElementById(targetId);
  if(!el) return;
  el.innerHTML=MODAL_LOADING_HTML;
  let p=0;
  const pctEl=document.getElementById('modal-spin-pct');
  clearInterval(_modalPctTimer);
  _modalPctTimer=setInterval(()=>{
    if(p<85) p+=Math.random()*8+2;
    if(p>85) p=85;
    if(pctEl) pctEl.textContent=Math.round(p)+'%';
  },200);
}
function stopModalPct(){clearInterval(_modalPctTimer);}
const pc=m=>"pill-"+(MC[m]||"all");
const pills=arr=>{
  if(!arr||arr.length===0) return '';
  if(arr.length===1&&arr[0]==='전원') return `<span class="member-pill pill-all"><i class="pxi"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4 20 12 12 20 4 12z"/></svg></i> 전원</span>`;
  if(arr.includes('전원')||arr.length>=5) return `<span class="member-pill pill-all"><i class="pxi"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4 20 12 12 20 4 12z"/></svg></i> 전원</span>`;
  return arr.map(m=>`<span class="member-pill ${pc(m)}">${ME[m]||""} ${m}</span>`).join("");
};
function cc(arr){
  if(!arr||!arr.length)return"c-mixed";
  if(arr.includes("전원")||arr.length>=5)return"c-all";
  if(arr.length===1)return"c-"+(MC[arr[0]]||"mixed");
  return"c-mixed";
}
const MORDER=["예준","노아","밤비","은호","하민"];
const MCOLORS={예준:"#4da6ff",노아:"#a855f7",밤비:"#ff6b9d",은호:"#ff5252",하민:"#52cc7a"};
const MCOLORS_A={예준:"rgba(77,166,255,.3)",노아:"rgba(168,85,247,.3)",밤비:"rgba(255,107,157,.3)",은호:"rgba(255,82,82,.3)",하민:"rgba(82,204,122,.3)"};
function memberGradStyle(arr){
  if(!arr||arr.length<=1||arr.includes("전원")||arr.length>=5)return"";
  const ordered=MORDER.filter(m=>arr.includes(m));
  if(ordered.length<=1)return"";
  const colors=ordered.map(m=>MCOLORS[m]);
  const grad=`linear-gradient(90deg,${colors.join(",")})`;
  return`--cg:${grad};--cb:${MCOLORS_A[ordered[0]]}`;
}
const matchM=(arr)=>{
  if(curMemSet.size===0)return true;
  if(curMemSet.has("all")){
    // 전원 버튼 = 5인 방송만 ("전원" 문자열 또는 5명 개별 저장)
    return arr.includes("전원")||arr.length>=5;
  }
  const expanded=arr.includes("전원")?["예준","노아","밤비","은호","하민"]:arr;
  if(curMemMode==="include"){
    return [...curMemSet].every(m=>expanded.includes(m));
  }
  // 일치: 정확히 같은 멤버 조합
  if(expanded.length!==curMemSet.size)return false;
  return expanded.every(m=>curMemSet.has(m));
};

/* ── state ── */
let curMemMode="exact";
let curTab="live",curYearSet=new Set(),curMemSet=new Set(),curQ="",curTagMode="include",curEraSet=new Set(),curSpecial="all",curSort="desc",curBcastTagSearchMode=false;
let curScriptSearchOn=false, curHlSearchOn=false;
let scriptSearchResults={}, hlSearchResults={};
let curComeback=false;
let curVisitFilter=false;
let curVisitSmSet=new Set(); // 🐾 방문 멤버
let curVisitPmSet=new Set(); // 전화 멤버

function toggleVisitRows(){
  const rows=document.getElementById("visit-rows");
  const btn=document.getElementById("visit-toggle-btn");
  const open=rows.style.display==="flex";
  rows.style.display=open?"none":"flex";
  if(btn){
    btn.style.background=open?"":"rgba(255,255,255,.06)";
    btn.style.borderColor=open?"":"rgba(255,255,255,.3)";
    btn.style.color=open?"":"rgba(255,255,255,.6)";
  }
  if(open){
    // 접을 때 필터 해제
    curVisitSmSet.clear();curVisitPmSet.clear();curVisitFilter=false;
    document.querySelectorAll(".visit-btn").forEach(b=>{b.classList.remove("active");b.style.opacity=".5";b.style.borderStyle="dashed";});
    render();
  }
}

function setVisitMember(btn){
  const vtype=btn.dataset.vtype; // "sm" or "pm"
  const m=btn.dataset.member;
  const set=vtype==="sm"?curVisitSmSet:curVisitPmSet;
  if(set.has(m)){
    set.delete(m);
    btn.classList.remove("active");btn.style.opacity=".5";btn.style.borderStyle="dashed";
  } else {
    set.add(m);
    btn.classList.add("active");btn.style.opacity="1";btn.style.borderStyle="solid";
  }
  curVisitFilter=curVisitSmSet.size>0||curVisitPmSet.size>0;
  render();
}

function toggleAllSearchBtns(){
  const allOn=curBcastTagSearchMode&&curScriptSearchOn&&curHlSearchOn;
  const circle=document.getElementById("search-all-toggle");

// Birthday dates (MM.DD) and milestone title patterns
const BDAY_DATES=new Set(["02.10","03.12","05.24","06.19","07.15","09.12","11.01"]);
const MILESTONE_RE=/100일|1000일|100회|200회|300회|회 특집/;
// gviz CSV는 "11.10" → "11.1" (trailing zero 제거)로 내보냄
// 일(day)이 1자리면 오른쪽에 0 붙여서 복원: "11.1" → "11.10"
function normD(d){
  if(!d) return d;
  const p=d.split(".");
  if(p.length!==2) return d;
  const mo=p[0].padStart(2,"0");
  const day=p[1].length===1 ? p[1]+"0" : p[1].padStart(2,"0");
  return mo+"."+day;
}
function isSpecialBday(d,t){
  return BDAY_DATES.has(normD(d))||(t&&t.includes("생일"));
}
function isSpecialMilestone(d,t){return !isSpecialBday(d,t)&&MILESTONE_RE.test(t);}
function matchSpecial(d,t){
  if(curSpecial==="all")return true;
  if(curSpecial==="bday")return isSpecialBday(d,t);
  if(curSpecial==="milestone")return isSpecialMilestone(d,t);
  return true;
}

function toNum(y, d){ // d = "MM.DD"
  const [mm,dd]=d.split(".").map(Number);
  return y*10000+mm*100+dd;
}

function matchEra(y, d){
  if(curEraSet.size===0)return true;
  const n=toNum(y,d);
  return [...curEraSet].some(eraName=>{
    const era=ERAS[eraName];
    if(!era)return false;
    return n>=era.from&&n<=era.to;
  });
}
function matchComeback(y, d, t){
  if(!curComeback) return true;
  if(COMEBACK_DATES.has(toNum(y,d))) return true;
  if(t && t.includes("컴백 라이브")) return true;
  return false;
}

/* 라쓰고쇼츠 데이터 fetch + 캐러셀 렌더 (어드민 응답: {ok, shorts:[{url, shorts_type, thumbnail_url}]}) */
async function loadLassgoShorts(sid){
  const sb=document.getElementById("m-shorts-bar");
  const tr=document.getElementById("m-shorts-track");
  const cnt=document.getElementById("m-shorts-count");
  const lb=document.getElementById("m-shorts-loadbar");
  const lbInner=lb?lb.querySelector("span"):null;
  if(!sb||!tr) return;
  sb.style.display="none"; tr.innerHTML=""; if(cnt) cnt.textContent="";
  // 로딩바 초기화
  if(lb && lbInner){
    lb.classList.remove("done");
    lb.style.display="block";
    lbInner.style.width="0%";
    requestAnimationFrame(()=>{ lbInner.style.width="40%"; });
  }
  if(!sid){ if(lb) lb.style.display="none"; return; }
  const item = (typeof P !== "undefined" ? P : []).find(p => p.sid === sid);
  let uuid = "";
  if(window._sidToUuidMap && window._sidToUuidMap[sid]) uuid = window._sidToUuidMap[sid];
  else if(item && item.uuid) uuid = item.uuid;
  else uuid = sid;
  try{
    if(lbInner) lbInner.style.width="70%";
    const res = await fetch(WORKER_URL+"?action=getLassgoShorts&session_id="+encodeURIComponent(uuid)+"&_t="+Date.now());
    if(!res.ok){ if(lb) lb.style.display="none"; return; }
    const data = await res.json();
    if(!data || !data.ok){ if(lb) lb.style.display="none"; return; }
    const rows = data.shorts || data.rows || data.results || data.items || [];
    if(!Array.isArray(rows) || !rows.length){ if(lb) lb.style.display="none"; return; }
    if(lbInner) lbInner.style.width="100%";
    // preview 먼저, clip 나중
    const sorted = rows.slice().sort((a,b)=>{
      const orderOf = x => (x.shorts_type==="preview"?0:1);
      return orderOf(a)-orderOf(b);
    });
    const html = sorted.map(r=>{
      const url = r.url || (Array.isArray(r.urls) ? r.urls[0] : "");
      if(!url) return "";
      const safeUrl = escH(url);
      // 플랫폼 매트릭스 (URL → 칩/아이콘/비율)
      let plat;
      if(/youtube\.com|youtu\.be/i.test(url))         plat = { chip:"St", icon:"▶", square:false, isYT:true };
      else if(/instagram\.com|instagr\.am/i.test(url)) plat = { chip:"IG", icon:"↗", square:false };
      else if(/tiktok\.com/i.test(url))                plat = { chip:"TT", icon:"↗", square:false };
      else if(/weverse\.io|weverse\.com/i.test(url))   plat = { chip:"W",  icon:"↗", square:true  };
      else if(/x\.com|twitter\.com/i.test(url))        plat = { chip:"𝕏", icon:"↗", square:true  };
      else                                              plat = { chip:'<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;display:inline-block;"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>', icon:"↗", square:true  };
      // 박스 클래스
      const thumbClass = plat.square ? "m-shorts-thumb sq" : "m-shorts-thumb";
      // 썸네일 URL
      const vid = plat.isYT ? extractYTVideoId(url) : "";
      const thumbUrl = r.thumbnail_url || (vid ? `https://i.ytimg.com/vi/${vid}/hqdefault.jpg` : "");
      const thumbImg = thumbUrl ? `<img src="${escH(thumbUrl)}" alt="" loading="lazy" onerror="this.style.display='none'">` : "";
      // placeholder (썸네일 없을 때): 칩 텍스트와 동일하게
      const phMark = !thumbUrl ? `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Jost',sans-serif;font-size:11px;font-weight:800;color:rgba(255,255,255,.6);">${plat.chip}</div>` : "";
      return `<a class="m-shorts-item" href="${safeUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
        <div class="${thumbClass}">${thumbImg}${phMark}<div class="m-shorts-play">${plat.icon}</div><div class="m-shorts-chip">${plat.chip}</div></div>
      </a>`;
    }).filter(Boolean).join("");
    if(!html){ if(lb) lb.style.display="none"; return; }
    tr.innerHTML = html;
    if(cnt) cnt.textContent = sorted.length;
    sb.style.display = "flex";
    // 로딩바 fade out
    if(lb){
      lb.classList.add("done");
      setTimeout(()=>{ lb.style.display="none"; },650);
    }
  }catch(e){ if(lb) lb.style.display="none"; }
}

/* 유튜브 URL에서 video ID 추출 — youtube.com/youtu.be/shorts/live/embed 모두 지원 */
function extractYTVideoId(url){
  if(!url || typeof url !== "string") return "";
  try{
    const u = new URL(url);
    const host = u.hostname.replace(/^www\./,"");
    if(host==="youtu.be") return u.pathname.slice(1).split("/")[0]||"";
    if(host.endsWith("youtube.com")||host==="youtube.com"){
      const seg = u.pathname.split("/").filter(Boolean);
      if(seg[0]==="shorts"||seg[0]==="live"||seg[0]==="embed") return seg[1]||"";
      return u.searchParams.get("v")||"";
    }
    return "";
  }catch(e){
    // URL 파싱 실패 → 정규식 폴백 (11자 video ID)
    const m = url.match(/(?:youtu\.be\/|[?&]v=|\/shorts\/|\/live\/|\/embed\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : "";
  }
}

/* YouTube builder */

// Accepts: "023456" → 02:34:56, "2345" → 00:23:45, "45" → 00:00:45
// Also accepts "1:23:45", "23:45"
function parseTime(s){
  s=s.trim();
  if(!s)return null;
  // colon format
  if(s.includes(":")){
    const p=s.split(":").map(Number);
    if(p.some(isNaN))return null;
    if(p.length===3)return p[0]*3600+p[1]*60+p[2];
    if(p.length===2)return p[0]*60+p[1];
    return null;
  }
  // digit-only: pad to multiple of 2 from left
  const digits=s.replace(/\D/g,"");
  if(!digits)return null;
  const padded=digits.padStart(6,"0");
  const h=parseInt(padded.slice(0,2),10);
  const m2=parseInt(padded.slice(2,4),10);
  const sec=parseInt(padded.slice(4,6),10);
  if(m2>59||sec>59)return null;
  return h*3600+m2*60+sec;
}

function formatTimeDisplay(s){
  const sec=parseTime(s);
  if(sec===null)return s;
  const h=Math.floor(sec/3600),m2=Math.floor((sec%3600)/60),s2=sec%60;
  return h>0?`${String(h).padStart(2,"0")}:${String(m2).padStart(2,"0")}:${String(s2).padStart(2,"0")}`
           :`${String(m2).padStart(2,"0")}:${String(s2).padStart(2,"0")}`;
}


function buildYT(){
  // Use the main video URL of the current card instead of a separate URL field
  const baseUrl=getVideoUrl(mId);
  if(!baseUrl||!baseUrl.trim())return null;
  const rawTime=document.getElementById("tc-yt-time").value.trim();
  const sec=parseTime(rawTime);
  if(sec===null)return null;
  // append &t=Ns (or ?t=Ns if no query string yet)
  const sep=baseUrl.includes("?")?"&":"?";
  return baseUrl+sep+"t="+sec+"s";
}
function previewYT(){
  const rawTime=document.getElementById("tc-yt-time").value.trim();
  const url=buildYT();
  const el=document.getElementById("tc-yt-preview");
  if(url){
    const disp=formatTimeDisplay(rawTime);
    const lbl=document.getElementById("tc-yt-label").value.trim();
    el.innerHTML=`<span style="color:var(--muted)">${lbl||disp} →</span> ${escH(url)}`;
    el.style.display="";
  } else {
    el.style.display="none";
  }
}

function thumbErr(imgEl){
  const cur=imgEl.src||"";
  const vid=cur.match(/\/vi\/([^/]+)\//);
  if(vid&&!imgEl.dataset.tried){
    imgEl.dataset.tried="1";
    imgEl.src="https://i.ytimg.com/vi/"+vid[1]+"/hqdefault.jpg";
  } else {
    // 카드 썸네일 숨기기
    const wrap=imgEl.closest?imgEl.closest(".card-thumb-link"):null;
    if(wrap) wrap.style.display="none";
    // 모달 썸네일 숨기기
    if(imgEl.id==="m-thumb-img"){
      const mWrap=document.getElementById("m-thumb-wrap");
      if(mWrap) mWrap.style.display="none";
    }
  }
}

const NEW_YEAR_SEASONS = ["22새해","23연생뱅","24새해","25새해","26새해"];

/* ── 시즌 자동 추출 (SONGS의 타이틀곡 + 새해) ──
   어드민에 새 앨범 등록 + 타이틀곡 표시 → 자동 반영
   - song_type === "타이틀" 곡만 추출
   - album_type === "OST"는 제외
   - album_nickname 있으면 그걸 라벨로, 없으면 album명 그대로 */
function buildSeasons(){
  const seasons = [];
  const seen = new Set();
  // 1. 타이틀곡 발매일 시즌 (SONGS에서 자동)
  const titleSongs = SONGS.filter(s => 
    s.type === "타이틀" && 
    s.albumType !== "OST" && 
    s.album
  );
  // 최신 발매순 정렬
  titleSongs.sort((a,b) => (b.date||"").localeCompare(a.date||""));
  titleSongs.forEach(s => {
    const label = s.nickname || s.album;
    if(seen.has(label)) return;
    seen.add(label);
    seasons.push({
      label: label,
      keyword: s.album,  // SONGS 매칭용 키워드 (album 이름)
      nickname: s.nickname,
      hasAlbum: true,
      date: s.date
    });
  });
  // 2. 새해 시즌 (라이브에만 있음)
  NEW_YEAR_SEASONS.forEach(ny => {
    if(seen.has(ny)) return;
    seen.add(ny);
    seasons.push({
      label: ny,
      keyword: ny,
      hasAlbum: false
    });
  });
  return seasons;
}

/* ── SID 생성 (날짜 기반, 같은 날 N번째) ── */
function makeSid(type, y, d, t){
  const nd=normD(d||"");
  const dateKey=`${y}${nd.replace(".","")}`; // YYYYMMDD
  if(type==="live"){
    // 같은 날 방송이 여러 개면 L[]에서 몇 번째인지 계산
    const sameDay=L.filter(b=>b.y===y&&b.d===d);
    const entry=L.find(b=>b.y===y&&b.d===d&&b.t===t);
    const n=sameDay.indexOf(entry);
    return`live_${dateKey}_${n<0?0:n}`;
  }
  if(type==="radio"){
    const sameDay=R.filter(r=>r.y===y&&r.d===d);
    const n=sameDay.findIndex(r=>r.dj.join("")===t);
    return`radio_${dateKey}_${n<0?0:n}`;
  }
  if(type==="lassgo"){
    const sameDay=P.filter(p=>p.y===y&&p.d===d);
    const entry=P.find(p=>p.y===y&&p.d===d&&p.t===t);
    const n=sameDay.indexOf(entry);
    return`lassgo_${dateKey}_${n<0?0:n}`;
  }
  return`${type}_${dateKey}_0`;
}

function getLiveIdx(sid){
  // 신규 형식: live_YYYYMMDD_N
  const m2=sid.match(/^live_(\d{4})(\d{2})(\d{2})_(\d+)$/);
  if(m2){
    const [,y,mo,dd,n]=[...m2];
    const dPad=`${mo}.${dd}`;           // "03.26"
    const dNoPad=`${+mo}.${+dd}`;       // "3.26"
    const sameDay=L.filter(b=>b.y===+y&&(b.d===dPad||b.d===dNoPad));
    const entry=sameDay[+n];
    return entry?L.indexOf(entry):-1;
  }
  // 구형 형식: live_숫자 (하위호환)
  const m=sid.match(/^live_(\d+)$/);return m?+m[1]:-1;
}
function getDefaultUrl(sid){
  const i=getLiveIdx(sid);
  return(i>=0&&i<L.length)?L[i].url||"":" ";
}
function getThumbUrl(sid){
  const i=getLiveIdx(sid);
  if(i<0||i>=L.length)return"";
  if(L[i].thumb)return L[i].thumb;
  const url=L[i].url||"";
  const vid=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|live\/|embed\/))([a-zA-Z0-9_-]{11})/);
  if(vid){const t=`https://i.ytimg.com/vi/${vid[1]}/mqdefault.jpg`;L[i].thumb=t;return t;}
  return"";
}
function getVideoUrl(sid){const d=getData(sid);return d.videoUrl||getDefaultUrl(sid);}

function updateStickyOffsets(){
  const header=document.querySelector("header");
  const tabBar=document.querySelector(".tab-bar");
  const ctrl=document.querySelector(".controls");
  if(header){header.style.top="0";}
  const headerH=header?header.getBoundingClientRect().height:0;
  if(tabBar){tabBar.style.top=headerH+"px";}
  const tabH=tabBar?tabBar.getBoundingClientRect().height:0;
  if(ctrl){ctrl.style.top=(headerH+tabH)+"px";}
  const sf=document.getElementById("songs-filter");
  if(sf&&sf.style.position==="sticky"){sf.style.top=(headerH+tabH)+"px";}
  const lf=document.getElementById("lassgo-filter");
  if(lf&&lf.style.position==="sticky"){lf.style.top=(headerH+tabH)+"px";}
  // 액션바 sticky top
  const ab=document.getElementById("playlist-actionbar");
  if(ab){
    const ctrlVisible = ctrl && getComputedStyle(ctrl).display !== "none";
    const ctrlH = ctrlVisible ? ctrl.getBoundingClientRect().height : 0;
    const sfVisible = sf && getComputedStyle(sf).display !== "none";
    const sfH = sfVisible ? sf.getBoundingClientRect().height : 0;
    const lfVisible = lf && getComputedStyle(lf).display !== "none";
    const lfH = lfVisible ? lf.getBoundingClientRect().height : 0;
    ab.style.top = (headerH + tabH + ctrlH + sfH + lfH) + "px";
  }
}

function setMember(btn){
  const m=btn.dataset.member;
  const allBtn=document.querySelector("#member-filters .btn[data-member='all']");
  const memberBtns=[...document.querySelectorAll("#member-filters .btn:not([data-member='all'])")];

  if(m==="all"){
    if(curMemSet.has("all")){
      // 전원 활성 → 전부 미선택
      curMemSet=new Set();
      allBtn.classList.remove("active");
      memberBtns.forEach(b=>b.classList.remove("active"));
    } else {
      // 전원 미선택 → 전부 활성
      curMemSet=new Set(["all"]);
      allBtn.classList.add("active");
      memberBtns.forEach(b=>b.classList.add("active"));
    }
  } else {
    // 개별 멤버 클릭
    const wasAll=curMemSet.has("all");
    if(wasAll){
      // 전원 상태에서 하나 해제 → 전원 미선택 + 해당 멤버 미선택 (4명 active)
      curMemSet=new Set(["예준","노아","밤비","은호","하민"]);
      curMemSet.delete(m);
      allBtn.classList.remove("active");
      memberBtns.forEach(b=>{
        if(b.dataset.member===m) b.classList.remove("active");
        else b.classList.add("active");
      });
    } else {
      // 일반 토글
      allBtn.classList.remove("active");
      if(curMemSet.has(m)){
        curMemSet.delete(m);
        btn.classList.remove("active");
      } else {
        curMemSet.add(m);
        btn.classList.add("active");
      }
      if(curMemSet.size===0){
        allBtn.classList.remove("active");
        memberBtns.forEach(b=>b.classList.remove("active"));
      }
      if(["예준","노아","밤비","은호","하민"].every(x=>curMemSet.has(x))){
        curMemSet=new Set(["all"]);
        allBtn.classList.add("active");
        memberBtns.forEach(b=>b.classList.add("active"));
      }
    }
  }
  render();
}

function matchTitleOrTags(t, sid){
  if(!curQ)return true;
  const q2=curQ.toLowerCase();
  const d=getData(sid);
  const allTags=[...d.tagsA,...d.tagsB,...d.tagsC];
  // If T or ★ is ON, also check if this sid has script/hl results
  if(curScriptSearchOn && scriptSearchResults[sid]) return true;
  if(curHlSearchOn && hlSearchResults[sid]) return true;
  if(curBcastTagSearchMode){
    if(curTagMode==="exact") return allTags.some(tag=>tag.toLowerCase()===q2);
    return allTags.some(tag=>tag.toLowerCase().includes(q2));
  }
  const tl=t.toLowerCase();
  if(curTagMode==="exact"){
    if(tl===q2)return true;
  } else {
    if(tl.includes(q2))return true;
  }
  return allTags.some(tag=>tag.toLowerCase().includes(q2));
}
function matchYear(y){
  if(curEraSet.size>0) return true; // 시즌 선택 시 연도 필터 무시
  if(curYearSet.size===0) return true;
  return curYearSet.has(String(y));
}

function ytId(url){
  if(!url) return "";
  const m = String(url).match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|embed\/))([A-Za-z0-9_-]{11})/);
  return m ? m[1] : "";
}

function moveActionbarToTab(t){
  const ab = document.getElementById("playlist-actionbar");
  if(!ab) return;
  let toggleRow = null;

    // 발매곡 탭의 필터 토글 줄
    const btn = document.querySelector('button[onclick="toggleSongFilters()"]');

function plToast(msg){
  const old = document.querySelector(".pl-toast");
  if(old) old.remove();
  const t = document.createElement("div");

}

function addAllFiltered(){
  // 현재 활성 view 안의 카드만 가져오기
  const activeView = document.querySelector(".section-view.active");
  if(!activeView){ plToast("활성 탭 없음"); return; }
  const cards = Array.from(activeView.querySelectorAll(".card, .song-card"))
    .filter(c => c.dataset.yt && c.dataset.noyt !== "1");
  if(cards.length === 0){ plToast("담을 영상이 없어요"); return; }
  // 이미 담긴 거 제외
  const existing = new Set(plList.map(x=>x.id));
  const newCards = cards.filter(c => !existing.has(c.dataset.yt));
  if(newCards.length === 0){ plToast("이미 모두 담겼어요"); return; }
  const remaining = 50 - plList.length;
  if(remaining <= 0){ plToast("이미 50개 가득"); return; }
  let toAdd = newCards;
  if(newCards.length > remaining){
    const ok = confirm(`필터 결과 ${newCards.length}개 (이미 담긴 거 제외). 잔여 ${remaining}개까지만 담을 수 있어요. 첫 ${remaining}개 담을까요?`);
    if(!ok) return;
    toAdd = newCards.slice(0, remaining);
  }
  toAdd.forEach(c=>{
    plList.push({
      id: c.dataset.yt,
      title: c.dataset.plTitle || "",
      date: c.dataset.plDate || "",
      thumb: c.dataset.plThumb || `https://i.ytimg.com/vi/${c.dataset.yt}/mqdefault.jpg`
    });
    plManualOrder.push(c.dataset.yt);
  });
  updatePlUI();
  plToast(`${toAdd.length}개 담겼어요`);
}

function setSortMode(mode){
  // 핸들 모드면 끄기
  if(plHandleMode){
    plHandleMode = false;
  }
  if(mode === "date"){
    // 날짜순 토글
    if(plSort === "date_asc") plSort = "date_desc";
    else plSort = "date_asc";
  } else {
    plSort = mode;
  }
  updateSortButtons();
  updatePlUI();
}

function toggleHandleMode(){
  plHandleMode = !plHandleMode;
  if(plHandleMode){
    // 현재 표시 순서를 수동 순서로 초기화
    plManualOrder = getSortedList(true).map(x=>x.id);
  }
  updateSortButtons();
  updatePlUI();
}

function updateSortButtons(){
  // 액션바 + 패널의 정렬 버튼 활성 표시
  const setActive = (btnId, active) => {
    const b = document.getElementById(btnId);
    if(b) b.classList.toggle("sort-active", active);
  };
  ["ab-sort-added","pp-sort-added"].forEach(id=>setActive(id, plSort==="added" && !plHandleMode));
  ["ab-sort-date","pp-sort-date"].forEach(id=>setActive(id, (plSort==="date_asc"||plSort==="date_desc") && !plHandleMode));
  ["ab-sort-handle","pp-sort-handle"].forEach(id=>setActive(id, plHandleMode));
  // 날짜순 버튼 라벨
  const dateLbl = (plSort==="date_asc") ? "↑ 날짜" : (plSort==="date_desc"?"↓ 날짜":"↕ 날짜");
  const b1 = document.getElementById("ab-sort-date"); if(b1) b1.textContent = dateLbl;
  const b2 = document.getElementById("pp-sort-date"); if(b2) b2.textContent = dateLbl;
}

function getSortedList(ignoreHandle){
  if(plHandleMode && !ignoreHandle){
    // 수동 순서대로
    return plManualOrder.map(id => plList.find(x=>x.id===id)).filter(Boolean);
  }
  if(plSort === "added") return plList.slice();
  if(plSort === "date_asc") return plList.slice().sort((a,b)=>String(a.date||"").localeCompare(String(b.date||"")));
  if(plSort === "date_desc") return plList.slice().sort((a,b)=>String(b.date||"").localeCompare(String(a.date||"")));
  return plList.slice();
}

let plDragState = null;
function startPlDrag(e){
  e.preventDefault();
  const item = e.target.closest(".pp-item");
  if(!item) return;
  plDragState = {
    id: item.dataset.id,
    startY: e.clientY,
    item: item
  };
  item.classList.add("dragging");
  document.addEventListener("pointermove", onPlDragMove);
  document.addEventListener("pointerup", endPlDrag, { once: true });
  document.addEventListener("pointercancel", endPlDrag, { once: true });
}
function onPlDragMove(e){
  if(!plDragState) return;
  e.preventDefault();
  const body = document.getElementById("pp-body");
  if(!body) return;
  // 현재 포인터 위치의 아이템 찾기
  const overEl = document.elementFromPoint(e.clientX, e.clientY);
  const overItem = overEl?.closest(".pp-item");
  if(!overItem || overItem === plDragState.item) return;
  if(overItem.dataset.id === plDragState.id) return;
  // 위치 교환
  const fromIdx = plManualOrder.indexOf(plDragState.id);
  const toIdx = plManualOrder.indexOf(overItem.dataset.id);
  if(fromIdx < 0 || toIdx < 0) return;
  plManualOrder.splice(fromIdx, 1);
  plManualOrder.splice(toIdx, 0, plDragState.id);
  renderPlaylistPanel();
  // 새로 그린 후 다시 dragging 표시
  const newItem = document.querySelector(`.pp-item[data-id="${plDragState.id}"]`);
  if(newItem){
    newItem.classList.add("dragging");
    plDragState.item = newItem;
  }
}
function endPlDrag(){
  if(plDragState && plDragState.item){
    plDragState.item.classList.remove("dragging");
  }
  document.querySelectorAll(".pp-item.dragging").forEach(x=>x.classList.remove("dragging"));
  plDragState = null;
  document.removeEventListener("pointermove", onPlDragMove);
  refreshPlMarkers();
}

function refreshPlMarkers(){
  document.querySelectorAll(".pl-card-num").forEach(el=>el.remove());
  document.querySelectorAll(".card.picked, .song-card.picked").forEach(c=>c.classList.remove("picked"));
  if(!plMode) return;

  sorted.forEach((it,idx)=>{
    document.querySelectorAll(`.card[data-yt="${it.id}"], .song-card[data-yt="${it.id}"]`).forEach(card=>{
      card.classList.add("picked");
      const num = document.createElement("div");
      num.className = "pl-card-num";
      num.textContent = idx+1;
      card.appendChild(num);
    });
  });
}

function setupPlData(){
  document.querySelectorAll(".card, .song-card").forEach(card=>{
    delete card.dataset.noyt;
    let urlStr = "";
    const a = card.querySelector("a.card-thumb-link");
    if(a){
      urlStr = a.href;
    } else if(card.classList.contains("song-card")){
      // song-card: onclick의 JSON에서 url 추출
      const onclick = card.getAttribute("onclick") || "";
      const m = onclick.match(/&quot;url&quot;:&quot;([^&]+)&quot;/) || onclick.match(/"url":"([^"]+)"/);
      if(m) urlStr = m[1];
    }
    if(!urlStr){ card.dataset.noyt = "1"; return; }
    const id = ytId(urlStr);
    if(!id){ card.dataset.noyt = "1"; return; }
    card.dataset.yt = id;
    const titleEl = card.querySelector(".live-title, .lassgo-title, .yt-title, .stage-title, .ext-title, .shorts-title, .event-title, .song-title-text, h3, h4");
    const dateEl = card.querySelector(".live-date, .lassgo-date, .card-date, .ext-date, .stage-date, .song-meta-mini");
    const img = card.querySelector("img");
    card.dataset.plTitle = (titleEl?.textContent || "").trim();
    card.dataset.plDate = (dateEl?.textContent || "").trim();
    card.dataset.plThumb = img?.src || "";
  });
  refreshPlMarkers();
}

document.addEventListener("click", (e)=>{
  if(!plMode) return;
  const card = e.target.closest(".card, .song-card");
  if(!card) return;
  const noyt = card.dataset.noyt === "1";
  if(noyt){
    plToast("이 카드는 영상이 없어요");
    e.preventDefault();
    e.stopPropagation();
    return;
  }
  // 더블클릭 처리: 250ms 내 두 번째 클릭이면 모달
  e.preventDefault();
  e.stopPropagation();
  if(plClickTimer){
    clearTimeout(plClickTimer);
    plClickTimer = null;
    // 모달 열기 (원래 onclick 실행)
    if(card.onclick) card.onclick.call(card, e);
    return;
  }
  plClickTimer = setTimeout(()=>{
    plClickTimer = null;
    // 담기 토글
    const ytid = card.dataset.yt;
    if(!ytid) return;
    if(plList.find(x=>x.id===ytid)){
      removeFromPlaylist(ytid);
    } else {
      addToPlaylist({
        id: ytid,
        title: card.dataset.plTitle || "",
        date: card.dataset.plDate || "",
        thumb: card.dataset.plThumb || `https://i.ytimg.com/vi/${ytid}/mqdefault.jpg`
      });
    }
  }, 250);
}, true);

function pageLoadStart(){
  const lb=document.getElementById("page-loadbar");
  if(!lb) return;
  const fill=lb.querySelector(".page-loadbar-fill");
  lb.classList.remove("done");
  lb.classList.add("show");
  if(fill){
    fill.style.width="0%";
    requestAnimationFrame(()=>{ fill.style.width="30%"; });
  }
}
function pageLoadProgress(pct){
  const lb=document.getElementById("page-loadbar");
  if(!lb) return;
  const fill=lb.querySelector(".page-loadbar-fill");
  if(fill) fill.style.width=Math.min(100,Math.max(0,pct))+"%";
}
function pageLoadEnd(){
  const lb=document.getElementById("page-loadbar");
  if(!lb) return;
  const fill=lb.querySelector(".page-loadbar-fill");
  if(fill) fill.style.width="100%";
  lb.classList.add("done");
  setTimeout(()=>{ lb.classList.remove("show","done"); if(fill) fill.style.width="0%"; },650);
}

async function doAsyncSearchThenRender(q){
  searchLoadStart();
  const promises=[];
  let scrCount=0, hlCount=0;
  if(curScriptSearchOn){
    searchLoadProgress(15,"스크립트 검색 중...","rgba(250,204,21,.5)");
    promises.push(
      fetch(WORKER_URL+"?action=searchScripts&q="+encodeURIComponent(q)+"&_t="+Date.now())
        .then(r=>r.json()).then(d=>{
          searchLoadProgress(50,"스크립트 결과 수신...","rgba(45,212,191,.5)");
          if(d.ok){
            scriptSearchResults={};
            const res=d.results;
            if(Array.isArray(res)){
              res.forEach(r=>{
                const tn=r.tab_name;
                if(tn){
                  if(!scriptSearchResults[tn]) scriptSearchResults[tn]=[];
                  if(scriptSearchResults[tn].length<5) scriptSearchResults[tn].push(r);
                }
              });
              scrCount=res.length;
            } else {
              Object.values(res).forEach(rows=>{
                const tn=rows[0]?.tab_name;
                if(tn) scriptSearchResults[tn]=rows.slice(0,5);
                scrCount+=rows.length;
              });
            }
          }
        }).catch(()=>{})
    );
  } else { scriptSearchResults={}; }
  if(curHlSearchOn){
    searchLoadProgress(20,"하이라이트 검색 중...","rgba(255,183,77,.5)");
    promises.push(
      fetch(WORKER_URL+"?action=searchHighlights&q="+encodeURIComponent(q)+"&_t="+Date.now())
        .then(r=>r.json()).then(d=>{
          searchLoadProgress(65,"하이라이트 결과 수신...","rgba(255,183,77,.5)");
          if(d.ok){
            hlSearchResults={};
            const res=d.results;
            if(Array.isArray(res)){
              res.forEach(r=>{
                const tn=r.tab_name;
                if(tn){
                  if(!hlSearchResults[tn]) hlSearchResults[tn]=[];
                  if(hlSearchResults[tn].length<5) hlSearchResults[tn].push(r);
                }
              });
              hlCount=res.length;
            } else {
              Object.values(res).forEach(rows=>{
                const tn=rows[0]?.tab_name;
                if(tn) hlSearchResults[tn]=rows.slice(0,5);
                hlCount+=rows.length;
              });
            }
          }
        }).catch(()=>{})
    );

  await Promise.all(promises);

  renderUnified();

function highlightKw(text,q){
  const safe=escH(text);
  if(!q) return safe;
  const esc=escH(q).replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  return safe.replace(new RegExp(`(${esc})`,"gi"),`<span class="m-hl">$1</span>`);
}
function highlightKwY(text,q){
  const safe=escH(text);
  if(!q) return safe;
  const esc=escH(q).replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  return safe.replace(new RegExp(`(${esc})`,"gi"),`<span class="m-hl-y">$1</span>`);
}

function tcToYtLink(vurl,tc){
  if(!vurl||!tc) return "#";
  const parts=tc.split(":").map(Number);
  const sec=parts.length===3?parts[0]*3600+parts[1]*60+parts[2]:parts[0]*60+parts[1];
  try{
    const u=new URL(vurl);
    // youtube.com/watch?v=XXX → v는 보존하고 t만 갱신
    if(/(?:^|\.)youtube\.com$/.test(u.hostname) && u.pathname==="/watch"){
      const v=u.searchParams.get("v");
      if(v) return `https://www.youtube.com/watch?v=${v}&t=${sec}`;
    }
    // youtu.be/XXX, /live/XXX, /embed/XXX, /shorts/XXX → 경로에 ID 있음, 쿼리만 교체
    return `${u.origin}${u.pathname}?t=${sec}`;
  }catch(e){
    // URL 파싱 실패 시 폴백
    const base=vurl.split("?")[0];
    return base+"?t="+sec;
  }
}

    if(!matchM(members))return;
    // 검색 매칭 — 카드에 실제 표시되는 텍스트와 동일하게
    const djStr = (r.dj||[]).join(" ");
    const gStr  = (r.g||[]).join(" ");
    const radioTitle = [
      djStr ? `DJ ${djStr}` : "",
      gStr  ? `게스트 ${gStr}` : ""
    ].filter(Boolean).join(" · ");
    if(!matchTitleOrTags(radioTitle, sid))return;
    items.push({...r,_type:"radio",sid});
  });

  items.sort((a,b)=>{
    const da=`${a.y}${(a.d||"").replace(".","").padStart(4,"0")}`;
    const db=`${b.y}${(b.d||"").replace(".","").padStart(4,"0")}`;
    if(da!==db) return curSort==="desc"?(db>da?1:-1):(da>db?1:-1);
    return typeOrder[a._type]-typeOrder[b._type];
  });

  const total=L.length+R.length;

  const scrOn=curScriptSearchOn&&Object.keys(scriptSearchResults).length>0;

    if(hlOn) txt+=` · <i class="pxi"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 4 14.47 9.01 20 9.82 16 13.71 16.94 19.22 12 16.62 7.06 19.22 8 13.71 4 9.82 9.53 9.01 12 4"/></svg></i> 하이라이트 ${Object.keys(hlSearchResults).length}개 세션`;
    rcEl.innerHTML=`<span style="color:#ffffff;">${txt}</span>`;
  } else {
    rcEl.textContent=`${items.length}개 결과`;
  }
  if(!items.length){el.innerHTML='<div class="empty">검색 결과가 없어요</div>';return;}

  const MON=["","1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const byY={};
  items.forEach(item=>{
    if(!byY[item.y]) byY[item.y]={};
    const mo=+item.d.split(".")[0];
    if(!byY[item.y][mo]) byY[item.y][mo]=[];
    byY[item.y][mo].push(item);
  });
  const sortedYears=Object.keys(byY).map(Number).sort((a,b)=>curSort==="desc"?b-a:a-b);
  el.innerHTML=sortedYears.map(yy=>{
    const months=Object.keys(byY[yy]).map(Number).sort((a,b)=>curSort==="desc"?b-a:a-b);
    return`<div class="year-group">
      <div class="year-header"><span class="year-label">${yy}</span></div>
      ${months.map(mo=>`<div class="month-group">
        <div class="month-header"><span class="month-label">${MON[mo]}</span></div>
        <div class="grid">${byY[yy][mo].map(item=>renderUnifiedCard(item,yy)).join("")}</div>
      </div>`).join("")}
    </div>`;
  }).join("");
}

async function runLassgoExtSearch(){
  const q=(curLassgoQ||"").trim();
  // T꺼짐+★꺼짐 → 결과 비우고 끝
  if(!curLassgoScriptSearchOn&&!curLassgoHlSearchOn){
    lassgoScriptSearchResults={}; lassgoHlSearchResults={};
    renderLassgoTab();
    return;
  }
  if(!q){renderLassgoTab();return;}
  try{
    const tasks=[];
    if(curLassgoScriptSearchOn){
      tasks.push(fetch(WORKER_URL+"?action=searchScripts&q="+encodeURIComponent(q)+"&_t="+Date.now()).then(r=>r.json()).then(d=>{
        lassgoScriptSearchResults={};
        if(d.ok){
          const res=d.results;
          if(Array.isArray(res)){
            res.forEach(r=>{
              const tn=r.tab_name;
              if(tn){
                if(!lassgoScriptSearchResults[tn]) lassgoScriptSearchResults[tn]=[];
                if(lassgoScriptSearchResults[tn].length<5) lassgoScriptSearchResults[tn].push(r);
              }
            });
          } else if(res){
            Object.values(res).forEach(rows=>{
              const tn=rows[0]?.tab_name;
              if(tn) lassgoScriptSearchResults[tn]=rows.slice(0,5);
            });
          }
        }
      }).catch(()=>{}));
    } else { lassgoScriptSearchResults={}; }
    if(curLassgoHlSearchOn){
      tasks.push(fetch(WORKER_URL+"?action=searchHighlights&q="+encodeURIComponent(q)+"&_t="+Date.now()).then(r=>r.json()).then(d=>{
        lassgoHlSearchResults={};
        if(d.ok){
          const res=d.results;
          if(Array.isArray(res)){
            res.forEach(r=>{
              const tn=r.tab_name;
              if(tn){
                if(!lassgoHlSearchResults[tn]) lassgoHlSearchResults[tn]=[];
                if(lassgoHlSearchResults[tn].length<5) lassgoHlSearchResults[tn].push(r);
              }
            });
          } else if(res){
            Object.values(res).forEach(rows=>{
              const tn=rows[0]?.tab_name;
              if(tn) lassgoHlSearchResults[tn]=rows.slice(0,5);
            });
          }
        }
      }).catch(()=>{}));
    } else { lassgoHlSearchResults={}; }
    await Promise.all(tasks);
  }catch(e){}
  renderLassgoTab();
}

function matchLassgoYear(y){
  if(curLassgoEraSet.size>0) return true;
  if(curLassgoYearSet.size===0) return true;
  return curLassgoYearSet.has(String(y));
}
function matchLassgoEra(y,d){
  if(curLassgoEraSet.size===0) return true;
  const n=toNum(y,d);
  return [...curLassgoEraSet].some(name=>{const e=LASSGO_ERAS[name];return e&&n>=e.from&&n<=e.to;});
}
function matchLassgoSearch(t,sid){
  const q=curLassgoQ;
  // T/★ 토글 ON일 때, 워커 결과에 매칭된 sid는 우선 통과
  if(curLassgoScriptSearchOn && lassgoScriptSearchResults[sid]) return true;
  if(curLassgoHlSearchOn && lassgoHlSearchResults[sid]) return true;
  if(!q) return true;
  if(curLassgoTagSearch){
    const d=getData(sid);
    const tags=[...d.tagsA,...d.tagsB,...d.tagsC];
    return tags.some(tag=>tag.toLowerCase().includes(q.toLowerCase()));
  }
  if(curLassgoTitleOnly) return t.toLowerCase().includes(q.toLowerCase());
  return t.toLowerCase().includes(q.toLowerCase());
}

let curCoverMemMode = "include"; // 매칭 모드: include / exact

function parseCoverMembers(cb){
  if(!cb) return [];
  if(Array.isArray(cb)) return cb.map(x=>String(x).trim()).filter(Boolean);
  return String(cb).split(/[,，·\s\/&|+]+/).map(x=>x.trim()).filter(Boolean);
}

function matchCoverMember(s){
  if(curCoverMemSet.size===0) return true;
  if(curCoverMemSet.has("all")) return true;
  const raw = parseCoverMembers(s.cover_by);
  // 풀네임 → 줄임이름 매핑
  const FULL_TO_SHORT = {"남예준":"예준","한노아":"노아","채밤비":"밤비","도은호":"은호","유하민":"하민"};
  const arr = raw.map(m => FULL_TO_SHORT[m] || m);
  // "전원" 또는 5인 모두 포함이면 전체로 간주
  const expanded = (arr.includes("전원")||arr.length>=5) ? ["예준","노아","밤비","은호","하민"] : arr;
  if(curCoverMemMode === "include"){
    return [...curCoverMemSet].every(m => expanded.includes(m));
  }
  // 일치
  if(expanded.length !== curCoverMemSet.size) return false;
  return expanded.every(m => curCoverMemSet.has(m));
}

function setCoverMember(btn){
  const m = btn.dataset.member;
  const allBtn = document.querySelector(".btn-cover-member[data-member='all']");
  const memberBtns = [...document.querySelectorAll(".btn-cover-member:not([data-member='all'])")];
  if(m === "all"){
    if(curCoverMemSet.has("all")){
      curCoverMemSet = new Set();
      allBtn?.classList.remove("active");
      memberBtns.forEach(b=>b.classList.remove("active"));
    } else {
      curCoverMemSet = new Set(["all"]);
      allBtn?.classList.add("active");
      memberBtns.forEach(b=>b.classList.add("active"));
    }
  } else {
    const wasAll = curCoverMemSet.has("all");
    if(wasAll){
      curCoverMemSet = new Set(["예준","노아","밤비","은호","하민"]);
      curCoverMemSet.delete(m);
      allBtn?.classList.remove("active");
      memberBtns.forEach(b=>{
        if(b.dataset.member===m) b.classList.remove("active");
        else b.classList.add("active");
      });
    } else {
      allBtn?.classList.remove("active");
      if(curCoverMemSet.has(m)){
        curCoverMemSet.delete(m);
        btn.classList.remove("active");
      } else {
        curCoverMemSet.add(m);
        btn.classList.add("active");
      }
      // 5명 다 선택 = 전원으로 변환
      if(curCoverMemSet.size===5){
        curCoverMemSet = new Set(["all"]);
        allBtn?.classList.add("active");
      }
    }
  }
  renderSongs();
}
