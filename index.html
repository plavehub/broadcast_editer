async function loadSongsFromSheet(){
  try{
    const res=await fetch(WORKER_URL+"?action=getSongs&_t="+Date.now());
    if(!res.ok) return;
    const data=await res.json();
    if(!data.ok||!data.songs) return;
    SONGS=data.songs.map(r=>({
      date:r.release_date||"",albumType:r.album_type||"",album:r.album_name||"",
      track:r.track_no||"",title:r.title||"",type:r.song_type||"",url:r.youtube_url||"",
      nickname:r.album_nickname||""  // 어드민 별명
    }));
    // 커버곡 — 응답에 같이 들어왔는지 확인 (data.cover / data.covers / data.cover_songs)
    const coverSrc = data.cover || data.covers || data.cover_songs;
    if(coverSrc && Array.isArray(coverSrc)){
      COVERS=coverSrc.map(r=>({
        date:r.release_date||r.cover_date||"",
        album:r.album_name||r.original_song||"",
        track:r.track_no||"",
        title:r.title||"",
        type:r.song_type||"cover",
        url:r.youtube_url||"",
        original_artist:r.original_artist||"",
        cover_by:r.cover_by||r.member||r.members||r.cover_member||r.cover_members||"",
        nickname:r.album_nickname||""
      }));
    }
    if(curTab==="songs"||curTab==="cover") renderSongs();
    updateHeaderStats();
  }catch(e){}
  // 별도 액션도 시도 (워커에 getCovers/getCoverSongs 액션 있을 경우)
  if(COVERS.length===0){
    try{
      const actions=["getCovers","getCoverSongs","getCover"];
      for(const act of actions){
        try{
          const r=await fetch(WORKER_URL+"?action="+act+"&_t="+Date.now());
          if(!r.ok) continue;
          const d=await r.json();
          if(!d.ok) continue;
          const src=d.covers||d.cover||d.songs||d.cover_songs||d.rows;
          if(src && Array.isArray(src) && src.length){
            COVERS=src.map(rr=>({
              date:rr.release_date||rr.cover_date||"",
              album:rr.album_name||rr.original_song||"",
              track:rr.track_no||"",
              title:rr.title||"",
              type:rr.song_type||"cover",
              url:rr.youtube_url||"",
              original_artist:rr.original_artist||"",
              cover_by:rr.cover_by||rr.member||rr.members||rr.cover_member||rr.cover_members||""
            }));
            if(curTab==="cover") renderSongs();
            updateHeaderStats();
            break;
          }
        }catch(e){}
      }
    }catch(e){}
  }
}

function renderSongs(){
  const el=document.getElementById("songs-content");
  // 커버곡 탭이면 COVERS, 그 외는 SONGS
  const dataSrc = curTab === "cover" ? COVERS : SONGS;
  if(curTab === "cover" && COVERS.length === 0 && el){
    el.innerHTML=`<div style="padding:60px 20px;text-align:center;color:var(--muted);font-size:12px;line-height:1.8;">
      커버곡 데이터를 불러오는 중이거나, 아직 워커에서 응답하지 않았어요.<br>
      어드민에서 커버곡 데이터가 등록되어 있다면, 워커에 <code>getCovers</code> 또는 <code>data.cover</code> 응답이 필요합니다.
    </div>`;
    return;
  }
  let f=dataSrc.filter(s=>{
    if(curSongYear!=="all"&&!s.date.startsWith(curSongYear)) return false;
    // broadcast 시즌 필터 (curEraSet) — 발매곡 매핑
    if(curEraSet.size>0){
      const era=getSongEra(s.album,s.title);
      // era 매핑 (broadcast era → SONGS era)
      const ERA_MAP={"뿌우(크리)":"뿌우크리","카쿠렌보":"카쿠렌보"};
      let matched=false;
      for(const e of curEraSet){
        const songEra=ERA_MAP[e]||e;
        if(era===songEra){matched=true;break;}
      }
      if(!matched) return false;
    }
    if(curSongAlbum!=="all"){
      const era=getSongEra(s.album,s.title);
      if(curSongAlbum==="뿌우통합"){
        if(era!=="뿌우"&&era!=="뿌우크리") return false;
      } else {
        if(era!==curSongAlbum) return false;
      }
    }
    if(curSongType!=="all"){
      const t=(s.type||"").toLowerCase();
      if(curSongType==="타이틀"&&t!=="타이틀") return false;
      if(curSongType==="수록곡"&&t!=="수록곡"&&t!=="") return false;
      if(curSongType==="ost"&&!t.includes("ost")&&!t.includes("참여")) return false;
      if(curSongType==="inst"&&!s.title.toLowerCase().includes("inst")) return false;
    }
    // 커버곡 멤버 필터 (cover 탭 + 다중 선택)
    if(curTab==="cover" && !matchCoverMember(s)) return false;
    if(curSongQ){
      const q=curSongQ.toLowerCase();
      if(curSongTitleOnly){
        if(!s.title.toLowerCase().includes(q)) return false;
      } else {
        const haystack=(s.title+" "+s.album+" "+(s.albumType||"")+" "+(s.type||"")).toLowerCase();
        if(curSongTagMode==="exact"){
          if(!haystack.split(" ").some(w=>w===q)) return false;
        } else {
          if(!haystack.includes(q)) return false;
        }
      }
    }
    return true;
  });
  // result count (방송 탭과 동일 스타일)
  const rc=document.getElementById("songs-result-count");
  if(rc){
    const hasFilter=curSongYear!=="all"||curSongAlbum!=="all"||curSongType!=="all"||!!curSongQ;
    let txt=`${f.length}개 결과`;
    if(curSongQ) txt=`"${escH(curSongQ)}" ${txt}`;
    if(hasFilter){
      rc.innerHTML=`<span style="color:#ffffff;">${txt}</span>`;
    } else {
      rc.textContent=txt;
    }
  }
  if(!f.length){el.innerHTML='<div class="empty"><div class="empty-icon"><i class="pxi"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></i></div>검색 결과가 없어요</div>';return;}

  // 커버곡 탭: 라이브 카드 스타일 (앨범 그룹핑 X)
  if(curTab === "cover"){
    const sorted = f.slice().sort((a,b)=>{
      if(curSongSort==="desc") return String(b.date||"").localeCompare(String(a.date||""));
      return String(a.date||"").localeCompare(String(b.date||""));
    });
    el.innerHTML = '<div class="grid" style="padding:8px 0;display:flex;flex-wrap:wrap;gap:10px;">' + sorted.map(s => makeCoverCard(s)).join("") + '</div>';
    setTimeout(()=>{ if(typeof setupPlData==="function") setupPlData(); }, 50);
    return;
  }

  // 앨범별 그룹핑
  const byAlbum={};
  f.forEach(s=>{
    const k=s.album||"기타";
    if(!byAlbum[k]){byAlbum[k]={songs:[],date:s.date,albumType:s.albumType};}
    byAlbum[k].songs.push(s);
  });

  // 앨범: 항상 오래된 순, 앨범 내: 트랙 번호 순
  const sortedAlbums=Object.keys(byAlbum).sort((a,b)=>{
    const da=byAlbum[a].date||"";
    const db=byAlbum[b].date||"";
    return da.localeCompare(db);
  });
  sortedAlbums.forEach(album=>{
    byAlbum[album].songs.sort((a,b)=>(parseInt(a.track)||0)-(parseInt(b.track)||0));
  });

  el.innerHTML=sortedAlbums.map(album=>{
    const {songs,date,albumType}=byAlbum[album];
    const era=getSongEra(album,songs[0]?.title||"");

          <div class="song-top-badges">

            <span class="song-badge ${bc}">${bl}</span>

        </div>
        <div class="song-body">
          <div class="song-title-text" title="${escH(s.title)}">${escH(s.title)}</div>

    return`<div class="songs-album-section">
      <div class="songs-album-header">
        <span class="songs-album-label" style="background:${st.bg};color:${st.text};border-color:${st.border};">${escH(album)}</span>
        <span class="songs-album-date">${escH(date)} · ${escH(albumType)}</span>
      </div>
      <div class="songs-grid">${cardsHtml}</div>
    </div>`;
  }).join("");
  // 재생목록 데이터 동기화
  setTimeout(()=>{ if(typeof setupPlData==="function") setupPlData(); }, 50);
}

function removeSongTag(sid,tag){
  const key="plave_v2_"+sid;
  const d=JSON.parse(localStorage.getItem(key)||"{}");
  d.tags=(d.tags||[]).filter(t=>t!==tag);
  localStorage.setItem(key,JSON.stringify(d));
  refreshSongTagList(sid,d.tags);
}

function refreshSongTagList(sid,tags){
  const el=document.getElementById("song-tag-list");
  if(!el) return;
  el.innerHTML=tags.length
    ?tags.map(t=>`<span class="song-tag" onclick="removeSongTag('${escH(sid)}','${escH(t)}')">${escH(t)} ×</span>`).join("")
    :'<span class="song-tag-empty">없음</span>';
}

function toggleToast(){
  document.getElementById("toast-closed").classList.toggle("toast-hidden");
  document.getElementById("toast-open").classList.toggle("toast-hidden");
}
function formatToastTime(dateStr){
  if(!dateStr) return null;
  const d=new Date(dateStr);
  if(isNaN(d)) return null;
  const yy=String(d.getFullYear()).slice(2);
  const mm=String(d.getMonth()+1).padStart(2,"0");
  const dd=String(d.getDate()).padStart(2,"0");
  const hh=String(d.getHours()).padStart(2,"0");
  const mi=String(d.getMinutes()).padStart(2,"0");
  return `${yy}/${mm}/${dd} ${hh}:${mi}`;
}
function setToastTime(id,timeStr){
  const el=document.getElementById(id);
  if(!el) return;
  if(timeStr){el.textContent=timeStr;el.classList.remove("toast-empty");}
  else{el.textContent="—";el.classList.add("toast-empty");}
}
async function fetchLastSync(){
  try{
    const res=await fetch(WORKER_URL+"?action=getLastSync&_t="+Date.now());
    const data=await res.json();
    if(data.ok&&data.last_sync){
      setToastTime("toast-sync",formatToastTime(data.last_sync));
    }
  }catch(e){}
}
function updateToastRefresh(){
  setToastTime("toast-refresh",formatToastTime(new Date().toISOString()));
}

// 시즌 필터 드래그 스크롤
(function(){
  const el=document.getElementById("era-filters");
  if(!el) return;
  let isDown=false,startX=0,scrollLeft=0;
  el.addEventListener("mousedown",e=>{
    if(e.target.tagName==="BUTTON") return;
    isDown=true; el.classList.add("dragging");
    startX=e.pageX-el.offsetLeft; scrollLeft=el.scrollLeft;
  });
  document.addEventListener("mouseup",()=>{isDown=false;el.classList.remove("dragging");});
  el.addEventListener("mousemove",e=>{
    if(!isDown) return;
    e.preventDefault();
    const x=e.pageX-el.offsetLeft;
    el.scrollLeft=scrollLeft-(x-startX);
  });
  // 터치 지원
  el.addEventListener("touchstart",e=>{startX=e.touches[0].pageX-el.offsetLeft;scrollLeft=el.scrollLeft;},{passive:true});
  el.addEventListener("touchmove",e=>{
    const x=e.touches[0].pageX-el.offsetLeft;
    el.scrollLeft=scrollLeft-(x-startX);
  },{passive:true});
})();
</script>
<script>
(function(){
  const STAR_COLORS=[{r:77,g:166,b:255},{r:168,g:85,b:247},{r:255,g:107,b:157},{r:255,g:82,b:82},{r:82,g:204,b:122}];
  const c=document.getElementById('star-bg');
  function draw(){
    c.width=window.innerWidth;c.height=window.innerHeight;
    const ctx=c.getContext('2d');
    for(let i=0;i<350;i++){
      const x=Math.random()*c.width;
      const y=Math.random()*c.height;
      const r=Math.random()*1.8+0.27;
      const col=STAR_COLORS[Math.floor(Math.random()*STAR_COLORS.length)];
      const a=Math.random()*0.5+0.5;
      ctx.beginPath();
      for(let j=0;j<5;j++){
        const angle=Math.PI*2*j/5-Math.PI/2;
        ctx.lineTo(x+Math.cos(angle)*r,y+Math.sin(angle)*r);
        const ia=angle+Math.PI/5;
        ctx.lineTo(x+Math.cos(ia)*r*0.4,y+Math.sin(ia)*r*0.4);
      }
      ctx.closePath();
      ctx.fillStyle=`rgba(${col.r},${col.g},${col.b},${a})`;
      ctx.fill();
    }
  }
  draw();
  window.addEventListener('resize',draw);
})();
</script>
