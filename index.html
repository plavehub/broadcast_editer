<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAVE 라방 관리 v2.0</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #08080a; }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }
  textarea::-webkit-scrollbar, div::-webkit-scrollbar { width: 6px; }
  textarea::-webkit-scrollbar-track, div::-webkit-scrollbar-track { background: transparent; }
  textarea::-webkit-scrollbar-thumb, div::-webkit-scrollbar-thumb { background: #2a2a3f; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const MEMBER_COLORS = {
  예준: { bg: "#1a1a3a", border: "#4466ff", text: "#6688ff", dot: "#4466ff" },
  노아: { bg: "#2a1a3a", border: "#9944ff", text: "#bb77ff", dot: "#9944ff" },
  밤비: { bg: "#3a1a2a", border: "#ff44aa", text: "#ff77cc", dot: "#ff44aa" },
  은호: { bg: "#3a1a1a", border: "#ff4444", text: "#ff7777", dot: "#ff4444" },
  하민: { bg: "#1a1a1a", border: "#444444", text: "#999999", dot: "#555555" },
  전원: { bg: "#1a2a2a", border: "#44cccc", text: "#66dddd", dot: "#44cccc" },
};

// Data loaded from Supabase

const MemberTag = ({ name }) => {
  const c = MEMBER_COLORS[name] || MEMBER_COLORS["전원"];
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 4,
      background: c.bg, border: `1px solid ${c.border}22`,
      padding: "2px 8px", borderRadius: 20, fontSize: 11, color: c.text, fontWeight: 600,
    }}>
      <span style={{ width: 5, height: 5, borderRadius: "50%", background: c.dot }} />
      {name}
    </span>
  );
};

const StatusBadge = ({ done }) => (
  <span style={{
    fontSize: 10, fontWeight: 700, padding: "3px 10px", borderRadius: 20, letterSpacing: 0.5,
    ...(done
      ? { background: "#0f2a18", color: "#4ade80", border: "1px solid #1a4a28" }
      : { background: "#2a1a0a", color: "#f0a030", border: "1px solid #4a3a18" })
  }}>
    {done ? "✓ 스크립트 완료" : "스크립트 미등록"}
  </span>
);

function PlaveAdmin() {
  const WORKER = "https://plave-worker.kgb2020sr-be5.workers.dev";
  const [loading, setLoading] = useState(true);
  const [sessions, setSessions] = useState([]);
  const [scriptSessionIds, setScriptSessionIds] = useState(new Set());
  const [hlCounts, setHlCounts] = useState({});
  const [activeTab, setActiveTab] = useState("list");
  const [selectedSession, setSelectedSession] = useState(null);
  const [scriptPreviewData, setScriptPreviewData] = useState([]);
  const [hlPreviewData, setHlPreviewData] = useState([]);
  const [saving, setSaving] = useState(false);
  const [formData, setFormData] = useState({ date: "", title: "", members: [], link: "" });
  const [scriptText, setScriptText] = useState("");
  const [showPreview, setShowPreview] = useState(false);
  const [scriptParsed, setScriptParsed] = useState([]);
  const [filter, setFilter] = useState("all");
  const [hlSession, setHlSession] = useState(null);
  const [highlights, setHighlights] = useState([]);
  const [hlText, setHlText] = useState("");
  const [hlParsed, setHlParsed] = useState([]);
  const [registerStep, setRegisterStep] = useState(1);
  const [regScriptText, setRegScriptText] = useState("");
  const [regShowPreview, setRegShowPreview] = useState(false);
  const [editSession, setEditSession] = useState(false);
  const [editSessionData, setEditSessionData] = useState({});
  const [confirmDeleteScript, setConfirmDeleteScript] = useState(false);
  const [confirmDeleteHl, setConfirmDeleteHl] = useState(false);
  const [expandScript, setExpandScript] = useState(false);
  const [expandHl, setExpandHl] = useState(false);
  const scriptPreviewRef = useRef(null);
  const hlPreviewRef = useRef(null);
  const [searchByNo, setSearchByNo] = useState("");
  const [searchByTitle, setSearchByTitle] = useState("");
  const [searchByDate, setSearchByDate] = useState("");
  const [hlSearchByNo, setHlSearchByNo] = useState("");
  const [hlSearchByTitle, setHlSearchByTitle] = useState("");
  const [hlSearchByDate, setHlSearchByDate] = useState("");

  const memberList = ["예준", "노아", "밤비", "은호", "하민"];

  const loadData = useCallback(async () => {
    setLoading(true);
    try {
      const [sessRes, scriptRes, hlRes] = await Promise.all([
        fetch(WORKER + "/?action=getSessions").then(r => r.json()),
        fetch(WORKER + "/?action=getScriptIds").then(r => r.json()),
        fetch(WORKER + "/?action=getHighlightIds").then(r => r.json()),
      ]);
      if (sessRes.ok) {
        const mapped = sessRes.sessions.map(s => ({
          id: s.id, no: s.session_no, date: s.live_date, title: s.title,
          members: s.members || "전원", link: s.youtube_url || "",
          hasScript: false, hlCount: 0,
        }));
        const scriptSet = new Set(scriptRes.ok ? scriptRes.session_ids : []);
        const hlMap = hlRes.ok ? hlRes.counts : {};
        mapped.forEach(s => {
          s.hasScript = scriptSet.has(s.id);
          s.hlCount = hlMap[s.id] || 0;
        });
        setSessions(mapped);
        setScriptSessionIds(scriptSet);
        setHlCounts(hlMap);
      }
    } catch (e) { console.error("Load failed:", e); }
    setLoading(false);
  }, []);

  useEffect(() => { loadData(); }, [loadData]);

  const searchByNumber = (q) => {
    if (!q.trim()) return null;
    return sessions.find(s => s.no === parseInt(q)) || null;
  };
  const searchByTitleFn = (q) => {
    if (!q.trim()) return null;
    return sessions.find(s => s.title.toLowerCase().includes(q.toLowerCase())) || null;
  };
  const searchByDateFn = (q) => {
    if (!q.trim()) return null;
    return sessions.find(s => s.date === q) || null;
  };

  const inputStyle = {
    flex: 1, minWidth: 0, background: "#08080a", border: "1px solid #1e1e28",
    borderRadius: 8, padding: "10px 14px", color: "#e0ddd5", fontSize: 14,
    outline: "none", fontFamily: "inherit", fontWeight: 600,
  };
  const searchBtnStyle = (active) => ({
    background: active ? "linear-gradient(135deg, #4466ff, #7744ff)" : "#1a1a22",
    color: active ? "#fff" : "#444",
    border: "none", borderRadius: 8, padding: "10px 16px",
    fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap",
  });
  const cardStyle = {
    background: "#0f0f12", border: "1px solid #1a1a1f", borderRadius: 12, padding: "14px 16px",
  };

  const toggleMember = (m) => {
    setFormData(prev => ({
      ...prev,
      members: prev.members.includes(m) ? prev.members.filter(x => x !== m) : [...prev.members, m]
    }));
  };

  const filtered = sessions.filter(s => {
    if (filter === "no-script") return !s.hasScript;
    if (filter === "has-script") return s.hasScript;
    if (filter === "has-hl") return s.hlCount > 0;
    if (filter === "no-hl") return s.hlCount === 0;
    return true;
  });

  if (loading) return (
    <div style={{ minHeight: "100vh", background: "#08080a", color: "#e0ddd5", fontFamily: "'Pretendard', 'Apple SD Gothic Neo', sans-serif", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ textAlign: "center" }}>
        <div style={{ fontSize: 24, fontWeight: 700, marginBottom: 8 }}>PLAVE 라방 관리</div>
        <div style={{ fontSize: 13, color: "#555" }}>Supabase에서 데이터 불러오는 중...</div>
      </div>
    </div>
  );

  return (
    <div style={{ minHeight: "100vh", background: "#08080a", color: "#e0ddd5", fontFamily: "'Pretendard', 'Apple SD Gothic Neo', sans-serif" }}>

      {/* Header */}
      <div style={{
        background: "#0c0c0f", borderBottom: "1px solid #1a1a1f",
        padding: "0 28px", position: "sticky", top: 0, zIndex: 50,
        display: "flex", alignItems: "center", justifyContent: "space-between", height: 56,
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{
            width: 32, height: 32, borderRadius: 10,
            background: "linear-gradient(135deg, #4466ff, #9944ff)",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontWeight: 800, color: "#fff", fontSize: 13,
          }}>P</div>
          <span style={{ fontWeight: 700, fontSize: 15, letterSpacing: -0.5 }}>PLAVE 라방 관리</span>
          <span style={{ fontSize: 11, color: "#444", marginLeft: 4 }}>v2.0</span>
        </div>

        <div style={{ display: "flex", gap: 2, background: "#111114", borderRadius: 10, padding: 3 }}>
          {[
            { key: "list", label: "📋 라방 목록", icon: "" },
            { key: "register", label: "➕ 라방 등록", icon: "" },
            { key: "script", label: "📝 스크립트", icon: "" },
            { key: "highlight", label: "📌 하이라이트", icon: "" },
          ].map(t => (
            <button key={t.key} onClick={() => setActiveTab(t.key)} style={{
              background: activeTab === t.key ? "#1e1e28" : "transparent",
              color: activeTab === t.key ? "#fff" : "#555",
              border: activeTab === t.key ? "1px solid #2a2a38" : "1px solid transparent",
              borderRadius: 8, padding: "7px 16px", fontSize: 12, fontWeight: 600,
              cursor: "pointer", fontFamily: "inherit", transition: "all 0.2s",
            }}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      <div style={{ maxWidth: 800, margin: "0 auto", padding: "28px 24px" }}>

        {/* ========== 라방 목록 탭 ========== */}
        {activeTab === "list" && (
          <div>
            {/* Stats */}
            <div style={{ display: "grid", gridTemplateColumns: "auto 1fr 1fr", gap: 10, marginBottom: 24 }}>
              {/* 전체 */}
              <div onClick={() => setFilter(filter === "all" ? "all" : "all")}
                style={{
                  background: filter === "all" ? "#111118" : "#0f0f12",
                  border: `1px solid ${filter === "all" ? "#4466ff44" : "#1a1a1f"}`,
                  borderRadius: 12, padding: "14px 20px", cursor: "pointer", transition: "all 0.15s",
                  display: "flex", flexDirection: "column", justifyContent: "center", minWidth: 90,
                }}>
                <div style={{ fontSize: 11, color: filter === "all" ? "#4466ff" : "#555", marginBottom: 4 }}>전체</div>
                <div style={{ fontSize: 26, fontWeight: 800, color: "#4466ff", fontVariantNumeric: "tabular-nums" }}>{sessions.length}</div>
              </div>

              {/* 스크립트 */}
              <div style={{
                background: "#0f0f12", border: "1px solid #1a1a1f", borderRadius: 12,
                padding: "14px 16px", display: "flex", flexDirection: "column", gap: 8,
              }}>
                <div style={{ fontSize: 11, color: "#555", fontWeight: 700 }}>📝 스크립트</div>
                <div style={{ display: "flex", gap: 8 }}>
                  <div onClick={() => setFilter(filter === "has-script" ? "all" : "has-script")}
                    style={{
                      flex: 1, background: filter === "has-script" ? "#0a1a10" : "#08080a",
                      border: `1px solid ${filter === "has-script" ? "#4ade8044" : "#1a1a1f"}`,
                      borderRadius: 8, padding: "8px 12px", cursor: "pointer", transition: "all 0.15s",
                    }}>
                    <div style={{ fontSize: 10, color: filter === "has-script" ? "#4ade80" : "#444", marginBottom: 2 }}>등록</div>
                    <div style={{ fontSize: 20, fontWeight: 800, color: "#4ade80", fontVariantNumeric: "tabular-nums" }}>{sessions.filter(s=>s.hasScript).length}</div>
                  </div>
                  <div onClick={() => setFilter(filter === "no-script" ? "all" : "no-script")}
                    style={{
                      flex: 1, background: filter === "no-script" ? "#1a1208" : "#08080a",
                      border: `1px solid ${filter === "no-script" ? "#f0a03044" : "#1a1a1f"}`,
                      borderRadius: 8, padding: "8px 12px", cursor: "pointer", transition: "all 0.15s",
                    }}>
                    <div style={{ fontSize: 10, color: filter === "no-script" ? "#f0a030" : "#444", marginBottom: 2 }}>미등록</div>
                    <div style={{ fontSize: 20, fontWeight: 800, color: "#f0a030", fontVariantNumeric: "tabular-nums" }}>{sessions.filter(s=>!s.hasScript).length}</div>
                  </div>
                </div>
              </div>

              {/* 하이라이트 */}
              <div style={{
                background: "#0f0f12", border: "1px solid #1a1a1f", borderRadius: 12,
                padding: "14px 16px", display: "flex", flexDirection: "column", gap: 8,
              }}>
                <div style={{ fontSize: 11, color: "#555", fontWeight: 700 }}>📌 하이라이트</div>
                <div style={{ display: "flex", gap: 8 }}>
                  <div onClick={() => setFilter(filter === "has-hl" ? "all" : "has-hl")}
                    style={{
                      flex: 1, background: filter === "has-hl" ? "#1a1208" : "#08080a",
                      border: `1px solid ${filter === "has-hl" ? "#ff880044" : "#1a1a1f"}`,
                      borderRadius: 8, padding: "8px 12px", cursor: "pointer", transition: "all 0.15s",
                    }}>
                    <div style={{ fontSize: 10, color: filter === "has-hl" ? "#ff8800" : "#444", marginBottom: 2 }}>등록</div>
                    <div style={{ fontSize: 20, fontWeight: 800, color: "#ff8800", fontVariantNumeric: "tabular-nums" }}>{sessions.filter(s=>s.hlCount>0).length}</div>
                  </div>
                  <div onClick={() => setFilter(filter === "no-hl" ? "all" : "no-hl")}
                    style={{
                      flex: 1, background: filter === "no-hl" ? "#1a0a0a" : "#08080a",
                      border: `1px solid ${filter === "no-hl" ? "#f8717144" : "#1a1a1f"}`,
                      borderRadius: 8, padding: "8px 12px", cursor: "pointer", transition: "all 0.15s",
                    }}>
                    <div style={{ fontSize: 10, color: filter === "no-hl" ? "#f87171" : "#444", marginBottom: 2 }}>미등록</div>
                    <div style={{ fontSize: 20, fontWeight: 800, color: "#f87171", fontVariantNumeric: "tabular-nums" }}>{sessions.filter(s=>s.hlCount===0).length}</div>
                  </div>
                </div>
              </div>
            </div>

            {/* Session List */}
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {filtered.map(s => (
                <div key={s.no} onClick={() => {
                  if (filter === "no-hl" || filter === "has-hl") {
                    setHlSession(s); setHlSearchByNo(String(s.no)); setActiveTab("highlight");
                  } else {
                    setSelectedSession(s); setSearchByNo(String(s.no)); setActiveTab("script");
                  }
                }}
                  style={{
                    background: "#0f0f12", border: "1px solid #1a1a1f", borderRadius: 12,
                    padding: "14px 18px", cursor: "pointer", transition: "all 0.15s",
                    display: "flex", alignItems: "center", gap: 14,
                  }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = "#2a2a3f"; e.currentTarget.style.background = "#111116"; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = "#1a1a1f"; e.currentTarget.style.background = "#0f0f12"; }}
                >
                  <div style={{
                    minWidth: 42, height: 42, borderRadius: 10,
                    background: s.hasScript ? "#0f1f14" : "#1f1a0f",
                    border: `1px solid ${s.hasScript ? "#1a3a22" : "#3a2a14"}`,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 13, fontWeight: 800, color: s.hasScript ? "#4ade80" : "#f0a030",
                    fontVariantNumeric: "tabular-nums",
                  }}>
                    {s.no}
                  </div>

                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{
                      fontSize: 13, fontWeight: 600, lineHeight: 1.4,
                      overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                    }}>
                      {s.title}
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 6, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 11, color: "#444", fontVariantNumeric: "tabular-nums" }}>{s.date}</span>
                      {s.members.split(",").map((m, i) => <MemberTag key={i} name={m.trim()} />)}
                    </div>
                  </div>

                  <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6 }}>
                    <StatusBadge done={s.hasScript} />
                    <span onClick={(e) => {
                      e.stopPropagation();
                      setHlSession(s); setHlSearchByNo(String(s.no)); setActiveTab("highlight");
                    }} style={{
                      fontSize: 10, fontWeight: 700, padding: "3px 10px", borderRadius: 20,
                      background: s.hlCount > 0 ? "#1a1208" : "#1a0a0a",
                      color: s.hlCount > 0 ? "#ff8800" : "#f87171",
                      border: `1px solid ${s.hlCount > 0 ? "#3a2a0a" : "#3a1a1a"}`,
                      display: "inline-flex", alignItems: "center", gap: 4,
                      cursor: "pointer", transition: "all 0.15s",
                    }}
                    onMouseEnter={e => { e.currentTarget.style.transform = "scale(1.05)"; }}
                    onMouseLeave={e => { e.currentTarget.style.transform = "scale(1)"; }}
                    >
                      {s.hlCount > 0 ? `📌 ${s.hlCount}` : "📌 미등록"}
                    </span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ========== 라방 등록 탭 ========== */}
        {activeTab === "register" && (
          <div>
            <div style={{ marginBottom: 24 }}>
              <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 4 }}>새 라방 등록</h2>
              <p style={{ fontSize: 13, color: "#555" }}>라방 정보를 입력하면 Supabase에 바로 저장돼요</p>
            </div>

            <div style={{
              background: "#0f0f12", border: "1px solid #1a1a1f", borderRadius: 14,
              padding: "24px 28px", display: "flex", flexDirection: "column", gap: 20,
            }}>
              {/* 날짜 */}
              <div>
                <label style={{ fontSize: 12, fontWeight: 700, color: "#666", display: "block", marginBottom: 6 }}>
                  📅 방송 날짜
                </label>
                <input type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})}
                  style={{
                    width: "100%", background: "#08080a", border: "1px solid #1e1e28",
                    borderRadius: 8, padding: "10px 14px", color: "#e0ddd5", fontSize: 14,
                    outline: "none", fontFamily: "inherit",
                  }}
                />
              </div>

              {/* 제목 */}
              <div>
                <label style={{ fontSize: 12, fontWeight: 700, color: "#666", display: "block", marginBottom: 6 }}>
                  📌 방송 제목
                </label>
                <input type="text" placeholder="예: 260403 PLAVE Live Broadcast 📡"
                  value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})}
                  style={{
                    width: "100%", background: "#08080a", border: "1px solid #1e1e28",
                    borderRadius: 8, padding: "10px 14px", color: "#e0ddd5", fontSize: 14,
                    outline: "none", fontFamily: "inherit",
                  }}
                />
              </div>

              {/* 멤버 */}
              <div>
                <label style={{ fontSize: 12, fontWeight: 700, color: "#666", display: "block", marginBottom: 8 }}>
                  👥 출연 멤버
                </label>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  <button onClick={() => setFormData({...formData, members: memberList})}
                    style={{
                      background: formData.members.length === 5 ? "#1a2a2a" : "#111114",
                      border: `1px solid ${formData.members.length === 5 ? "#44cccc44" : "#1e1e28"}`,
                      color: formData.members.length === 5 ? "#66dddd" : "#555",
                      borderRadius: 8, padding: "8px 14px", fontSize: 12, fontWeight: 700,
                      cursor: "pointer", fontFamily: "inherit",
                    }}>
                    전원
                  </button>
                  {memberList.map(m => {
                    const selected = formData.members.includes(m);
                    const c = MEMBER_COLORS[m];
                    return (
                      <button key={m} onClick={() => toggleMember(m)} style={{
                        background: selected ? c.bg : "#111114",
                        border: `1px solid ${selected ? c.border + "44" : "#1e1e28"}`,
                        color: selected ? c.text : "#555",
                        borderRadius: 8, padding: "8px 14px", fontSize: 12, fontWeight: 700,
                        cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s",
                      }}>
                        {m}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* 유튜브 링크 */}
              <div>
                <label style={{ fontSize: 12, fontWeight: 700, color: "#666", display: "block", marginBottom: 6 }}>
                  🔗 유튜브 링크 <span style={{ fontWeight: 400, color: "#444" }}>(선택)</span>
                </label>
                <input type="url" placeholder="https://www.youtube.com/live/..."
                  value={formData.link} onChange={e => setFormData({...formData, link: e.target.value})}
                  style={{
                    width: "100%", background: "#08080a", border: "1px solid #1e1e28",
                    borderRadius: 8, padding: "10px 14px", color: "#e0ddd5", fontSize: 14,
                    outline: "none", fontFamily: "inherit",
                  }}
                />
              </div>

              {/* 미리보기 */}
              {formData.title && (
                <div style={{
                  background: "#08080a", border: "1px solid #1e1e28", borderRadius: 10,
                  padding: "14px 18px",
                }}>
                  <div style={{ fontSize: 11, color: "#555", marginBottom: 8, fontWeight: 600 }}>미리보기</div>
                  <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 6 }}>{formData.title}</div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                    <span style={{ fontSize: 12, color: "#444" }}>{formData.date || "날짜 미입력"}</span>
                    {formData.members.map((m, i) => <MemberTag key={i} name={m} />)}
                  </div>
                </div>
              )}

                      const rows = scriptParsed.map((r,i) => ({ order_index: i+1, seconds: r.sec, timecode: r.tc, content: r.text }));
                      await fetch(WORKER + "/", { method: "POST", headers: {"Content-Type":"application/json"},
                        body: JSON.stringify({ session: { session_no: selectedSession.no, tab_name: "live_" + selectedSession.date.replace(/-/g,"") + "_0", live_date: selectedSession.date, members: selectedSession.members, title: selectedSession.title, youtube_url: selectedSession.link }, rows })
                      });
                      alert("저장 완료! " + rows.length + "줄");
                      setScriptText(""); setShowPreview(false); setScriptParsed([]);
                      await loadData();
                      setSelectedSession(prev => prev ? {...prev, hasScript: true} : null);
                    } catch(e) { alert("저장 실패: " + e.message); }
                    setSaving(false);
                  }}>
                    {saving ? "저장 중..." : `Supabase에 저장 (${scriptParsed.length}줄)`}</button>
                </div>
              </div>
            )}
              </>
            )}
          </div>
        )}

        {/* ========== 하이라이트 탭 ========== */}
        {activeTab === "highlight" && (
          <div>
            <div style={{ marginBottom: 24 }}>
              <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 4 }}>📌 하이라이트 등록</h2>
              <p style={{ fontSize: 13, color: "#555" }}>라방의 명장면 구간을 기록하고 Supabase에 저장해요</p>
            </div>

            {/* 검색 카드 3개 */}
            <div style={{ display: "grid", gridTemplateColumns: "minmax(0,1fr) minmax(0,1fr) minmax(0,1fr)", gap: 10, marginBottom: 20, maxWidth: 800 }}>
              <div style={cardStyle}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 10 }}>
                  <span style={{ fontSize: 14, fontWeight: 700, color: "#4466ff" }}>#</span>
                  <span style={{ fontSize: 12, fontWeight: 600, color: "#888" }}>번호</span>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  <input type="number" placeholder="257" value={hlSearchByNo}
                    onChange={e => setHlSearchByNo(e.target.value)}
                    onKeyDown={e => { if (e.key === "Enter") setHlSession(searchByNumber(hlSearchByNo)); }}
                    style={{...inputStyle, textAlign: "center", fontSize: 16}} />
                  <button onClick={() => setHlSession(searchByNumber(hlSearchByNo))}
                    style={searchBtnStyle(hlSearchByNo)}>검색</button>
                </div>
              </div>
              <div style={cardStyle}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 10 }}>
                  <span style={{ fontSize: 14, fontWeight: 700, color: "#9944ff" }}>T</span>
                  <span style={{ fontSize: 12, fontWeight: 600, color: "#888" }}>제목</span>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  <input type="text" placeholder="펌펍더볼륨" value={hlSearchByTitle}
                    onChange={e => setHlSearchByTitle(e.target.value)}
                    onKeyDown={e => { if (e.key === "Enter") setHlSession(searchByTitleFn(hlSearchByTitle)); }}
                    style={inputStyle} />
                  <button onClick={() => setHlSession(searchByTitleFn(hlSearchByTitle))}
                    style={searchBtnStyle(hlSearchByTitle)}>검색</button>
                </div>
              </div>
              <div style={cardStyle}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 10 }}>
                  <span style={{ fontSize: 14, fontWeight: 700, color: "#ff8800" }}>D</span>
                  <span style={{ fontSize: 12, fontWeight: 600, color: "#888" }}>날짜</span>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  <input type="date" value={hlSearchByDate}
                    onChange={e => setHlSearchByDate(e.target.value)}
                    onKeyDown={e => { if (e.key === "Enter") setHlSession(searchByDateFn(hlSearchByDate)); }}
                    style={inputStyle} />
                  <button onClick={() => setHlSession(searchByDateFn(hlSearchByDate))}
                    style={searchBtnStyle(hlSearchByDate)}>검색</button>
                </div>
              </div>
            </div>

            {/* 검색 결과 없음 */}
            {(hlSearchByNo || hlSearchByTitle || hlSearchByDate) && !hlSession && (
              <div style={{
                background: "#1f0f0f", border: "1px solid #3a1a1a", borderRadius: 12,
                padding: "16px 20px", marginBottom: 20, textAlign: "center",
              }}>
                <div style={{ fontSize: 14, color: "#f87171", fontWeight: 600 }}>검색 결과가 없어요</div>
              </div>
            )}

            {hlSession && (
              <>
                {/* 세션 정보 카드 */}
                <div style={{
                  background: "#0f0f12", border: "1px solid #1a1a1f", borderRadius: 14,
                  padding: "18px 22px", marginBottom: 20,
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                    <div style={{ fontSize: 11, color: "#4466ff", fontWeight: 700, letterSpacing: 1 }}>
                      NO. {hlSession.no}
                    </div>
                    {hlSession.hlCount > 0 && (
                      <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 20, background: "#1a1208", color: "#ff8800", border: "1px solid #3a2a0a" }}>
                        📌 {hlSession.hlCount}개 등록됨
                      </span>
                    )}
                  </div>
                  <div style={{ fontSize: 15, fontWeight: 700, lineHeight: 1.5, marginBottom: 8 }}>
                    {hlSession.title}
                  </div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                    <span style={{ fontSize: 12, color: "#444" }}>{hlSession.date}</span>
                    {hlSession.members.split(",").map((m, i) => <MemberTag key={i} name={m.trim()} />)}
                  </div>
                </div>

                {/* 기존 하이라이트 관리 */}
                {hlSession.hlCount > 0 && !confirmDeleteHl && (
                  <div style={{
                    background: "#1a1208", border: "1px solid #3a2a0a", borderRadius: 12,
                    padding: "16px 18px", marginBottom: 20,
                  }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: expandHl ? 14 : 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{ fontSize: 13, fontWeight: 600, color: "#ff8800" }}>📌 하이라이트 {hlSession.hlCount}개 등록됨</div>
                      </div>
                      <div style={{ display: "flex", gap: 6 }}>
                        <button onClick={async () => {
                          if (!expandHl && hlPreviewData.length === 0) {
                            const res = await fetch(WORKER + "/?action=getHighlights&session_id=" + hlSession.id).then(r=>r.json());
                            if (res.ok) setHlPreviewData(res.highlights.map((h,i)=>({i:i+1,tc:h.timecode||"",t:h.content,type:h.type==="section"?"section":"hl"})));
                          }
                          setExpandHl(!expandHl);
                        }} style={{
                          background: expandHl ? "#1a1208" : "transparent", border: `1px solid ${expandHl ? "#ff880044" : "#3a2a0a"}`,
                          borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 600,
                          color: expandHl ? "#ff8800" : "#555", cursor: "pointer", fontFamily: "inherit",
                        }}>{expandHl ? "접기 ▲" : "펼쳐보기 ▼"}</button>
                        <button onClick={() => setConfirmDeleteHl(true)} style={{
                          background: "#1f0f0f", border: "1px solid #3a1a1a", borderRadius: 6,
                          padding: "5px 12px", color: "#f87171", fontSize: 11, fontWeight: 600,
                          cursor: "pointer", fontFamily: "inherit",
                        }}>🗑 삭제 후 재등록</button>
                      </div>
                    </div>
                    {expandHl && (
                      <div style={{ border: "1px solid #3a2a0a", borderRadius: 8, overflow: "hidden" }}>
                        <div style={{
                          display: "grid", gridTemplateColumns: "36px 70px 1fr",
                          background: "#1a1208", padding: "6px 14px", fontSize: 10, color: "#ff880088",
                          borderBottom: "1px solid #3a2a0a",
                        }}>
                          <div>#</div><div>타임코드</div><div>내용</div>
                        </div>
                        {hlPreviewData.slice(0, 10).map((r, idx) => (
                          <div key={idx} style={{
                            display: "grid", gridTemplateColumns: "36px 70px 1fr",
                            padding: "5px 14px", fontSize: 12, borderBottom: "1px solid #1a1208",
                            background: r.type === "section" ? "#14100a" : (idx % 2 ? "#16120a" : "#13100a"),
                          }}>
                            <div style={{ color: "#333" }}>{r.i}</div>
                            <div style={{ color: "#ff8800", fontFamily: "monospace", fontWeight: 600, fontSize: 11 }}>{r.tc || "-"}</div>
                            <div style={{ color: r.type === "section" ? "#66bbff" : "#d8c8a0", fontWeight: r.type === "section" ? 700 : 400 }}>{r.t}</div>
                          </div>
                        ))}
                        <div style={{ padding: "8px 14px", fontSize: 11, color: "#555", textAlign: "center", background: "#1a1208" }}>
                          {hlPreviewData.length > 10 ? `... 외 ${hlPreviewData.length - 10}개 더` : ""}
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* 삭제 확인 */}
                {confirmDeleteHl && (
                  <div style={{
                    background: "#1f0f0f", border: "1px solid #3a1a1a", borderRadius: 12,
                    padding: "16px 18px", marginBottom: 20, textAlign: "center",
                  }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#f87171", marginBottom: 8 }}>정말 하이라이트를 삭제할까요?</div>
                    <div style={{ fontSize: 12, color: "#555", marginBottom: 14 }}>이 라방의 하이라이트 {hlSession.hlCount}개가 전부 삭제돼요!</div>
                    <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
                      <button onClick={() => setConfirmDeleteHl(false)} style={{
                        background: "#111114", border: "1px solid #1e1e28", borderRadius: 8,
                        padding: "10px 20px", color: "#888", fontSize: 13, cursor: "pointer", fontFamily: "inherit",
                      }}>취소</button>
                      <button onClick={async () => {
                        setSaving(true);
                        try {
                          await fetch(WORKER + "/", { method: "POST", headers: {"Content-Type":"application/json"},
                            body: JSON.stringify({ action: "deleteHighlights", session_id: hlSession.id })
                          });
                          setConfirmDeleteHl(false);
                          await loadData();
                          setHlSession(prev => prev ? {...prev, hlCount: 0} : null);
                        } catch(e) { alert("삭제 실패: " + e.message); }
                        setSaving(false);
                      }} style={{
                        background: "#cc2222", border: "none", borderRadius: 8,
                        padding: "10px 20px", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                      }}>{saving ? "삭제 중..." : "삭제하고 재등록"}</button>
                    </div>
                  </div>
                )}

                {/* 하이라이트 붙여넣기 */}
                <div style={{
                  background: "#0f0f12", border: "1px solid #1a1a1f", borderRadius: 14,
                  padding: "24px 22px", marginBottom: 20,
                }}>
                  <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 8 }}>✨ 하이라이트 붙여넣기</div>
                  <div style={{
                    background: "#0a0a0c", border: "1px solid #1a1a1f", borderRadius: 8,
                    padding: "10px 14px", marginBottom: 10, fontSize: 12, color: "#444", lineHeight: 1.8,
                  }}>
                    ✅ 그대로 붙여넣으면 자동 파싱돼요<br />
                    <span style={{ color: "#ff8800", fontFamily: "monospace" }}>4:39</span>
                    <span style={{ color: "#888" }}> 등장</span>
                    <span style={{ color: "#555" }}> → 타임코드 + 내용 자동 분리</span><br />
                    <span style={{ color: "#ff8800" }}>&lt; 제목 &gt;</span>
                    <span style={{ color: "#555" }}> → 섹션 타이틀 |</span>
                    <span style={{ color: "#ff8800" }}> ❓ 질문</span>
                    <span style={{ color: "#555" }}> → 섹션 구분 |</span>
                    <span style={{ color: "#555" }}> 빈 줄 → 무시</span>
                  </div>

                  <textarea
                    placeholder={"< 📢 240820 펌펍더볼륨 컴백 라이브 🎙 >\n4:39 등장\n5:42 🎉멜론 hot100 1위🎉\n\n7:10 🎙Pump Up The Volume! 라이브\n\n  ❓ 앨범 준비 과정에서 가장 기억에 남는 순간\n\n18:10 💗: 야외촬영, 악기퍼포"}
                    value={hlText}
                    onChange={e => { setHlText(e.target.value); setHlParsed([]); }}
                    style={{
                      width: "100%", minHeight: 200, background: "#0f0f12",
                      border: "1px solid #1a1a1f", borderRadius: 8, padding: "14px",
                      color: "#e0ddd5", fontSize: 13, outline: "none",
                      fontFamily: "monospace", lineHeight: 1.7, resize: "vertical",
                    }}
                  />

                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8 }}>
                    <span style={{ fontSize: 12, color: "#444" }}>
                      {hlText ? hlText.split("\n").filter(l => l.trim()).length + "줄 입력됨" : "아직 없음"}
                    </span>
                    <button onClick={() => {
                      const lines = hlText.split("\n");
                      const parsed = [];
                      let order = 0;
                      let currentSection = "";
                      for (const raw of lines) {
                        const line = raw.trim();
                        if (!line) continue;
                        // < 타이틀 > 형태 → 섹션 타이틀
                        if (line.startsWith("<") && line.endsWith(">")) {
                          currentSection = line.slice(1, -1).trim();
                          order++;
                          parsed.push({ id: order, type: "title", timecode: "", content: currentSection, section: "" });
                          continue;
                        }
                        // ❓ 질문 형태 → 섹션 구분
                        if (line.includes("❓")) {
                          currentSection = line.replace(/❓/g, "").trim();
                          order++;
                          parsed.push({ id: order, type: "section", timecode: "", content: line.trim(), section: currentSection });
                          continue;
                        }
                        // 이모지 섹션 헤더 (타임코드 없이 이모지로 시작하는 구분선)
                        const sectionMatch = line.match(/^[\s]*([🎸🎹🏜🌵📽🎙]+.*[🎸🎹🌵📽🎙]+)[\s]*$/);
                        if (sectionMatch && !line.match(/^\d+:\d{2}/)) {
                          order++;
                          parsed.push({ id: order, type: "divider", timecode: "", content: line.trim(), section: currentSection });
                          continue;
                        }
                        // 타임코드 라인: 4:39 또는 1:03:43 형태
                        const tcMatch = line.match(/^(\d+:\d{2}(?::\d{2})?)\s+(.*)/);
                        if (tcMatch) {
                          order++;
                          parsed.push({ id: order, type: "highlight", timecode: tcMatch[1], content: tcMatch[2].trim(), section: currentSection });
                          continue;
                        }
                        // 그 외 텍스트 (섹션 구분선 등)
                        if (line.length > 1) {
                          order++;
                          parsed.push({ id: order, type: "text", timecode: "", content: line, section: currentSection });
                        }
                      }
                      setHlParsed(parsed);
                      setTimeout(() => hlPreviewRef.current?.scrollIntoView({ behavior: "smooth", block: "start" }), 100);
                    }} style={{
                      background: hlText ? "linear-gradient(135deg, #ff8800, #ff5500)" : "#1a1a22",
                      color: hlText ? "#fff" : "#444",
                      border: "none", borderRadius: 8, padding: "10px 20px",
                      fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>
                      파싱 & 미리보기 →
                    </button>
                  </div>
                </div>

                {/* 파싱 미리보기 */}
                {hlParsed.length > 0 && (
                  <div ref={hlPreviewRef} style={{
                    border: "1px solid #1a1a1f", borderRadius: 10, overflow: "hidden", marginBottom: 20,
                  }}>
                    <div style={{
                      display: "grid", gridTemplateColumns: "36px 50px 80px 1fr",
                      background: "#0a0a0c", padding: "8px 14px", fontSize: 11, color: "#444",
                      letterSpacing: 0.5, borderBottom: "1px solid #1a1a1f",
                    }}>
                      <div>#</div><div>타입</div><div>타임코드</div>
                      <div>내용 <span style={{ background: "#1a1208", color: "#ff8800", padding: "2px 8px", borderRadius: 20, fontSize: 10, marginLeft: 4 }}>
                        {hlParsed.filter(h => h.type === "highlight").length}개 하이라이트
                      </span></div>
                    </div>
                    <div style={{ maxHeight: 400, overflowY: "auto" }}>
                      {hlParsed.map((h, i) => {
                        const typeStyles = {
                          title: { bg: "#1a1208", color: "#ffaa00", label: "📢", rowBg: "#12100a" },
                          section: { bg: "#0a1218", color: "#44aaff", label: "❓", rowBg: "#0a0e14" },
                          divider: { bg: "#120a18", color: "#aa66ff", label: "━", rowBg: "#0e0a14" },
                          highlight: { bg: "#1a1208", color: "#ff8800", label: "⏱", rowBg: i % 2 ? "#0f0f12" : "#0d0d0f" },
                          text: { bg: "#111114", color: "#555", label: "…", rowBg: i % 2 ? "#0f0f12" : "#0d0d0f" },
                        };
                        const ts = typeStyles[h.type] || typeStyles.text;
                        return (
                          <div key={i} style={{
                            display: "grid", gridTemplateColumns: "36px 50px 80px 1fr",
                            padding: h.type === "title" || h.type === "section" ? "10px 14px" : "6px 14px",
                            fontSize: 12, background: ts.rowBg,
                            borderBottom: "1px solid #111114", alignItems: "center",
                            ...(h.type === "title" ? { borderTop: "2px solid #3a2a0a" } : {}),
                            ...(h.type === "section" ? { borderTop: "1px solid #1a2a3a" } : {}),
                          }}>
                            <div style={{ color: "#333", fontSize: 11 }}>{h.id}</div>
                            <div style={{
                              fontSize: 10, fontWeight: 700, padding: "2px 6px", borderRadius: 4,
                              background: ts.bg, color: ts.color, textAlign: "center", width: "fit-content",
                            }}>{ts.label}</div>
                            <div style={{
                              color: h.timecode ? "#ff8800" : "#222",
                              fontFamily: "monospace", fontWeight: 600, fontSize: 12,
                            }}>
                              {h.timecode || "-"}
                            </div>
                            <div style={{
                              color: h.type === "title" ? "#ffcc44" : h.type === "section" ? "#66bbff" : "#c8c6c0",
                              lineHeight: 1.4,
                              fontWeight: h.type === "title" || h.type === "section" ? 700 : 400,
                              fontSize: h.type === "title" ? 13 : 12,
                            }}>
                              {h.content}
                            </div>
                          </div>
                        );
                      })}
                    </div>

                    <div style={{ padding: "14px 18px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <button onClick={() => { setHlParsed([]); setHlText(""); }} style={{
                        background: "transparent", border: "1px solid #1e1e28", borderRadius: 8,
                        padding: "10px 16px", color: "#666", fontSize: 13, cursor: "pointer", fontFamily: "inherit",
                      }}>← 다시 입력</button>
                      <div style={{ textAlign: "right" }}>
                        <div style={{ fontSize: 11, color: "#555", marginBottom: 4 }}>
                          {hlParsed.filter(h => h.type === "highlight").length}개 하이라이트 · {hlParsed.filter(h => h.type === "section").length}개 섹션
                        </div>
                        <button style={{
                          background: "linear-gradient(135deg, #4466ff, #7744ff)",
                          color: "#fff", border: "none", borderRadius: 8,
                          padding: "10px 22px", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                        }} onClick={async () => {
                          if (!hlParsed.length || !hlSession) return;
                          setSaving(true);
                          try {
                            await fetch(WORKER + "/", { method: "POST", headers: {"Content-Type":"application/json"},
                              body: JSON.stringify({ action: "saveHighlights", session_id: hlSession.id, rows: hlParsed })
                            });
                            alert("저장 완료! " + hlParsed.length + "개");
                            setHlText(""); setHlParsed([]);
                            await loadData();
                            setHlSession(prev => prev ? {...prev, hlCount: (prev.hlCount||0) + hlParsed.length} : null);
                          } catch(e) { alert("저장 실패: " + e.message); }
                          setSaving(false);
                        }}>
                          {saving ? "저장 중..." : "Supabase에 저장"}</button>
                      </div>
                    </div>
                  </div>
                )}
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<PlaveAdmin />);
</script>
</body>
</html>
